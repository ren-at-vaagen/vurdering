// ── Google Drive sync ─────────────────────────────────────────────────
let _driveToken = null;
let _driveTokenClient = null;

async function getDriveToken() {
  if (_driveToken) return _driveToken;
  const clientId = localStorage.getItem("drive-client-id") || "";
  if (!clientId) throw new Error("Ingen Google Client ID. Legg det inn i Innstillinger.");
  if (!window.google?.accounts?.oauth2)
    throw new Error("Google-biblioteket er ikke lastet ennå. Prøv igjen om et sekund.");
  return new Promise((resolve, reject) => {
    _driveTokenClient = google.accounts.oauth2.initTokenClient({
      client_id: clientId,
      scope: "https://www.googleapis.com/auth/drive",
      callback: resp => {
        if (resp.error) { reject(new Error(resp.error)); return; }
        _driveToken = resp.access_token;
        setTimeout(() => { _driveToken = null; }, (resp.expires_in - 60) * 1000);
        resolve(resp.access_token);
      }
    });
    _driveTokenClient.requestAccessToken({ prompt: "select_account", login_hint: "vaagendrama@gmail.com" });
  });
}

async function driveExport(data) {
  const token = await getDriveToken();
  const now = new Date();
  const pad = n => String(n).padStart(2,"0");
  const ts = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}_${pad(now.getHours())}-${pad(now.getMinutes())}`;
  const name = `vurdering_${ts}.json`;
  const meta = { name, mimeType: "application/json" };
  const body = new FormData();
  body.append("metadata", new Blob([JSON.stringify(meta)], { type: "application/json" }));
  body.append("file", new Blob([JSON.stringify(data)], { type: "application/json" }));
  const res = await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart", {
    method: "POST", headers: { Authorization: `Bearer ${token}` }, body
  });
  if (!res.ok) throw new Error("Eksport feilet: " + res.status);
  const json = await res.json();
  return json.name;
}

async function driveListFiles() {
  _driveToken = null; // force fresh token with current scope
  const token = await getDriveToken();
  // First check which account we're using
  const meRes = await fetch("https://www.googleapis.com/drive/v3/about?fields=user", { headers: { Authorization: `Bearer ${token}` } });
  const me = meRes.ok ? await meRes.json() : null;
  const accountEmail = me?.user?.emailAddress || "ukjent konto";
  // List all recent JSON files
  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?spaces=drive&orderBy=modifiedTime+desc&fields=files(id,name,createdTime,modifiedTime)&pageSize=100`,
    { headers: { Authorization: `Bearer ${token}` } }
  );
  if (!res.ok) throw new Error("Kunne ikke hente filliste: " + res.status);
  const json = await res.json();
  const files = (json.files || []).filter(f => f.name && (f.name.includes("vurdering") || f.name.endsWith(".json")));
  return { files, accountEmail };
}

async function driveImportFile(fileId) {
  const token = await getDriveToken();
  const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
    { headers: { Authorization: `Bearer ${token}` } }
  );
  if (!res.ok) throw new Error("Import feilet: " + res.status);
  return res.json();
}

const KE_MULT = { lav:1, normal:2, høy:3 };
function keVektFor(keId, fag, oppgave) {
  const v = oppgave?.keVektOverride?.[keId] || fag?.keVekt?.[keId] || "normal";
  return KE_MULT[v] || 2;
}
function calcRawGrade(nMap, ferdighetskriterier, fag, oppgave, criterionGrade) {
  const V = { påvei: 1, lav: 2.5, middels: 4.5, høy: 6 };
  let s = 0, w = 0;
  (ferdighetskriterier || []).forEach(k => {
    const band = nMap?.[k.id];
    const v = criterionGrade?.[k.id] ?? V[band];
    if (v != null && band) {
      const keMult = keVektFor(k.kjerneelementId, fag, oppgave);
      const wt = (k.vekt || 1) * keMult;
      s += v * wt; w += wt;
    }
  });
  return w ? Math.floor((s / w) * 10) / 10 : null;
}
function calcGrade(nMap, ferdighetskriterier, fag, oppgave, criterionGrade) {
  const V = { påvei: 1, lav: 2.5, middels: 4.5, høy: 6 };
  let s = 0, w = 0;
  (ferdighetskriterier || []).forEach(k => {
    const band = nMap?.[k.id];
    const v = criterionGrade?.[k.id] ?? V[band];
    if (v != null && band) {
      const keMult = keVektFor(k.kjerneelementId, fag, oppgave);
      const wt = (k.vekt || 1) * keMult;
      s += v * wt; w += wt;
    }
  });
  return w ? Math.min(6, Math.max(1, Math.floor(s / w))) : null;
}

function calcBand(nMap, ferdighetskriterier, fag, oppgave, criterionGrade) {
  const V = { påvei: 1, lav: 2.5, middels: 4.5, høy: 6 };
  let s = 0, w = 0;
  (ferdighetskriterier || []).forEach(k => {
    const band = nMap?.[k.id];
    const v = criterionGrade?.[k.id] ?? V[band];
    if (v != null && band) {
      const keMult = keVektFor(k.kjerneelementId, fag, oppgave);
      const wt = (k.vekt || 1) * keMult;
      s += v * wt; w += wt;
    }
  });
  if (!w) return null;
  const floored = Math.floor(s / w);
  if (floored <= 1) return "påvei";
  if (floored <= 3) return "lav";
  if (floored <= 5) return "middels";
  return "høy";
}

function getPåveiText(r) {
  return r.påvei || ("Ikke ennå: " + (r.lav || ""));
}

function applyOppgaveKrav(karakter, krav) {
  if (!krav || krav === "alt") return karakter;
  const n = parseFloat(karakter);
  if (isNaN(n)) return karakter; // IV, Bestått osv — uendret
  const delta = krav === "nei" ? -1 : -0.25;
  return String(Math.min(6, Math.max(1, Math.floor(n + delta))));
}

function getEffectiveGrade(v) {
  if (!v) return null;
  if (v.justerKarakter) return v.justerKarakter; // explicit override — bypasses modifier
  const base = v.bandPick || (v.beregnetKarakter ? String(v.beregnetKarakter) : null);
  return applyOppgaveKrav(base, v.oppgaveKrav) || null;
}

function parseNavneliste(text) {
  const map = {};
  text.split(/[\n,;]+/).forEach(line => {
    const m = line.trim().match(/^(\d+)\s*[=:]\s*(.+)$/);
    if (m) map[parseInt(m[1])] = m[2].trim();
  });
  return map;
}

function NavnModal({ navneliste, setNavneliste, onClose }) {
  const harNavn = Object.keys(navneliste).length > 0;
  const [tekst, setTekst] = useState(() =>
    harNavn ? Object.entries(navneliste).map(([k,v])=>`${k}=${v}`).join("\n") : ""
  );
  const [preview, setPreview] = useState({});
  useEffect(() => { setPreview(parseNavneliste(tekst)); }, [tekst]);

  const lagre = () => { setNavneliste(parseNavneliste(tekst)); onClose(); };
  const slett = () => { setNavneliste({}); setTekst(""); onClose(); };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.55)", zIndex:1100, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
      <div style={{ background:"#fff", borderRadius:12, padding:28, width:440, maxHeight:"85vh", display:"flex", flexDirection:"column", gap:16 }}>
        <div>
          <h2 style={{ fontFamily:"'Libre Baskerville',serif", fontSize:17, color:P, margin:"0 0 6px" }}>🔑 Navneliste</h2>
          <p style={{ fontSize:13, color:"var(--color-text-secondary)", margin:0, lineHeight:1.6 }}>
            Lim inn én per linje: <code style={{ background:"#f0f0f0", padding:"1px 5px", borderRadius:3, fontSize:12 }}>1=Eline</code>.
            Navnene lagres bare i minnet og slettes når du lukker siden eller klikker Slett.
          </p>
        </div>

        <textarea
          value={tekst}
          onChange={e=>setTekst(e.target.value)}
          placeholder={"1=Eline\n2=Jonas\n3=Sara\n..."}
          style={{ flex:1, minHeight:180, resize:"vertical", fontFamily:"'IBM Plex Mono',monospace,monospace", fontSize:13,
            padding:"10px 12px", border:"0.5px solid var(--color-border-secondary)", borderRadius:6,
            background:"var(--color-background-secondary)", lineHeight:1.7 }}
          autoFocus
        />

        {Object.keys(preview).length > 0 && (
          <div style={{ fontSize:12, color:"var(--color-text-secondary)", background:"var(--color-background-secondary)", borderRadius:6, padding:"8px 12px", maxHeight:80, overflowY:"auto" }}>
            {Object.keys(preview).length} navn lest inn:&ensp;
            {Object.entries(preview).slice(0,6).map(([k,v])=>`${k}=${v}`).join(" · ")}
            {Object.keys(preview).length > 6 && " …"}
          </div>
        )}

        <div style={{ display:"flex", gap:10 }}>
          <button onClick={lagre} style={{ padding:"8px 20px", background:P, color:"#fff", border:"none", borderRadius:6, fontSize:14, cursor:"pointer", fontFamily:"inherit", fontWeight:500 }}>
            Lagre
          </button>
          <button onClick={onClose} style={{ padding:"8px 16px", background:"transparent", border:"0.5px solid var(--color-border-secondary)", borderRadius:6, fontSize:14, cursor:"pointer", fontFamily:"inherit" }}>
            Avbryt
          </button>
          {harNavn && (
            <button onClick={slett} style={{ marginLeft:"auto", padding:"8px 16px", background:"transparent", border:`0.5px solid ${RD}`, color:RD, borderRadius:6, fontSize:14, cursor:"pointer", fontFamily:"inherit" }}>
              Slett navneliste
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

function buildProsjektHtml(pv, prosjekt, fag, data, navneliste) {
  const elevLabel = navneliste?.[pv.elevNr] || `Elev ${pv.elevNr}`;
  const komponenter = prosjekt.komponenter || [];
  const andreRows = (pv.andreOppgaver||[]).filter(a=>a.tittel||a.karakter).map(a =>
    `<tr><td style="padding:8px 12px;border-bottom:0.5px solid #e0dcd8;font-size:13px;color:#888;font-style:italic">${a.tittel||"—"} <span style="font-size:10px">(annen lærer)</span></td>
     <td style="padding:8px 12px;border-bottom:0.5px solid #e0dcd8;font-size:13px;font-weight:600;color:#666;text-align:center">${a.karakter||"—"}</td></tr>`
  ).join("");
  const rows = komponenter.map(k => {
    const opp = data.oppgaver.find(o => o.id === k.oppgaveId);
    if (!opp) return null;
    if (pv.ikkeLevert?.[k.oppgaveId]) {
      return { opp, type:k.type, result:"Ikke levert", stars:[], framover:"", ikkeLevert:true };
    }
    if (k.oppgaveId in (pv.fritatt||{})) {
      const grunn = pv.fritatt[k.oppgaveId];
      return { opp, type:k.type, result: grunn ? `Fritatt — ${grunn}` : "Fritatt", stars:[], framover:"", fritatt:true };
    }
    if (k.type === "bestått") {
      const b = pv.bestått?.[k.oppgaveId];
      return { opp, type:"bestått", result: b === true ? "Bestått" : b === false ? "Ikke bestått" : "—", stars:[], framover:"" };
    } else {
      const v = data.vurderinger.find(v => v.oppgaveId === k.oppgaveId && v.elevNr === pv.elevNr);
      const grade = getEffectiveGrade(v) || "—";
      return { opp, type:"rubrikk", result: grade, stars:[v?.stjerne1,v?.stjerne2].filter(Boolean), framover:v?.framovermelding||"" };
    }
  }).filter(Boolean);

  const tableRows = rows.map(r => {
    const resultColor = r.ikkeLevert ? "#888" : r.fritatt ? "#9E7022" : "#1B3A2D";
    const resultStyle = r.ikkeLevert || r.fritatt ? "font-style:italic;font-weight:400" : "font-weight:600";
    return `<tr><td style="padding:8px 12px;border-bottom:0.5px solid #e0dcd8;font-size:13px">${r.opp.tittel}</td>
     <td style="padding:8px 12px;border-bottom:0.5px solid #e0dcd8;font-size:13px;${resultStyle};color:${resultColor};text-align:center">${r.result}</td></tr>`;
  }).join("");

  const detailSections = rows.filter(r => r.type === "rubrikk" && (r.stars.length || r.framover)).map(r => `
    <div style="margin-top:16px;padding:14px;background:#F9F7F5;border-radius:6px">
      <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:#888;margin-bottom:8px">${r.opp.tittel}</div>
      ${r.stars.map(s => `<p style="margin:3px 0;font-size:13px">⭐ ${s}</p>`).join("")}
      ${r.framover ? `<p style="margin-top:8px;font-size:13px;padding:10px 12px;background:#F4F2EC;border-left:3px solid #1B3A2D">${r.framover.replace(/\n/g,"<br>")}</p>` : ""}
    </div>`).join("");

  return `<!DOCTYPE html><html lang="no"><head><meta charset="utf-8">
<title>${prosjekt.tittel} — ${elevLabel}</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}html,body{background:#fff;font-family:'IBM Plex Sans',sans-serif;font-size:13px;color:#19190F;line-height:1.7}
body{max-width:720px;margin:36px auto;padding:0 32px}
.printbtn{display:block;margin:0 auto 28px;padding:10px 28px;background:#1B3A2D;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500}
@media print{*{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important}html{background:#fff !important;min-height:100%}body{background:#fff !important;max-width:none !important;margin:0 !important;padding:15mm 20mm !important}.printbtn{display:none}}
</style></head><body>
<button class="printbtn" onclick="window.print()">🖨 Lagre som PDF</button>
<div style="border-bottom:2px solid #1B3A2D;padding-bottom:12px;margin-bottom:20px">
  <div style="font-size:10px;color:#888;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:5px">Vågen vgs · ${fag.navn} · ${fag.trinn}</div>
  <div style="font-family:'Libre Baskerville',serif;font-size:20px;color:#1B3A2D;margin-bottom:3px">${prosjekt.tittel}</div>
  <div style="font-size:13px;color:#6B6459">${elevLabel}</div>
</div>
<table style="width:100%;border-collapse:collapse;margin-bottom:20px;border:0.5px solid #e0dcd8;border-radius:6px;overflow:hidden">
  <thead><tr style="background:#1B3A2D"><th style="padding:8px 12px;text-align:left;color:#fff;font-size:11px;font-weight:500">Oppgave</th><th style="padding:8px 12px;text-align:center;color:#fff;font-size:11px;font-weight:500;width:120px">Resultat</th></tr></thead>
  <tbody>${tableRows}${andreRows}</tbody>
</table>
${detailSections}
<div style="margin-top:24px;padding:16px;border:1px solid #1B3A2D;border-radius:6px">
  <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:#888;margin-bottom:6px">Prosjektkarakter</div>
  <div style="font-size:22px;font-weight:700;font-family:'Libre Baskerville',serif;color:#1B3A2D;margin-bottom:8px">${pv.finalKarakter || "—"}</div>
  ${pv.begrunnelse ? `<p style="font-size:13px;color:#333;line-height:1.6">${pv.begrunnelse.replace(/\n/g,"<br>")}</p>` : ""}
</div>
${(pv.andreOppgaver||[]).filter(a=>a.tittel||a.karakter).length>0||pv.konsultertKarakter ? `<div style="margin-top:16px;padding:16px;border:1px solid #D4A84B;border-radius:6px;background:#FFFDF5">
  <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:#7A5E00;margin-bottom:6px">Sluttkarakter etter konsultasjon</div>
  <div style="font-size:22px;font-weight:700;font-family:'Libre Baskerville',serif;color:#7A5E00;margin-bottom:8px">${pv.konsultertKarakter||"—"}</div>
  ${pv.konsultertBegrunnelse ? `<p style="font-size:13px;color:#555;line-height:1.6">${pv.konsultertBegrunnelse.replace(/\n/g,"<br>")}</p>` : ""}
</div>` : ""}
</body></html>`;
}

function ProsjektForm({ fag, data, save, go, prosjektEdit }) {
  const isEdit = !!prosjektEdit;
  const aktiveOppgaver = data.oppgaver.filter(o => o.fagId===fag.id && !o.arkivert);
  const [tittel, setTittel] = useState(prosjektEdit?.tittel || "");
  const [dato, setDato] = useState(prosjektEdit?.dato || new Date().toISOString().slice(0,10));
  const [komponenter, setKomponenter] = useState(prosjektEdit?.komponenter || []);

  const toggleOppgave = (oppgaveId) => {
    setKomponenter(prev => {
      const exists = prev.find(k => k.oppgaveId === oppgaveId);
      if (exists) return prev.filter(k => k.oppgaveId !== oppgaveId);
      const opp = data.oppgaver.find(o => o.id === oppgaveId);
      const defaultType = opp?.vurderingsform === "bestått" ? "bestått" : "rubrikk";
      return [...prev, { oppgaveId, type:defaultType }];
    });
  };
  const setType = (oppgaveId, type) => setKomponenter(prev => prev.map(k => k.oppgaveId===oppgaveId ? {...k,type} : k));

  const doSave = () => {
    if (!tittel.trim() || komponenter.length < 1) return;
    const p = { id: prosjektEdit?.id||uid(), fagId:fag.id, tittel:tittel.trim(), dato, komponenter };
    const prosjekter = isEdit
      ? data.prosjekter.map(x => x.id===p.id ? p : x)
      : [...(data.prosjekter||[]), p];
    save({ ...data, prosjekter });
    go("fag", fag.id, null, null, "vurdering");
  };
  const doSlett = () => {
    if (!confirm("Slette prosjektet? Vurderinger beholdes.")) return;
    save({ ...data,
      prosjekter: data.prosjekter.filter(x=>x.id!==prosjektEdit.id),
      prosjektVurderinger: (data.prosjektVurderinger||[]).filter(x=>x.prosjektId!==prosjektEdit.id)
    });
    go("fag", fag.id, null, null, "vurdering");
  };

  return (
    <div>
      <h1 style={h1}>{isEdit ? `Rediger: ${prosjektEdit.tittel}` : "Nytt prosjekt"}</h1>
      <Section title="Grunninfo">
        <div style={{ display:"grid", gridTemplateColumns:"1fr 140px", gap:14 }}>
          <Fld label="Tittel"><input style={inp} value={tittel} onChange={e=>setTittel(e.target.value)} placeholder="f.eks. Teaterproduksjon — Vg2" /></Fld>
          <Fld label="Dato"><input style={inp} type="date" value={dato} onChange={e=>setDato(e.target.value)} /></Fld>
        </div>
      </Section>
      <Section title="Velg oppgaver">
        <p style={hint}>Velg hvilke oppgaver som inngår i prosjektet, og sett om de er rubrikk-vurdert eller bestått/ikke bestått.</p>
        <div style={{ display:"grid", gap:10, marginTop:10 }}>
          {aktiveOppgaver.length === 0 && <p style={hint}>Ingen aktive oppgaver i dette faget.</p>}
          {aktiveOppgaver.length === 0 && <p style={hint}>Ingen aktive oppgaver i dette faget.</p>}
          {aktiveOppgaver.map(o => {
            const k = komponenter.find(kk=>kk.oppgaveId===o.id);
            return (
              <div key={o.id} style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 14px",
                border:`1px solid ${k?"var(--color-border-secondary)":"var(--color-border-tertiary)"}`,
                borderRadius:8, background:k?"var(--color-background-secondary)":"transparent" }}>
                <input type="checkbox" checked={!!k} onChange={()=>toggleOppgave(o.id)} />
                <span style={{ flex:1, fontSize:13 }}>{o.tittel}</span>
                {k && (
                  <div style={{ display:"flex", gap:6, alignItems:"center", flexWrap:"wrap" }}>
                    {[["rubrikk","Rubrikk"],["bestått","Bestått/IB"]].map(([tv,tlabel]) => (
                      <button key={tv} onClick={()=>setType(o.id,tv)} style={{
                        padding:"3px 10px", borderRadius:4, fontSize:12, cursor:"pointer", fontFamily:"inherit",
                        background: k.type===tv ? P : "transparent",
                        color: k.type===tv ? "#fff" : "var(--color-text-secondary)",
                        border: `1px solid ${k.type===tv ? P : "var(--color-border-tertiary)"}`,
                        fontWeight: k.type===tv ? 600 : 400,
                      }}>{tlabel}</button>
                    ))}
                    <span style={{ fontSize:11, color:"var(--color-text-secondary)", margin:"0 2px" }}>·</span>
                    {["lav","normal","høy"].map(vk => {
                      const cur = k.vekt||"normal";
                      return (
                        <button key={vk} onClick={()=>setKomponenter(prev=>prev.map(kk=>kk.oppgaveId===o.id?{...kk,vekt:vk}:kk))} style={{
                          padding:"2px 8px", borderRadius:4, fontSize:11, cursor:"pointer", fontFamily:"inherit",
                          background:cur===vk?(vk==="høy"?P:vk==="lav"?"#eee":"var(--color-background-secondary)"):"transparent",
                          color:cur===vk?(vk==="høy"?"#fff":"var(--color-text-primary)"):"var(--color-text-secondary)",
                          border:`1px solid ${cur===vk?(vk==="høy"?P:"var(--color-border-secondary)"):"var(--color-border-tertiary)"}`,
                          fontWeight:cur===vk?600:400,
                        }}>{vk.charAt(0).toUpperCase()+vk.slice(1)}</button>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </Section>
      <div style={{ display:"flex", gap:10 }}>
        <Btn onClick={doSave} disabled={!tittel.trim()||komponenter.length<1}>Lagre prosjekt</Btn>
        <Btn secondary onClick={()=>go("fag",fag.id,null,null,"vurdering")}>Avbryt</Btn>
        {isEdit && <Btn danger sm onClick={doSlett}>Slett</Btn>}
      </div>
    </div>
  );
}

function ProsjektElever({ fag, prosjekt, data, save, go, nav, navneliste, onOpenNavn }) {
  const harNavn = Object.keys(navneliste||{}).length > 0;
  const alleNr = elevNrs(fag);
  const pvurd = (data.prosjektVurderinger||[]).filter(v => v.prosjektId===prosjekt.id);
  const [valgte, setValgte] = React.useState(new Set());

  const toggleValgt = (nr,e) => { e.stopPropagation(); setValgte(prev=>{const s=new Set(prev);s.has(nr)?s.delete(nr):s.add(nr);return s;}); };
  const velgAlle = () => setValgte(new Set(alleNr.filter(nr=>pvurd.find(v=>v.elevNr===nr&&v.finalKarakter))));

  const printValgte = () => {
    const utvalg = alleNr.filter(nr=>valgte.has(nr));
    if (!utvalg.length) return alert("Ingen valgt.");
    const sider = utvalg.map((nr,i) => {
      const pv = pvurd.find(v=>v.elevNr===nr) || {elevNr:nr,bestått:{},finalKarakter:"",begrunnelse:""};
      const html = buildProsjektHtml(pv, prosjekt, fag, data, navneliste);
      // Extract body content
      const bodyMatch = html.match(/<body>([\s\S]*)<\/body>/);
      const body = bodyMatch ? bodyMatch[1] : "";
      return i===0 ? body : `<div style="page-break-before:always">${body}</div>`;
    }).join("\n");
    const css = buildProsjektHtml({elevNr:0}, prosjekt, fag, data, {}).match(/<style>([\s\S]*?)<\/style>/)?.[1]||"";
    const w = window.open("","_blank");
    w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"><style>${css}.ny-elev{page-break-before:always}</style></head><body>${sider}</body></html>`);
    w.document.close(); w.focus(); setTimeout(()=>w.print(),500);
  };

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginTop:8, marginBottom:6 }}>
        <div>
          <h1 style={{ ...h1, marginBottom:4 }}>{prosjekt.tittel}</h1>
          <p style={{ ...hint, margin:0 }}>{(prosjekt.komponenter||[]).length} oppgaver · {fag.navn}</p>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <button onClick={onOpenNavn} style={{ padding:"5px 12px", borderRadius:6, fontSize:13, cursor:"pointer", fontFamily:"inherit", fontWeight:500, border:`1px solid ${harNavn?"#D4A84B":"var(--color-border-secondary)"}`, background:harNavn?AB:"transparent", color:harNavn?"#6B5030":"var(--color-text-secondary)" }}>
            🔑 {harNavn?`${Object.keys(navneliste).length} navn`:"Navneliste"}
          </button>
          <Btn secondary sm onClick={()=>go("prosjektForm",fag.id,prosjekt.id)}>Rediger</Btn>
        </div>
      </div>
      <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:12, flexWrap:"wrap" }}>
        <p style={{ ...hint, margin:0 }}>Grønn = ferdig · Gul = startet · Grå = ikke startet</p>
        <div style={{ display:"flex", gap:8, marginLeft:"auto", alignItems:"center" }}>
          {valgte.size>0 && <span style={{ fontSize:12, color:"var(--color-text-secondary)" }}>{valgte.size} valgt</span>}
          <button onClick={valgte.size>0?()=>setValgte(new Set()):velgAlle} style={{ fontSize:12, padding:"3px 10px", borderRadius:4, border:"0.5px solid var(--color-border-secondary)", background:"transparent", cursor:"pointer", fontFamily:"inherit", color:"var(--color-text-secondary)" }}>
            {valgte.size>0?"Velg ingen":"Velg alle ferdige"}
          </button>
          {valgte.size>0 && <Btn sm onClick={printValgte}>🖨 Skriv ut {valgte.size} elev{valgte.size>1?"er":""}</Btn>}
        </div>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))", gap:8 }}>
        {alleNr.map(nr => {
          const pv = pvurd.find(v=>v.elevNr===nr);
          const ferdig = pv?.finalKarakter;
          const startet = pv && !ferdig;
          const navn = navneliste?.[nr];
          const erValgt = valgte.has(nr);
          return (
            <div key={nr} style={{ position:"relative" }}>
              {pv && <div onClick={e=>toggleValgt(nr,e)} style={{ position:"absolute", top:6, right:6, zIndex:1, width:18, height:18, borderRadius:4, cursor:"pointer", border:`2px solid ${erValgt?A:"var(--color-border-secondary)"}`, background:erValgt?A:"#fff", display:"flex", alignItems:"center", justifyContent:"center" }}>
                {erValgt && <span style={{ color:"#fff", fontSize:11, fontWeight:700 }}>✓</span>}
              </div>}
              <div onClick={()=>nav("prosjektVurdering",fag.id,prosjekt.id,nr)}
                style={{ ...card, cursor:"pointer", textAlign:"center", padding:"12px 8px",
                  borderColor:erValgt?A:ferdig?"#27AE60":startet?A:"var(--color-border-tertiary)",
                  boxShadow:erValgt?`0 0 0 2px ${A}`:"none" }}>
                {navn ? <div style={{ fontSize:13, fontWeight:600, color:P, marginBottom:1 }}>{navn}</div>
                      : <div style={{ fontSize:13, fontWeight:500 }}>#{nr}</div>}
                {navn && <div style={{ fontSize:10, color:"var(--color-text-secondary)", marginBottom:2 }}>#{nr}</div>}
                <div style={{ fontSize:20, fontWeight:700, color:ferdig?P:startet?A:"var(--color-text-secondary)", margin:"4px 0" }}>
                  {ferdig||"—"}
                </div>
                <div style={{ fontSize:10, color:"var(--color-text-secondary)" }}>
                  {ferdig?"ferdig":startet?"startet":"ikke startet"}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ProsjektVurderingForm({ fag, prosjekt, elevNr, data, save, go, nav, navneliste }) {
  const elevLabel = navneliste?.[elevNr] || `Elev ${elevNr}`;
  const existing = (data.prosjektVurderinger||[]).find(v=>v.prosjektId===prosjekt.id&&v.elevNr===elevNr);
  const [bestått, setBestått] = useState(existing?.bestått || {});
  const [ikkeLevert, setIkkeLevert] = useState(existing?.ikkeLevert || {});
  const [fritatt, setFritatt] = useState(existing?.fritatt || {});
  const [finalKarakter, setFinalKarakter] = useState(existing?.finalKarakter || "");
  const [begrunnelse, setBegrunnelse] = useState(existing?.begrunnelse || "");
  const [andreOppgaver, setAndreOppgaver] = useState(existing?.andreOppgaver || []);
  const [konsultertKarakter, setKonsultertKarakter] = useState(existing?.konsultertKarakter || "");
  const [konsultertBegrunnelse, setKonsultertBegrunnelse] = useState(existing?.konsultertBegrunnelse || "");
  const [visAndre, setVisAndre] = useState(!!(existing?.andreOppgaver?.length || existing?.konsultertKarakter));

  const komponenter = prosjekt.komponenter || [];
  const rubrikk = komponenter.filter(k=>k.type==="rubrikk");
  const beståttKomp = komponenter.filter(k=>k.type==="bestått");
  const grades = ["💬 Samtale","Bestått","Ikke bestått","IV","2","3","4","5","6"];
  const VEKT = {lav:1, normal:2, høy:3};
  const NON_NUM = ["💬 Samtale","Bestått","Ikke bestått","IV"];

  const doSave = () => {
    const pv = { id:existing?.id||uid(), fagId:fag.id, prosjektId:prosjekt.id, elevNr,
      bestått, ikkeLevert, fritatt, finalKarakter, begrunnelse, andreOppgaver, konsultertKarakter, konsultertBegrunnelse };
    const pvs = existing
      ? (data.prosjektVurderinger||[]).map(x=>x.id===pv.id?pv:x)
      : [...(data.prosjektVurderinger||[]), pv];
    save({ ...data, prosjektVurderinger: pvs });
    go("prosjektElever", fag.id, prosjekt.id);
  };

  const doPrint = () => {
    const pv = { id:"preview", fagId:fag.id, prosjektId:prosjekt.id, elevNr,
      bestått, ikkeLevert, fritatt, finalKarakter, begrunnelse, andreOppgaver, konsultertKarakter, konsultertBegrunnelse };
    const html = buildProsjektHtml(pv, prosjekt, fag, data, navneliste);
    const w = window.open("","_blank");
    w.document.write(html); w.document.close(); w.focus();
    setTimeout(()=>w.print(),400);
  };

  // Weighted grade suggestion
  let sumScore = 0, sumVekt = 0, harIB = false, harObligatoriskIL = false;
  komponenter.forEach(function(k) {
    if (k.oppgaveId in fritatt) return; // fritatt: skip entirely
    const vekt = VEKT[k.vekt||"normal"] || 2;
    if (ikkeLevert[k.oppgaveId]) {
      const obl = (data.oppgaver||[]).find(o=>o.id===k.oppgaveId)?.obligatorisk;
      if (obl) harObligatoriskIL = true;
      sumScore += 1 * vekt; sumVekt += vekt; return;
    }
    if (k.type==="rubrikk") {
      const v = data.vurderinger.find(function(v){ return v.oppgaveId===k.oppgaveId&&v.elevNr===elevNr; });
      const rawG = v ? getEffectiveGrade(v) : null;
      if (!rawG || NON_NUM.includes(rawG)) return;
      const g = parseFloat(rawG);
      if (!isNaN(g)) { sumScore += g * vekt; sumVekt += vekt; }
    } else {
      const b = bestått[k.oppgaveId];
      if (b === true) { sumScore += 1.25 * vekt; sumVekt += vekt; }
      else if (b === false) { sumVekt += vekt; harIB = true; }
    }
  });
  const rawSugg = sumVekt > 0 ? Math.floor(sumScore / sumVekt) : null;
  const suggested = rawSugg ? Math.min((harIB || harObligatoriskIL) ? 5 : 6, Math.max(2, rawSugg)) : null;
  const rawDecimal = sumVekt > 0 ? (Math.floor((sumScore/sumVekt)*10)/10) : null;

  return (
    <div>
      <h1 style={h1}>{prosjekt.tittel}</h1>
      <p style={{ ...hint, marginBottom:20 }}>{elevLabel}</p>

      {rubrikk.length > 0 && (
        <Section title="Rubrikk-resultater">
          <div style={{ display:"grid", gap:10 }}>
            {rubrikk.map(function(k) {
              const opp = data.oppgaver.find(function(o){ return o.id===k.oppgaveId; });
              const v = data.vurderinger.find(function(vv){ return vv.oppgaveId===k.oppgaveId&&vv.elevNr===elevNr; });
              const grade = v ? getEffectiveGrade(v) : null;
              const erIL = !!ikkeLevert[k.oppgaveId];
              const erFritatt = k.oppgaveId in fritatt;
              const toggleIL = () => {
                if (erFritatt) return; // can't combine
                setIkkeLevert(p=>({...p,[k.oppgaveId]:!p[k.oppgaveId]}));
              };
              const toggleFritatt = () => {
                if (erIL) return; // can't combine
                setFritatt(p=>{ const n={...p}; if(k.oppgaveId in n) delete n[k.oppgaveId]; else n[k.oppgaveId]=""; return n; });
              };
              const sBtnBase = { padding:"2px 8px", borderRadius:4, fontSize:11, cursor:"pointer", fontFamily:"inherit", border:"1px solid var(--color-border-secondary)", background:"transparent", color:"var(--color-text-secondary)" };
              return (
                <div key={k.oppgaveId} style={{ padding:"10px 14px", background:"var(--color-background-secondary)", borderRadius:6 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <span style={{ fontSize:13 }}>{opp?opp.tittel:"Ukjent oppgave"}</span>
                    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                      {!erIL && !erFritatt && <span style={{ fontWeight:600, color:P, fontSize:15 }}>{grade||"—"}</span>}
                      {erIL && <span style={{ fontSize:12, color:"#666", fontStyle:"italic" }}>Ikke levert (teller som 1)</span>}
                      {erFritatt && <span style={{ fontSize:12, color:A, fontStyle:"italic" }}>Fritatt</span>}
                      <button onClick={toggleIL} style={{ ...sBtnBase, ...(erIL?{background:"#eee",fontWeight:600,color:"#333"}:{}) }}>
                        {erIL?"✕ Ikke levert":"Ikke levert"}
                      </button>
                      <button onClick={toggleFritatt} style={{ ...sBtnBase, ...(erFritatt?{background:AB,fontWeight:600,color:"#6B5030",borderColor:"#D4A84B"}:{}) }}>
                        {erFritatt?"✕ Fritatt":"Fritatt"}
                      </button>
                    </div>
                  </div>
                  {erIL && opp?.obligatorisk && (
                    <div style={{ marginTop:6, fontSize:12, color:"#B53A2F", background:"#FDF0EE", border:"1px solid #E8C4BE", borderRadius:4, padding:"4px 10px" }}>
                      ⚠ Obligatorisk oppgave ikke levert — forslag begrenset til 5.
                    </div>
                  )}
                  {erFritatt && (
                    <input style={{ ...inp, fontSize:12, marginTop:8 }}
                      value={fritatt[k.oppgaveId]}
                      onChange={e=>setFritatt(p=>({...p,[k.oppgaveId]:e.target.value}))}
                      placeholder="Grunn for fritak (valgfritt)…" />
                  )}
                </div>
              );
            })}
          </div>
        </Section>
      )}

      {beståttKomp.length > 0 && (
        <Section title="Bestått / Ikke bestått">
          <div style={{ display:"grid", gap:10 }}>
            {beståttKomp.map(function(k) {
              const opp = data.oppgaver.find(function(o){ return o.id===k.oppgaveId; });
              const val = bestått[k.oppgaveId];
              return (
                <div key={k.oppgaveId} style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
                  padding:"10px 14px", background:"var(--color-background-secondary)", borderRadius:6 }}>
                  <span style={{ fontSize:13 }}>{opp?opp.tittel:"Ukjent oppgave"}</span>
                  <div style={{ display:"flex", gap:6 }}>
                    {[[true,"Bestått"],[false,"Ikke bestått"]].map(function(pair) {
                      const pv = pair[0]; const label = pair[1];
                      return (
                        <button key={label} onClick={()=>setBestått(function(p){ return {...p,[k.oppgaveId]:pv}; })} style={{
                          padding:"4px 12px", borderRadius:4, fontSize:12, cursor:"pointer", fontFamily:"inherit",
                          background:val===pv?(pv?P:RD):"transparent",
                          color:val===pv?"#fff":"var(--color-text-secondary)",
                          border:"1px solid "+(val===pv?(pv?P:RD):"var(--color-border-tertiary)"),
                          fontWeight:val===pv?600:400,
                        }}>{label}</button>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        </Section>
      )}

      <Section title="Prosjektkarakter">
        {suggested !== null && (
          <div style={{ fontSize:13, marginBottom:10 }}>
            Beregnet forslag: <strong style={{ color:P, fontSize:16 }}>{suggested}</strong>
            {rawDecimal !== null && <span style={{ fontSize:11, color:"var(--color-text-secondary)", marginLeft:8 }}>(råsnitt {rawDecimal})</span>}
          </div>
        )}
        {harIB && (
          <div style={{ fontSize:12, color:RD, background:"#FDF0EE", border:"1px solid #E8C4BE", borderRadius:6, padding:"8px 12px", marginBottom:10 }}>
            ⚠ Eleven har Ikke bestått på minst én komponent. Forslaget er begrenset til 5. Du kan sette 6 manuelt.
          </div>
        )}
        {harObligatoriskIL && (
          <div style={{ fontSize:12, color:RD, background:"#FDF0EE", border:"1px solid #E8C4BE", borderRadius:6, padding:"8px 12px", marginBottom:10 }}>
            ⚠ Obligatorisk oppgave ikke levert. Forslaget er begrenset til 5. Du kan sette 6 manuelt.
          </div>
        )}
        <Fld label="Karakter">
          <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
            {grades.map(function(g) {
              return (
                <button key={g} onClick={()=>setFinalKarakter(g)} style={{
                  padding:"6px 16px", borderRadius:6, fontSize:14, cursor:"pointer", fontFamily:"inherit",
                  background:finalKarakter===g?P:"transparent", color:finalKarakter===g?"#fff":"var(--color-text-primary)",
                  border:"1px solid "+(finalKarakter===g?P:"var(--color-border-secondary)"),
                  fontWeight:finalKarakter===g?600:400,
                }}>{g}</button>
              );
            })}
          </div>
        </Fld>
        <Fld label="Begrunnelse">
          <textarea style={{ ...inp, minHeight:80, resize:"vertical" }} value={begrunnelse}
            onChange={e=>setBegrunnelse(e.target.value)} placeholder="Kort begrunnelse for prosjektkarakteren…" />
        </Fld>
      </Section>

      <div style={{ marginBottom:16 }}>
        <button onClick={()=>setVisAndre(function(v){ return !v; })} style={{
          fontSize:12, padding:"5px 14px", borderRadius:6, cursor:"pointer", fontFamily:"inherit",
          background:"transparent", border:"0.5px solid var(--color-border-secondary)",
          color:"var(--color-text-secondary)"
        }}>{visAndre?"Skjul":"+ Legg til"} andres oppgaver og felles sluttkarakter</button>
        {visAndre && (
          <div style={{ marginTop:14, padding:16, background:"var(--color-background-secondary)", borderRadius:8, display:"grid", gap:14 }}>
            <div>
              <div style={{ fontSize:11, fontWeight:600, letterSpacing:"0.07em", textTransform:"uppercase", color:"var(--color-text-secondary)", marginBottom:10 }}>Andres oppgaver</div>
              <div style={{ display:"grid", gap:8 }}>
                {andreOppgaver.map(function(a, i) {
                  return (
                    <div key={i} style={{ display:"flex", gap:8, alignItems:"center" }}>
                      <input style={{ ...inp, flex:1 }} value={a.tittel}
                        onChange={e=>setAndreOppgaver(function(prev){ return prev.map(function(x,j){ return j===i?{...x,tittel:e.target.value}:x; }); })}
                        placeholder="Oppgavetittel (annen lærer)…" />
                      <input style={{ ...inp, width:80 }} value={a.karakter}
                        onChange={e=>setAndreOppgaver(function(prev){ return prev.map(function(x,j){ return j===i?{...x,karakter:e.target.value}:x; }); })}
                        placeholder="Kar." />
                      <button onClick={()=>setAndreOppgaver(function(prev){ return prev.filter(function(_,j){ return j!==i; }); })} style={xbtn}>×</button>
                    </div>
                  );
                })}
              </div>
              <div style={{ marginTop:8 }}>
                <Btn secondary sm onClick={()=>setAndreOppgaver(function(prev){ return [...prev,{tittel:"",karakter:""}]; })}>+ Rad</Btn>
              </div>
            </div>
            <div style={{ borderTop:"0.5px solid var(--color-border-tertiary)", paddingTop:14 }}>
              <div style={{ fontSize:11, fontWeight:600, letterSpacing:"0.07em", textTransform:"uppercase", color:"var(--color-text-secondary)", marginBottom:10 }}>Sluttkarakter etter konsultasjon</div>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:10 }}>
                {grades.map(function(g) {
                  return (
                    <button key={g} onClick={()=>setKonsultertKarakter(function(prev){ return prev===g?"":g; })} style={{
                      padding:"6px 16px", borderRadius:6, fontSize:14, cursor:"pointer", fontFamily:"inherit",
                      background:konsultertKarakter===g?A:"transparent",
                      color:konsultertKarakter===g?"#fff":"var(--color-text-primary)",
                      border:"1px solid "+(konsultertKarakter===g?A:"var(--color-border-secondary)"),
                      fontWeight:konsultertKarakter===g?600:400,
                    }}>{g}</button>
                  );
                })}
              </div>
              <textarea style={{ ...inp, minHeight:56, resize:"vertical" }} value={konsultertBegrunnelse}
                onChange={e=>setKonsultertBegrunnelse(e.target.value)}
                placeholder="Notat fra konsultasjonen (valgfritt)…" />
            </div>
          </div>
        )}
      </div>

      <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
        <Btn onClick={doSave}>Lagre</Btn>
        <Btn secondary onClick={doPrint}>🖨 Skriv ut</Btn>
        <Btn secondary onClick={()=>go("prosjektElever",fag.id,prosjekt.id)}>Avbryt</Btn>
      </div>
    </div>
  );
}


function App() {
  const [data, setData] = useState(EMPTY);
  const [pg, setPg] = useState({ view:"oversikt", fid:null, oid:null, elevNr:null, tab:"info" });
  const [msg, setMsg] = useState("");
  const [ok, setOk] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [syncBanner, setSyncBanner] = useState(null);
  // Navneliste: lives only in memory, never persisted. {[elevNr]: name}
  const [navneliste, setNavneliste] = useState({});
  const [showNavn, setShowNavn] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        const raw = localStorage.getItem(SK);
        if (raw) {
          const saved = JSON.parse(raw);
          // Detect old model (fag have 'rubrikk' but no 'ferdighetskriterier')
          const isOld = saved.fag?.length > 0 && saved.fag[0].rubrikk && !saved.fag[0].ferdighetskriterier;
          if (isOld) {
            // Migrate: keep antallElever, replace fag with HARDFAG
            const migratedFag = HARDFAG.map(hf => {
              const old = saved.fag.find(f => f.id === hf.id);
              return old ? { ...hf, antallElever: old.antallElever || 30 } : hf;
            });
            setData({ fag: migratedFag, oppgaver: [], vurderinger: [] });
          } else if (saved.fag?.length === 0) {
            setData({ ...saved, fag: HARDFAG });
          } else {
            // New model — always take kjerneelementer + ferdighetskriterier from HARDFAG
            // (hard-coded rubrikk; user data = antallElever, elevStart, kompetansemål only)
            const merged = {
              ...saved,
              prosjekter: saved.prosjekter || [],
              prosjektVurderinger: saved.prosjektVurderinger || [],
              fag: saved.fag.map(sf => {
                const hf = HARDFAG.find(h => h.id === sf.id);
                if (!hf) return sf;
                return {
                  ...sf,
                  kjerneelementer: hf.kjerneelementer,
                  ferdighetskriterier: hf.ferdighetskriterier,
                  kompetansemål: sf.kompetansemål?.some(m => m.tekst) ? sf.kompetansemål : hf.kompetansemål,
                };
              })
            };
            setData(merged);
          }
        } else {
          setData({ fag: HARDFAG, oppgaver: [], vurderinger: [] });
        }
      } catch { setData({ fag: HARDFAG, oppgaver: [], vurderinger: [] }); }
      setOk(true);
    })();
    const interval = setInterval(() => setSyncBanner("remind-up"), 40 * 60 * 1000);
    return () => clearInterval(interval);
  }, []);

  const save = async nd => {
    setData(nd);
    try { localStorage.setItem(SK, JSON.stringify(nd)); flash("Lagret ✓"); }
    catch(e) { flash("⚠ Lagring feilet: " + e.message); }
  };
  const flash = m => { setMsg(m); setTimeout(() => setMsg(""), 2200); };
  const [showDriveImport, setShowDriveImport] = useState(false);
  const [driveFiles, setDriveFiles] = useState([]);
  const [driveLoading, setDriveLoading] = useState(false);

  const syncUp = async () => {
    try { const name = await driveExport(data); flash("Lagret til Drive: " + name + " ✓"); }
    catch(e) { flash("Eksport feilet: " + e.message); }
  };
  const syncDown = async () => {
    setDriveLoading(true);
    try {
      const { files, accountEmail } = await driveListFiles();
      setDriveFiles({ files, accountEmail });
      setShowDriveImport(true);
    } catch(e) { flash("Kunne ikke hente filer: " + e.message); }
    finally { setDriveLoading(false); }
  };
  const go = (view, fid, oid = null, elevNr = null, tab = null) => {
    const next = { view, fid: fid ?? pg.fid, oid: oid ?? pg.oid, elevNr: elevNr ?? pg.elevNr, tab: tab ?? pg.tab };
    window.history.pushState(next, "");
    setPg(next);
  };
  const nav = (view, fid = null, oid = null, elevNr = null) => {
    const next = { view, fid, oid, elevNr, tab:"info" };
    window.history.pushState(next, "");
    setPg(next);
  };

  useEffect(() => {
    window.history.replaceState(pg, "");
    const onPop = e => { if (e.state?.view) setPg(e.state); };
    window.addEventListener("popstate", onPop);
    return () => window.removeEventListener("popstate", onPop);
  }, []);

  const eksport = () => {
    const dato = new Date().toISOString().slice(0,10);
    const _b=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const _a=document.createElement("a"); _a.href=URL.createObjectURL(_b); _a.download=`vurdering-backup-${dato}.json`; _a.click();
  };
  const import_ = e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        const inn = JSON.parse(ev.target.result);
        if (inn.fag || inn.oppgaver || inn.vurderinger) {
          if (window.confirm("Erstatt alle data med importert fil?")) {
            const nd = {
              fag: inn.fag||data.fag,
              oppgaver: inn.oppgaver||[],
              vurderinger: inn.vurderinger||[],
              prosjekter: inn.prosjekter||[],
              prosjektVurderinger: inn.prosjektVurderinger||[],
            };
            save(nd); alert("Import fullført.");
          }
        } else { alert("Ugyldig fil"); }
      } catch { alert("Ugyldig fil"); }
    };
    r.readAsText(f); e.target.value = "";
  };

  const fag = data.fag.find(f => f.id === pg.fid);
  const opp = data.oppgaver.find(o => o.id === pg.oid);

  if (!ok) return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh",
      fontFamily:"'Libre Baskerville',serif", color:P }}>Laster…</div>
  );

  return (
    <div style={{ fontFamily:"'IBM Plex Sans',-apple-system,sans-serif", background:"var(--color-background-tertiary)", minHeight:"100vh", color:"var(--color-text-primary)" }}>
      {syncBanner && (
        <div style={{ background: P, color:"#fff", padding:"10px 20px", display:"flex", alignItems:"center", gap:12, fontSize:13 }}>
          <span style={{ flex:1 }}>⏰ 40 minutter siden sist — husk å lagre sikkerhetskopi til Drive.</span>
          <button onClick={async()=>{ await syncUp(); setSyncBanner(null); }} style={{ background:"#fff", color:P, border:"none", borderRadius:5, padding:"5px 14px", fontSize:12, fontWeight:600, cursor:"pointer", fontFamily:"inherit" }}>↑ Lagre nå</button>
          <button onClick={()=>setSyncBanner(null)} style={{ background:"transparent", border:"none", color:"rgba(255,255,255,0.7)", fontSize:18, cursor:"pointer", lineHeight:1, padding:"0 4px" }}>×</button>
        </div>
      )}
      {showSettings && <SettingsModal onClose={()=>setShowSettings(false)} />}
      {showNavn && <NavnModal navneliste={navneliste} setNavneliste={setNavneliste} onClose={()=>setShowNavn(false)} />}
      {showDriveImport && (
        <DriveImportModal
          files={driveFiles?.files || []}
          accountEmail={driveFiles?.accountEmail}
          onImport={async (fileId) => {
            try {
              const d = await driveImportFile(fileId);
              if (d && (d.fag || d.oppgaver || d.vurderinger)) {
                const nd = {
                  fag: (d.fag||[]).map(sf => {
                    const hf = HARDFAG.find(h => h.id === sf.id);
                    if (!hf) return sf;
                    return { ...sf, kjerneelementer: hf.kjerneelementer, ferdighetskriterier: hf.ferdighetskriterier,
                      kompetansemål: sf.kompetansemål?.some(m => m.tekst) ? sf.kompetansemål : hf.kompetansemål };
                  }),
                  oppgaver: d.oppgaver||[], vurderinger: d.vurderinger||[],
                  prosjekter: d.prosjekter||[], prosjektVurderinger: d.prosjektVurderinger||[],
                };
                setData(nd);
                localStorage.setItem(SK, JSON.stringify(nd));
                flash("Importert ✓");
              }
            } catch(e) { flash("Import feilet: " + e.message); }
            setShowDriveImport(false);
          }}
          onClose={()=>setShowDriveImport(false)}
        />
      )}
      <header style={{ background:P, padding:"0 20px", height:50, display:"flex", alignItems:"center", gap:14, position:"sticky", top:0, zIndex:100 }}>
        <span style={{ fontFamily:"'Libre Baskerville',serif", fontSize:16, fontWeight:700, color:"#fff" }}>Vurdering</span>
        <span style={{ color:"rgba(255,255,255,0.4)", fontSize:12 }}>Ren Powell · Vågen vgs.</span>
        <div style={{ flex:1 }} />
        {msg && <span style={{ color:"#9FE1CB", fontSize:12 }}>{msg}</span>}
        <button onClick={syncDown} disabled={driveLoading} style={hbtn} title="Hent sikkerhetskopi fra Drive">
          {driveLoading ? "..." : "↓ Hent"}
        </button>
        <button onClick={syncUp} style={hbtn} title="Lagre sikkerhetskopi til Drive">↑ Lagre</button>
        <button onClick={()=>setShowSettings(true)} style={hbtn}>⚙ Innstillinger</button>
        <button onClick={()=>setShowNavn(true)} style={{
          ...hbtn,
          background: Object.keys(navneliste).length > 0 ? "rgba(255,220,100,0.25)" : "transparent",
          borderColor: Object.keys(navneliste).length > 0 ? "rgba(255,220,100,0.6)" : "rgba(255,255,255,0.25)",
        }} title="Navneliste">
          🔑 {Object.keys(navneliste).length > 0 ? `${Object.keys(navneliste).length} navn` : "Navneliste"}
        </button>
        <button onClick={eksport} style={hbtn}>↓ Eksporter</button>
        <label style={{ ...hbtn, cursor:"pointer" }}>↑ Importer
          <input type="file" accept=".json" onChange={import_} style={{ display:"none" }} />
        </label>
      </header>

      <div style={{ display:"flex", minHeight:"calc(100vh - 50px)" }}>
        <nav style={{ width:210, background:"var(--color-background-primary)", borderRight:"0.5px solid var(--color-border-tertiary)", flexShrink:0, paddingTop:10 }}>
          <NB active={pg.view==="oversikt"} onClick={()=>nav("oversikt")}>Oversikt</NB>
          <div style={{ padding:"14px 14px 5px", fontSize:10, fontWeight:600, letterSpacing:"0.1em", color:"var(--color-text-secondary)", textTransform:"uppercase" }}>Fag</div>
          {data.fag.map(f => (
            <NB key={f.id} active={pg.fid===f.id && pg.view!=="oversikt"} onClick={()=>go("fag",f.id)}>
              <span style={{ flex:1, fontSize:13, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{f.navn}</span>
              <span style={{ fontSize:10, color:"var(--color-text-secondary)", background:"var(--color-background-secondary)", padding:"1px 5px", borderRadius:3, flexShrink:0, marginLeft:4 }}>{f.trinn}</span>
            </NB>
          ))}
        </nav>

        <main style={{ flex:1, padding:"28px 32px", minWidth:0, maxWidth:900 }}>
          {(() => {
            const backMap = {
              redigerFag:()=>go("fag",pg.fid),
              nyttOppgave:()=>go("fag",pg.fid,null,null,"oppgaver"),
              redigerOppgave:()=>go("fag",pg.fid,null,null,"oppgaver"),
              prosjektForm:()=>go("fag",pg.fid,null,null,"vurdering"),
              prosjektElever:()=>go("fag",pg.fid,null,null,"vurdering"),
              prosjektVurdering:()=>go("prosjektElever",pg.fid,pg.oid),
              vurderingOppgave:()=>go("fag",pg.fid,null,null,"vurdering"),
              vurderingElev:()=>go("fag",pg.fid,null,null,"vurdering"),
              vurderingForm:()=>go("vurderingOppgave",pg.fid,pg.oid),
            };
            const labelMap = {
              redigerFag:"← Tilbake til fag",
              nyttOppgave:"← Tilbake til oppgaver",
              redigerOppgave:"← Tilbake til oppgaver",
              vurderingOppgave:"← Tilbake til vurdering",
              vurderingElev:"← Tilbake til vurdering",
              vurderingForm:"← Tilbake til oppgave",
            };
            const fn = backMap[pg.view];
            return fn ? (
              <button onClick={fn} style={{ background:"none", border:"none", color:"var(--color-text-secondary)", fontSize:13, cursor:"pointer", padding:"0 0 18px", fontFamily:"inherit", display:"block" }}>
                {labelMap[pg.view]}
              </button>
            ) : null;
          })()}

          {pg.fid && ["nyttOppgave","redigerOppgave","vurderingOppgave","vurderingElev","vurderingForm","redigerFag","prosjektForm","prosjektElever","prosjektVurdering"].includes(pg.view) && fag && (() => {
            const tabs = [
              {id:"info",label:"Info"},{id:"rubrikk",label:"Rubrikk"},
              {id:"oppgaver",label:"Oppgaver"},{id:"vurdering",label:"Vurdering"},
              {id:"elever",label:`Elever (${fag.antallElever})`},
            ];
            const activeTab = pg.view==="nyttOppgave"||pg.view==="redigerOppgave" ? "oppgaver"
              : ["vurderingOppgave","vurderingElev","vurderingForm","prosjektForm","prosjektElever","prosjektVurdering"].includes(pg.view) ? "vurdering"
              : pg.view==="redigerFag" ? "info" : pg.tab;
            return (
              <div style={{ display:"flex", borderBottom:"0.5px solid var(--color-border-tertiary)", marginBottom:22 }}>
                {tabs.map(t => (
                  <button key={t.id} onClick={()=>go("fag",pg.fid,null,null,t.id)} style={{
                    padding:"7px 16px", border:"none", cursor:"pointer", background:"transparent", fontFamily:"inherit",
                    fontSize:13, color:t.id===activeTab?A:"var(--color-text-secondary)", fontWeight:t.id===activeTab?600:400,
                    borderBottom:`2px solid ${t.id===activeTab?A:"transparent"}`, marginBottom:-1,
                  }}>{t.label}</button>
                ))}
              </div>
            );
          })()}

          {pg.view==="oversikt" && <Oversikt data={data} go={go} nav={nav} />}
          {pg.view==="fag" && fag && <FagView fag={fag} data={data} save={save} go={go} nav={nav} tab={pg.tab||"info"} setTab={t=>go("fag",pg.fid,null,null,t)} />}
          {pg.view==="redigerFag" && fag && <FagForm data={data} save={save} go={go} nav={nav} fagEdit={fag} />}
          {pg.view==="nyttOppgave" && fag && <OppgaveForm data={data} save={save} go={go} nav={nav} fag={fag} flash={flash} />}
          {pg.view==="redigerOppgave" && fag && opp && <OppgaveForm data={data} save={save} go={go} nav={nav} fag={fag} oppgaveEdit={opp} flash={flash} />}
          {pg.view==="vurderingOppgave" && fag && opp && <VurderingOppgaveElever fag={fag} oppgave={opp} data={data} go={go} nav={nav} navneliste={navneliste} onOpenNavn={()=>setShowNavn(true)} />}
          {pg.view==="vurderingElev" && fag && <VurderingElevOppgaver fag={fag} elevNr={pg.elevNr} data={data} go={go} nav={nav} navneliste={navneliste} />}
          {pg.view==="vurderingForm" && fag && opp && <VurderingForm key={`${pg.oid}-${pg.elevNr}`} fag={fag} oppgave={opp} elevNr={pg.elevNr} data={data} save={save} go={go} nav={nav} navneliste={navneliste} />}
          {pg.view==="prosjektForm" && fag && <ProsjektForm fag={fag} data={data} save={save} go={go} prosjektEdit={pg.oid?(data.prosjekter||[]).find(p=>p.id===pg.oid):null} />}
          {pg.view==="prosjektElever" && fag && (() => { const proj=(data.prosjekter||[]).find(p=>p.id===pg.oid); return proj?<ProsjektElever fag={fag} prosjekt={proj} data={data} save={save} go={go} nav={nav} navneliste={navneliste} onOpenNavn={()=>setShowNavn(true)} />:null; })()}
          {pg.view==="prosjektVurdering" && fag && (() => { const proj=(data.prosjekter||[]).find(p=>p.id===pg.oid); return proj?<ProsjektVurderingForm fag={fag} prosjekt={proj} elevNr={pg.elevNr} data={data} save={save} go={go} nav={nav} navneliste={navneliste} />:null; })()}
        </main>
      </div>
    </div>
  );
}


function Oversikt({ data, go, nav }) {
  return (
    <div>
      <h1 style={h1}>Oversikt</h1>
      <p style={{ color:"var(--color-text-secondary)", marginBottom:24, fontSize:14 }}>
        Ren Powell · Vågen vgs.
      </p>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))", gap:14 }}>
        {data.fag.map(f => {
          const nOpp = data.oppgaver.filter(o => o.fagId===f.id && !o.arkivert).length;
          return (
            <div key={f.id} style={{ ...card, cursor:"pointer", opacity: f.antallElever===0 ? 0.45 : 1 }} onClick={()=>go("fag",f.id)}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:14 }}>
                <span style={{ fontFamily:"'Libre Baskerville',serif", fontSize:14, fontWeight:700, color:P, lineHeight:1.3, flex:1, marginRight:8 }}>{f.navn}</span>
                <div style={{ display:"flex", gap:5, flexShrink:0, alignItems:"center" }}>
                  {f.antallElever===0 && <span style={{ fontSize:10, background:"var(--color-border-secondary)", padding:"2px 6px", borderRadius:3, color:"var(--color-text-secondary)" }}>Ikke aktiv</span>}
                  <span style={{ fontSize:10, background:"var(--color-background-secondary)", padding:"2px 6px", borderRadius:3, color:"var(--color-text-secondary)" }}>{f.trinn}</span>
                </div>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10 }}>
                <Stat label="Elever" val={f.antallElever} />
                <Stat label="Oppgaver" val={nOpp} />
                <Stat label="Kriterier" val={f.ferdighetskriterier?.length||0} />
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Stat({ label, val }) {
  return (
    <div>
      <div style={{ fontSize:18, fontWeight:600 }}>{val}</div>
      <div style={{ fontSize:11, color:"var(--color-text-secondary)" }}>{label}</div>
    </div>
  );
}

function FagView({ fag, data, save, go, nav, tab, setTab }) {
  const [nyttSkoleårModal, setNyttSkoleårModal] = React.useState(false);
  const tabs = [
    {id:"info",label:"Info"},{id:"rubrikk",label:"Rubrikk"},
    {id:"oppgaver",label:"Oppgaver"},{id:"vurdering",label:"Vurdering"},
    {id:"elever",label:`Elever (${fag.antallElever})`},
  ];

  const doNyttSkoleår = () => {
    const nyeOppgaver = data.oppgaver.map(o =>
      o.fagId === fag.id && !o.arkivert ? { ...o, arkivert: true } : o
    );
    const nyeProsjekter = (data.prosjekter||[]).filter(p => p.fagId !== fag.id);
    const nyePV = (data.prosjektVurderinger||[]).filter(pv => {
      const p = (data.prosjekter||[]).find(x => x.id === pv.prosjektId);
      return p?.fagId !== fag.id;
    });
    save({ ...data, oppgaver: nyeOppgaver, prosjekter: nyeProsjekter, prosjektVurderinger: nyePV });
    setNyttSkoleårModal(false);
    go("redigerFag", fag.id);
  };

  return (
    <div>
      {nyttSkoleårModal && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.55)", zIndex:2000,
          display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
          <div style={{ background:"#fff", borderRadius:12, padding:28, width:440, display:"flex", flexDirection:"column", gap:18 }}>
            <div>
              <h2 style={{ fontFamily:"'Libre Baskerville',serif", fontSize:17, color:RD, margin:"0 0 8px" }}>
                Nytt skoleår — {fag.navn}
              </h2>
              <p style={{ fontSize:13, lineHeight:1.7, color:"var(--color-text-primary)", margin:0 }}>
                Dette vil:
              </p>
              <ul style={{ fontSize:13, lineHeight:1.9, color:"var(--color-text-primary)", margin:"8px 0 0 18px", padding:0 }}>
                <li>Flytte alle aktive oppgaver til arkivet</li>
                <li>Beholde alle vurderinger (historisk data)</li>
                <li>Slette prosjekter og prosjektvurderinger for dette faget</li>
                <li>Åpne Rediger fag så du kan oppdatere elevnumre</li>
              </ul>
              <p style={{ fontSize:12, color:RD, marginTop:12, fontStyle:"italic" }}>
                Prosjektdata kan ikke gjenopprettes. Eksporter karakterlisten først hvis du trenger den.
              </p>
            </div>
            <div style={{ display:"flex", gap:10 }}>
              <button onClick={doNyttSkoleår} style={{ padding:"9px 22px", background:RD, color:"#fff",

function FagForm({ data, save, go, nav, fagEdit }) {
  const wasInaktiv = fagEdit?.antallElever === 0;
  const [inaktiv, setInaktiv] = useState(wasInaktiv);
  // Only use saved values if fag was active; don't fall back to 30
  const savedStart = (fagEdit?.elevStart > 0) ? fagEdit.elevStart : 1;
  const savedEnd = (fagEdit?.antallElever > 0) ? fagEdit.elevStart + fagEdit.antallElever - 1 : savedStart;
  const [start, setStart] = useState(savedStart);
  const [slutt, setSlutt] = useState(savedEnd);
  const antall = inaktiv ? 0 : Math.max(1, slutt - start + 1);
  const [km, setKm] = useState(() =>
    (fagEdit?.kompetansemål?.length ? fagEdit.kompetansemål : [{id:uid(), tekst:""}])
  );

  const addKm = () => setKm(k => [...k, {id:uid(), tekst:""}]);
  const delKm = id => setKm(k => k.filter(m => m.id !== id));
  const setKmTekst = (id, tekst) => setKm(k => k.map(m => m.id===id ? {...m, tekst} : m));

  const [localKeVekt, setLocalKeVekt] = useState(fagEdit?.keVekt || {});
  const doSave = () => {
    const updated = data.fag.map(f => f.id===fagEdit.id ? {
      ...f,
      antallElever: antall,
      elevStart: inaktiv ? 0 : start,
      kompetansemål: km.filter(m => m.tekst.trim()),
      keVekt: localKeVekt,
    } : f);
    save({ ...data, fag: updated });
    go("fag", fagEdit.id);
  };
  return (
    <div>
      <h1 style={h1}>Rediger: {fagEdit?.navn}</h1>
      <Section title="Elevnumre">
        <p style={{ ...hint, marginBottom:14 }}>
          Bruk faste nummerserier per klasse så samme elev har samme kode på tvers av fag.
          F.eks. Vg3: 1–30 · Vg2: 31–60 · Vg1: 61–90.
        </p>
        <label style={{ display:"flex", alignItems:"center", gap:8, fontSize:13, cursor:"pointer", marginBottom:16 }}>
          <input type="checkbox" checked={inaktiv} onChange={e=>setInaktiv(e.target.checked)} />
          Underviser ikke dette faget dette skoleåret
        </label>
        {!inaktiv && (
          <div style={{ display:"grid", gridTemplateColumns:"120px 120px auto", gap:14, alignItems:"end" }}>
            <Fld label="Første elevnummer">
              <input style={{ ...inp }} type="number" min={1} max={900} value={start}
                onChange={e => { const v = +e.target.value||1; const count = slutt - start; setSlutt(v + count); setStart(v); }} />
            </Fld>
            <Fld label="Siste elevnummer">
              <input style={{ ...inp }} type="number" min={start} max={900} value={slutt}
                onChange={e => setSlutt(Math.max(start, +e.target.value||start))} />
            </Fld>
            <div style={{ paddingBottom:2, fontSize:13, color:"var(--color-text-secondary)" }}>
              → <strong style={{ color:P }}>{antall}</strong> elever ({start}–{slutt})
            </div>
          </div>
        )}
        {inaktiv && (
          <p style={{ fontSize:13, color:"var(--color-text-secondary)", fontStyle:"italic" }}>
            Faget vises nedtonet i oversikten og telles ikke.
          </p>
        )}
      </Section>

      <Section title="Kjerneelement-vekting">
        <p style={hint}>Setter standardvekt per kjerneelement. Refleksjon og analyse teller Normal som standard.</p>
        <div style={{ display:"grid", gap:10, marginTop:10 }}>
          {[...((fagEdit?.kjerneelementer||[]).filter(k=>!k.erTillegg)), ...((fagEdit?.kjerneelementer||[]).filter(k=>k.erTillegg))].map(k => {
            const current = (localKeVekt||{})[k.id] || "normal";
            return (
              <div key={k.id} style={{ display:"flex", alignItems:"center", gap:12, justifyContent:"space-between",
                paddingBottom:8, borderBottom:"0.5px solid var(--color-border-tertiary)" }}>
                <span style={{ fontSize:13, color:"var(--color-text-primary)", flex:1 }}>
                  {k.erTillegg ? <em>* {k.navn}</em> : k.navn}
                </span>
                <div style={{ display:"flex", gap:4 }}>
                  {["lav","normal","høy"].map(v => (
                    <button key={v} onClick={()=>setLocalKeVekt(prev=>({...prev,[k.id]:v}))} style={{
                      padding:"3px 10px", borderRadius:4, fontSize:12, cursor:"pointer",
                      fontFamily:"inherit", fontWeight: current===v ? 600 : 400,
                      background: current===v ? (v==="høy"?P:v==="lav"?"#eee":"var(--color-background-secondary)") : "transparent",
                      color: current===v ? (v==="høy"?"#fff":"var(--color-text-primary)") : "var(--color-text-secondary)",
                      border: `1px solid ${current===v?(v==="høy"?P:"var(--color-border-secondary)"):"var(--color-border-tertiary)"}`,
                    }}>{v.charAt(0).toUpperCase()+v.slice(1)}</button>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      </Section>
      <Section title="Kompetansemål">
        <p style={hint}>Kompetansemål fra Udir er lagt inn. Du kan redigere, legge til eller slette.</p>
        <div style={{ display:"grid", gap:8, marginBottom:10 }}>
          {km.map((m, i) => (
            <div key={m.id} style={{ display:"flex", gap:8, alignItems:"flex-start" }}>
              <span style={{ paddingTop:9, color:"var(--color-text-secondary)", fontSize:12, minWidth:20 }}>{i+1}.</span>
              <textarea style={{ ...inp, minHeight:52, resize:"vertical", flex:1 }}
                value={m.tekst} onChange={e=>setKmTekst(m.id, e.target.value)}
                placeholder="Kompetansemål…" />
              {km.length > 1 && <button style={xbtn} onClick={()=>delKm(m.id)}>×</button>}
            </div>
          ))}
        </div>
        <Btn secondary sm onClick={addKm}>+ Legg til mål</Btn>
      </Section>

      <div style={{ display:"flex", gap:10 }}>
        <Btn onClick={doSave}>Lagre</Btn>
        <Btn secondary onClick={()=>go("fag",fagEdit.id)}>Avbryt</Btn>
      </div>
    </div>
  );
}

function FagInfo({ fag, data }) {
  const oppgaver = data.oppgaver.filter(o => o.fagId===fag.id && !o.arkivert);
  const vurderinger = data.vurderinger.filter(v => v.fagId===fag.id);

  return (
    <div style={{ display:"grid", gap:16 }}>
      <div style={card}>
        <h3 style={sh3}>Kompetansemål — dekningsgrad</h3>

          Viser hvilke av fagets kompetansemål som er dekket av aktive oppgaver, og hvilke som er vurdert.
        </p>
        {fag.kompetansemål?.some(m => m.tekst) ? (
          <div style={{ display:"grid", gap:10 }}>

              const cfg = ingenOk

                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:13, lineHeight:1.6, color:"var(--color-text-primary)" }}>{m.tekst}</div>
                    <div style={{ fontSize:11, color:cfg.text, marginTop:3, fontWeight:500 }}>
                      {cfg.label}
                      {oppgaverMedMål.length > 0 && ` · ${oppgaverMedMål.map(o => {
                        const t = o.kompetansemålType?.[m.id];

                      }).join(", ")}`}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>        ) : (
          <p style={{ fontSize:13, color:"var(--color-text-secondary)" }}>Ingen kompetansemål lagt til for dette faget.</p>
        )}
      </div>
    </div>
  );
}

function FagRubrikk({ fag }) {
  const ke = fag.kjerneelementer || [];
  const fd = fag.ferdighetskriterier || [];
  const regular = ke.filter(k => !k.erTillegg);
  const tillegg = ke.filter(k => k.erTillegg);
  const udirCount = fd.filter(f => !f.erTillegg).length;
  const tilleggCount = fd.filter(f => f.erTillegg).length;
  const renderKE = (k) => {
    const krit = fd.filter(f => f.kjerneelementId===k.id);
    if (!krit.length) return null;
    return (
      <div key={k.id} style={{ ...card, marginBottom:18 }}>
        <h3 style={{ ...sh3, borderBottom:"0.5px solid var(--color-border-tertiary)", paddingBottom:10, marginBottom:14 }}>
          {k.erTillegg ? `* ${k.navn}` : k.navn}
          {k.erTillegg && <span style={{ fontSize:11, fontWeight:400, color:"var(--color-text-secondary)", marginLeft:8 }}>Lærerens tillegg</span>}
        </h3>
        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
            <thead>
              <tr style={{ background:P }}>
                {["Kriterium","Ikke ennå","Grunnleggende (2–3)","Solid (4–5)","Utmerket (6)"].map((h,i) => (
                  <th key={i} style={{ padding:"8px 10px", textAlign:"left", fontWeight:500, fontSize:11, color:"#fff" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {krit.map((r,i) => (
                <tr key={r.id} style={{ borderBottom:"0.5px solid var(--color-border-tertiary)", background:i%2===0?"transparent":"#FAFAF8" }}>
                  <td style={{ ...tdc, fontWeight:600, color:P, width:"18%", minWidth:140 }}>
                    {r.kriterium}
                    {r.descriptor && <div style={{ fontSize:11, fontWeight:400, color:"var(--color-text-secondary)", marginTop:2 }}><em>{r.descriptor}</em></div>}
                  </td>
                  <td style={{ ...tdc, color:"#555555", background:"#F0F0EE" }}>{getPåveiText(r)}</td>
                  <td style={{ ...tdc, color:"#5B7A9A", background:"#F0F4F8" }}>{r.lav}</td>
                  <td style={{ ...tdc, color:"#7A5E00", background:"#FFFBF0" }}>{r.middels}</td>

          Ferdighetskriteriene under hvert element er lærerens operasjonalisering av kompetansemålene —
          konkrete, observerbare handlinger som danner grunnlaget for vurderingen.
          {tillegg.length>0 && ` Seksjoner merket * er lærerens egne tillegg og dekker kompetanse som ikke har et dedikert kjernelement i læreplanen.`}
        </p>

            const n = fd.filter(f=>f.kjerneelementId===k.id).length;

// Returns the array of student numbers for a fag
const elevNrs = fag => Array.from({length: fag.antallElever}, (_, i) => (fag.elevStart || 1) + i);

function FagElever({ fag, data }) {
  const vurd = data.vurderinger.filter(v => v.fagId===fag.id);
  const oppgaver = data.oppgaver.filter(o => o.fagId===fag.id && !o.arkivert).sort((a,b)=>(a.dato||"").localeCompare(b.dato||""));
  if (oppgaver.length === 0) return (
    <div><p style={{ ...hint, marginBottom:16 }}>Elevnummer brukes i stedet for navn (personvern).</p>
      <PH msg="Ingen oppgaver ennå — opprett oppgaver for å se karakteroversikten." /></div>
  );
  const FLAG_GRADES = ["Ikke bestått","💬 Samtale"];
  const gradeColor = k => {
    if (!k) return "var(--color-text-secondary)";
    if (FLAG_GRADES.includes(k)||k==="IV") return "var(--color-text-secondary)";
    const n = parseInt(k); if (n>=5) return "#27AE60"; if (n>=4) return "#9E7022"; return "#5B9FD4";
  };
  return (
    <div>
      <p style={{ ...hint, marginBottom:16 }}>Elevnummer brukes i stedet for navn (personvern).</p>
      <div style={{ overflowX:"auto" }}>
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13, tableLayout:"fixed" }}>
          <thead>
            <tr style={{ background:P }}>
              <th style={{ padding:"9px 12px", textAlign:"left", fontWeight:500, fontSize:12, color:"#fff", width:70 }}>Elev</th>
              {oppgaver.map(o => (
                <th key={o.id} style={{ padding:"9px 10px", textAlign:"center", fontWeight:500, fontSize:11, color:"#fff" }}>
                  <div style={{ overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }} title={o.tittel}>{o.tittel}</div>
                </th>
              ))}
              <th style={{ padding:"9px 10px", textAlign:"center", fontWeight:500, fontSize:11, color:"rgba(255,255,255,0.7)", width:64 }}>Snitt</th>
            </tr>
          </thead>
          <tbody>
            {elevNrs(fag).map(nr => {
              const grades = oppgaver.map(o => {
                const v = vurd.find(v => v.oppgaveId===o.id && v.elevNr===nr);
                return v ? getEffectiveGrade(v) : null;
              });
              const numericGrades = grades.map(g=>parseInt(g)).filter(n=>!isNaN(n));
              const snitt = numericGrades.length ? (numericGrades.reduce((a,b)=>a+b,0)/numericGrades.length).toFixed(1) : null;
              const flagged = grades.some(g => g && FLAG_GRADES.includes(g));
              return (
                <tr key={nr} style={{ borderBottom:"0.5px solid var(--color-border-tertiary)" }}>
                  <td style={{ padding:"8px 12px", fontWeight:500, fontSize:13 }}>#{nr}</td>
                  {grades.map((g,gi) => (
                    <td key={gi} style={{ padding:"8px 10px", textAlign:"center" }}>
                      <span style={{ fontWeight:600, fontSize:14, color:gradeColor(g) }}>
                        {g==="💬 Samtale"?"💬":g==="Ikke bestått"?"IB":g||"—"}
                      </span>
                    </td>
                  ))}
                  <td style={{ padding:"8px 10px", textAlign:"center" }}>
                    <span style={{ fontSize:13, color:"var(--color-text-secondary)", fontWeight:500 }}>
                      {snitt||"—"}{flagged?" 🏳️":""}
                    </span>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}


// ── Print/export functions ────────────────────────────────────────────
function buildFeedbackTekst(v, oppgave, fag) {
  const fd = fag.ferdighetskriterier || [];
  const krit = fd.filter(r => oppgave.ferdighetIds?.includes(r.id));
  const graderte = krit.filter(r => v.rubrikknivå?.[r.id] && !v.ekskluderteFerdigheter?.includes(r.id));
  const finalK = getEffectiveGrade(v);
  const isBeståttForm = oppgave.vurderingsform === "bestått";
  let t = `${fag.navn} — ${oppgave.tittel}\nRen Powell · Vågen vgs.\n\n`;
  if (isBeståttForm) {
    t += `Vurdering: ${finalK||"—"}\n\n`;
  } else {
    t += `Karakter ${finalK||"—"} er satt på bakgrunn av kompetansemålene i ${fag.navn}.\n\n`;
  }
  if (v.stjerne1||v.stjerne2) {
    t += `Det du gjorde godt:\n`;
    if (v.stjerne1) t += `⭐ ${v.stjerne1}\n`;
    if (v.stjerne2) t += `⭐ ${v.stjerne2}\n`;
    t += "\n";
  }
  if (isBeståttForm) {
    if (krit.length > 0) {
      t += "Vurderingskriterier:\n";
      krit.forEach(r => { t += `- ${r.kriterium}\n`; });
      t += "\n";
    }
  } else {
    const ke = fag.kjerneelementer||[];
    ke.forEach(k => {
      const keKrit = krit.filter(r => r.kjerneelementId===k.id && (v.rubrikknivå?.[r.id] || v.ekskluderteFerdigheter?.includes(r.id)));
      if (!keKrit.length) return;
      t += `${k.navn}\n`;
      keKrit.forEach(r => {
        if (v.ekskluderteFerdigheter?.includes(r.id)) { t += `  ${r.kriterium} — Ikke vurdert\n`; return; }
        const niv = v.rubrikknivå[r.id];
        const nivTekst = niv==="påvei" ? getPåveiText(r) : r[niv];
        const grade = v.criterionGrade?.[r.id];
        t += `  ${r.kriterium} — ${bandLabelText(niv,grade)}: ${nivTekst}\n`;
        if (v.kommentarer?.[r.id]) t += `  (${v.kommentarer[r.id]})\n`;
      });
      t += "\n";
    });
    if (["1","2","3","4","5","6"].includes(v.justerKarakter) && (!v.oppgaveKrav || v.oppgaveKrav==="alt")) {
      t += v.justerBegrunnelse
        ? `Lærerens justering basert på helhetsinntrykk: ${v.justerBegrunnelse}\n\n`
        : `Karakteren er justert til ${v.justerKarakter} av lærer basert på helhetsinntrykk.\n\n`;
    } else if (v.justerBegrunnelse) {
      t += `Lærerens justering basert på helhetsinntrykk: ${v.justerBegrunnelse}\n\n`;
    }
  }
  if (v.framovermelding) t += `Framover:\n${v.framovermelding}\n\n`;
  if (!isBeståttForm && v.oppgaveKrav && v.oppgaveKrav !== "alt") {
    const rawK = v.bandPick || (v.beregnetKarakter ? String(v.beregnetKarakter) : null);
    const modK = applyOppgaveKrav(rawK, v.oppgaveKrav);
    if (rawK && modK !== rawK) {
      const delta = v.oppgaveKrav==="nei" ? "−1" : "−¼";
      const verb = v.oppgaveKrav==="nei" ? "ikke" : "delvis";
      t += v.justerKarakter
        ? `${v.oppgaveKravMerknad?"Mangler: "+v.oppgaveKravMerknad+" · ":""}Justert fra ${rawK} til ${modK} for ${verb} oppgavekrav (${delta}) — deretter satt til ${v.justerKarakter} av lærer\n\n`
        : `${v.oppgaveKravMerknad?"Mangler: "+v.oppgaveKravMerknad+" · ":""}Justert fra ${rawK} — oppfylte ${verb} oppgavens krav (${delta})\n\n`;
    }
  }
  t += `---\nSe oppgaveteksten for kompetansemål.\n\nMed vennlig hilsen\nRen Powell, Vågen vgs.`;
  return t;
}

function buildKeVektHtml(oppgave, fag) {
  const ke = fag.kjerneelementer || [];
  const fd = fag.ferdighetskriterier || [];
  const assessed = ke.filter(k => fd.some(r => r.kjerneelementId===k.id && oppgave.ferdighetIds?.includes(r.id)));
  if (!assessed.length) return "";
  const allNormal = assessed.every(k => {
    const v = oppgave.keVektOverride?.[k.id] || fag.keVekt?.[k.id] || "normal";
    return v === "normal";
  });
  if (allNormal) {
    return `<div style="margin:10px 0 4px;font-size:11px;color:#aaa;font-style:italic">Alle kjerneelementer er vektet likt i denne oppgaven.</div>`;
  }
  const items = assessed.map(k => {
    const v = oppgave.keVektOverride?.[k.id] || fag.keVekt?.[k.id] || "normal";
    const color = v==="høy" ? "#1A5C2A" : v==="lav" ? "#7A5E00" : "#666";
    const bg = v==="høy" ? "#D4EDDA" : v==="lav" ? "#FFF3CC" : "#f0f0f0";
    return `<span style="display:inline-block;margin:2px 4px 2px 0;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:${v==="normal"?400:500};background:${bg};color:${color}">${k.navn}: ${v.charAt(0).toUpperCase()+v.slice(1)}</span>`;
  }).join("");
  return `<div style="margin:10px 0 4px;font-size:11px;color:#666">
    <span style="font-weight:600">Vekting:</span> ${items}
    <span style="color:#aaa;font-style:italic"> — kjerneelementer med Høy vekt teller mer i karakterberegningen.</span>
  </div>`;
}
