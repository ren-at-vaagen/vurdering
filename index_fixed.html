function exportKarakterliste(fag, data) {
  const oppgaver = data.oppgaver.filter(o => o.fagId===fag.id && !o.arkivert).sort((a,b)=>(a.dato||"").localeCompare(b.dato||""));
  const vurd = data.vurderinger.filter(v => v.fagId===fag.id);
  const header = ["Elev",...oppgaver.map(o=>o.tittel)];
  const rows = [header];
  elevNrs(fag).forEach(nr => {
    const row=[nr];
    oppgaver.forEach(o=>{const v=vurd.find(v=>v.oppgaveId===o.id&&v.elevNr===nr); row.push(getEffectiveGrade(v)||"");});
    rows.push(row);
  });
  const csv = rows.map(r=>r.join(";")).join("\n");
  const _b=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"}); const _a=document.createElement("a"); _a.href=URL.createObjectURL(_b); _a.download=`karakterer-${fag.navn}.csv`; _a.click();
}

function mdToHtml(text) {
  if (!text) return "";
  const lines = text.split("\n");
  let html = ""; let inList = false;
  lines.forEach(line => {
    const isBullet = /^[\-\*]\s+/.test(line);
    const rendered = line.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
    if (isBullet) {
      if (!inList) { html += "<ul style='margin:6px 0 6px 18px;padding:0'>"; inList = true; }
      html += `<li style='margin-bottom:3px'>${rendered.replace(/^[\-\*]\s+/, "")}</li>`;
    } else {
      if (inList) { html += "</ul>"; inList = false; }
      html += (line.trim() === "" ? "<br>" : rendered + "<br>");
    }
  });
  if (inList) html += "</ul>";
  return html;
}

function renderKritRow(r, f, upd, editingFerdighet, setEditingFerdighet, hideEdit) {
  const checked = f.ferdighetIds.includes(r.id);
  const ov = (f.ferdighetOverrides||{})[r.id] || {};
  const hasOverride = Object.keys(ov).length > 0;
  const isEditing = editingFerdighet === r.id;
  const setOv = (field, val) => {
    const newOv = {...(f.ferdighetOverrides||{}), [r.id]: {...ov, [field]: val}};
    if (!val.trim()) delete newOv[r.id][field];
    if (!Object.keys(newOv[r.id]).length) delete newOv[r.id];
    upd("ferdighetOverrides", newOv);
  };
  return (
    <div key={r.id} style={{ borderBottom:"0.5px solid var(--color-border-tertiary)", paddingBottom:8, marginBottom:8 }}>
      <div style={{ display:"flex", alignItems:"flex-start", gap:8 }}>
        <input type="checkbox" checked={checked} onChange={()=>{
          const ids = checked ? f.ferdighetIds.filter(x=>x!==r.id) : [...f.ferdighetIds, r.id];
          const newOv = {...(f.ferdighetOverrides||{})};
          if (!checked === false) delete newOv[r.id];
          upd("ferdighetIds", ids);
          upd("ferdighetOverrides", newOv);
          if (!checked === false) setEditingFerdighet(null);
        }} style={{ marginTop:3, flexShrink:0, cursor:"pointer" }} />
        <span style={{ flex:1, fontSize:12, lineHeight:1.5 }}>
          {ov.kriterium || r.kriterium}
          {(ov.descriptor || r.descriptor) ? <em style={{color:"var(--color-text-secondary)"}}> ({ov.descriptor || r.descriptor})</em> : null}
          {hasOverride && <span style={{ fontSize:10, color:A, marginLeft:6 }}>✎ tilpasset</span>}
        </span>
        {checked && !hideEdit && (
          <button onClick={()=>setEditingFerdighet(isEditing?null:r.id)} style={{
            fontSize:11, padding:"1px 7px", borderRadius:4, cursor:"pointer", fontFamily:"inherit",
            border:`1px solid ${isEditing?P:"var(--color-border-secondary)"}`,
            background:isEditing?"var(--color-background-secondary)":"transparent",
            color:isEditing?P:"var(--color-text-secondary)", flexShrink:0,
          }}>✎</button>
        )}
      </div>
      {checked && isEditing && !hideEdit && (
        <div style={{ marginTop:8, padding:"10px 12px", background:"var(--color-background-secondary)", borderRadius:6, display:"grid", gap:8 }}>
          <div style={{ fontSize:10, color:"var(--color-text-secondary)", fontWeight:600, letterSpacing:"0.06em", textTransform:"uppercase" }}>Tilpass for denne oppgaven</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:6 }}>
            <div>
              <div style={{ fontSize:10, color:"var(--color-text-secondary)", marginBottom:3 }}>Kriterium</div>
              <input style={{ ...inp, fontSize:12 }} value={ov.kriterium ?? r.kriterium} onChange={e=>setOv("kriterium",e.target.value)} />
            </div>
            <div>
              <div style={{ fontSize:10, color:"var(--color-text-secondary)", marginBottom:3 }}>Descriptor (valgfritt)</div>
              <input style={{ ...inp, fontSize:12 }} value={ov.descriptor ?? (r.descriptor||"")} onChange={e=>setOv("descriptor",e.target.value)} />
            </div>
          </div>
          {[["påvei","Ikke ennå"],["lav","Grunnleggende (2–3)"],["middels","Solid (4–5)"],["høy","Utmerket (6)"]].map(([field,label])=>(
            <div key={field}>
              <div style={{ fontSize:10, color:"var(--color-text-secondary)", marginBottom:3 }}>{label}</div>
              <textarea style={{ ...inp, fontSize:12, minHeight:52, resize:"vertical" }}
                value={ov[field] ?? (field==="påvei" ? "" : (r[field]||""))}
                placeholder={field==="påvei" ? getPåveiText(r) : ""}
                onChange={e=>setOv(field,e.target.value)} />
            </div>
          ))}
          <button onClick={()=>{ const newOv={...(f.ferdighetOverrides||{})}; delete newOv[r.id]; upd("ferdighetOverrides",newOv); setEditingFerdighet(null); }}
            style={{ fontSize:11, color:RD, background:"transparent", border:"none", cursor:"pointer", fontFamily:"inherit", textAlign:"left" }}>
            Tilbakestill til standard
          </button>
        </div>
      )}
    </div>
  );
}

function applyOverride(r, overrides) {
  const ov = overrides?.[r.id];
  if (!ov) return r;
  return { ...r, ...ov };
}

function buildOppgaveTekst(oppgave, fag) {
  const mål = (fag.kompetansemål||[]).filter(m => oppgave.kompetansemålIds?.includes(m.id));
  const fd = fag.ferdighetskriterier||[];
  const krit = fd.filter(r => oppgave.ferdighetIds?.includes(r.id)).map(r => applyOverride(r, oppgave.ferdighetOverrides));
  const fmt = d => d ? d.split("-").reverse().join(".") : "";
  const isBeståttForm = oppgave.vurderingsform === "bestått";
  const vtype = isBeståttForm ? "Bestått / Ikke bestått" : (oppgave.vurderingstype ? ({muntlig:"Muntlig",skriftlig:"Skriftlig",praktisk_muntlig:"Praktisk/muntlig"}[oppgave.vurderingstype]||oppgave.vurderingstype) : "");
  let t = "Ren Powell  ·  Vågen vgs  ·  "+fag.navn+"  ·  "+fag.trinn+"\n"+oppgave.tittel+"\n";
  const meta = [oppgave.dato&&"Gitt: "+fmt(oppgave.dato),oppgave.frist&&"Frist: "+fmt(oppgave.frist),vtype,oppgave.innleveringsmetode&&"Innlevering: "+oppgave.innleveringsmetode].filter(Boolean).join("  |  ");
  if (meta) t += meta+"\n";
  t += "\n";
  if (oppgave.kortBeskrivelse) t += oppgave.kortBeskrivelse+"\n\n";
  if (oppgave.ramme) t += "OPPGAVEN\n"+oppgave.ramme+"\n\n";
  if (oppgave.framgangsmåte) t += "FRAMGANGSMÅTE\n"+oppgave.framgangsmåte+"\n\n";
  if (oppgave.ressurser) t += "RESSURSER\n"+oppgave.ressurser+"\n\n";
  if (mål.length>0) { t += "KOMPETANSEMÅL\n"; mål.forEach((m,i)=>{const tp=oppgave.kompetansemålType?.[m.id];const tag=tp==="utøvende"?" (–A)":tp==="analytisk"?" (–U)":"";t+=(i+1)+". "+m.tekst+tag+"\n";}); t+="\n"; }
  if (krit.length>0) {
    t += "VURDERINGSKRITERIER\n\n";
    if (isBeståttForm) {
      krit.forEach(r=>{ t += "- "+r.kriterium+(r.descriptor?" ("+r.descriptor+")":"")+"\n"; });
    } else {
      if (oppgave.brukBloom) t += "Taksonominivå:\n  Ikke ennå:         Gjengir/presenterer fragmentert eller uten sammenheng\n  Grunnleggende (2–3): Gjengi og forstå\n  Solid (4–5):         Forklare og sammenligne\n  Utmerket (6):        Analysere, drøfte og skape\n\n";
      krit.forEach(r=>{
        t += r.kriterium+(r.descriptor?" ("+r.descriptor+")":"")+"\n";
        t += "  På vei:            "+getPåveiText(r)+"\n";
        t += "  Grunnleggende (2–3): "+r.lav+"\n";
        t += "  Solid (4–5):         "+r.middels+"\n";
        t += "  Utmerket (6):        "+r.høy+"\n\n";
      });
    }
  }
  return t;
}

function buildOppgaveHtml(oppgave, fag) {
  const mål = (fag.kompetansemål||[]).filter(m => oppgave.kompetansemålIds?.includes(m.id) && m.tekst);
  const fd = fag.ferdighetskriterier||[];
  const krit = fd.filter(r => oppgave.ferdighetIds?.includes(r.id)).map(r => applyOverride(r, oppgave.ferdighetOverrides));
  const ke = fag.kjerneelementer||[];
  const fmt = d => d ? d.split("-").reverse().join(".") : "";
  const isBeståttForm = oppgave.vurderingsform === "bestått";
  const vtype = isBeståttForm ? "Bestått / IB" : (oppgave.vurderingstype ? ({muntlig:"Muntlig",skriftlig:"Skriftlig",praktisk_muntlig:"Praktisk/muntlig"}[oppgave.vurderingstype]||oppgave.vurderingstype) : "");
  const imet = oppgave.innleveringsmetode || "";

  // Group krit by kjerneelement for the rubrikk table (only when not bestått)
  let kritTabell = "";
  const allKE = [...ke.filter(k=>!k.erTillegg), ...ke.filter(k=>k.erTillegg)];
  let firstTillegg = true;
  if (!isBeståttForm) allKE.forEach(k => {
    const keKrit = krit.filter(r => r.kjerneelementId===k.id);
    if (!keKrit.length) return;
    if (k.erTillegg && firstTillegg) {
      kritTabell += `<tr><td colspan="5" style="padding:4px 10px;border-top:1px dashed #ccc;font-size:10px;color:#888;font-style:italic">* Lærerens tillegg</td></tr>`;
      firstTillegg = false;
    }
    const effV = oppgave.keVektOverride?.[k.id] || fag.keVekt?.[k.id] || "normal";
    const vektTag = effV!=="normal" ? ` <span style="font-size:10px;font-weight:400;font-family:'IBM Plex Sans',sans-serif;color:${effV==="høy"?"#1A5C2A":"#7A5E00"};background:${effV==="høy"?"#D4EDDA":"#FFF3CC"};padding:1px 6px;border-radius:3px;margin-left:6px">${effV==="høy"?"↑ Høy vekt":"↓ Lav vekt"}</span>` : "";
    kritTabell += `<tr><td colspan="5" style="padding:8px 10px 2px;font-family:'Libre Baskerville',serif;font-size:11px;font-weight:700;color:${k.erTillegg?"#6B5030":"#1B3A2D"};background:${k.erTillegg?"#FDF6EC":"#F4F2EC"}">${k.erTillegg?"* ":""}${k.navn}${vektTag}</td></tr>`;
    keKrit.forEach((r,i) => {
      kritTabell += `<tr style="border-bottom:0.5px solid #e0dcd8;background:${i%2===0?"transparent":"#F9F7F5"}">
        <td style="padding:8px 10px;font-weight:600;color:#1B3A2D;width:18%">${r.kriterium}${r.descriptor?`<br><em style="font-weight:400;font-size:11px;color:#888">${r.descriptor}</em>`:""}</td>

        <td style="padding:8px 10px;color:#7A5E00;background:#FFFBF0">${r.middels}</td>
        <td style="padding:8px 10px;color:#1A5C2A;background:#F0FAF4">${r.høy}</td>
      </tr>`;
    });
  });

  const metaPills = [vtype, imet].filter(Boolean).map(t =>
    `<span style="background:#F0EDE8;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:500">${t}</span>`
  ).join(" ");
  const obligatoriskBadge = oppgave.obligatorisk
    ? `<span style="background:#FDF0EE;color:#B53A2F;border:1px solid #E8C4BE;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:600">Obligatorisk</span>`
    : "";

  return `<!DOCTYPE html><html lang="no"><head><meta charset="utf-8"><title>${oppgave.tittel} — ${fag.navn}</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>

    h1{font-family:'Libre Baskerville',serif;font-size:22px;color:#1B3A2D;margin-bottom:4px}
    .meta{display:flex;gap:16px;font-size:12px;color:#6B6459;flex-wrap:wrap;align-items:center;margin-top:8px}
    .frist{color:#B53A2F;font-weight:700}
    h2{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#6B6459;margin:22px 0 8px;padding-bottom:4px;border-bottom:1px solid #eee}
    .ingress{font-size:15px;line-height:1.7;font-weight:500;margin-bottom:16px;padding:14px 16px;background:#F4F2EC;border-left:3px solid #1B3A2D;border-radius:0 6px 6px 0;white-space:pre-wrap}

  ${mål.length > 0 ? `<h2>Kompetansemål</h2><ol>${mål.map(m=>{const t=oppgave.kompetansemålType?.[m.id];const tag=t==="utøvende"?" <span style='font-size:11px;font-weight:700;color:#7A5E00;'>(–A)</span>":t==="analytisk"?" <span style='font-size:11px;font-weight:700;color:#1A4A6B;'>(–U)</span>":"";return `<li>${m.tekst}${tag}</li>`;}).join("")}</ol>` : ""}

}

          {oppgave.ramme && <><div style={{ fontSize:11, fontWeight:600, letterSpacing:"0.08em", textTransform:"uppercase", color:"#6B6459", margin:"18px 0 6px", paddingBottom:3, borderBottom:"1px solid #eee" }}>Oppgaven</div><div style={{ marginBottom:10, lineHeight:1.75, color:"#333" }} dangerouslySetInnerHTML={{__html:mdToHtml(oppgave.ramme)}} /></>}
          {oppgave.framgangsmåte && <><div style={{ fontSize:11, fontWeight:600, letterSpacing:"0.08em", textTransform:"uppercase", color:"#6B6459", margin:"18px 0 6px", paddingBottom:3, borderBottom:"1px solid #eee" }}>Framgangsmåte</div><div style={{ marginBottom:10, lineHeight:1.75, color:"#333" }} dangerouslySetInnerHTML={{__html:mdToHtml(oppgave.framgangsmåte)}} /></>}
          {oppgave.ressurser && <><div style={{ fontSize:11, fontWeight:600, letterSpacing:"0.08em", textTransform:"uppercase", color:"#6B6459", margin:"18px 0 6px", paddingBottom:3, borderBottom:"1px solid #eee" }}>Ressurser</div><div style={{ marginBottom:10, lineHeight:1.75, color:"#333" }} dangerouslySetInnerHTML={{__html:mdToHtml(oppgave.ressurser)}} /></>}
          {mål.length > 0 && <>
            <div style={{ fontSize:11, fontWeight:600, letterSpacing:"0.08em", textTransform:"uppercase", color:"#6B6459", margin:"18px 0 8px", paddingBottom:3, borderBottom:"1px solid #eee" }}>Kompetansemål</div>
            <ol style={{ paddingLeft:20, lineHeight:1.9 }}>
              {mål.map(m => {
                const t = oppgave.kompetansemålType?.[m.id];
                return (
                  <li key={m.id} style={{ marginBottom:4, fontSize:13, color:"#333" }}>
                    {m.tekst}
                    {t==="utøvende" && <span style={{ fontSize:11, fontWeight:700, color:"#7A5E00", marginLeft:6 }}>(–A)</span>}
                    {t==="analytisk" && <span style={{ fontSize:11, fontWeight:700, color:"#1A4A6B", marginLeft:6 }}>(–U)</span>}
                  </li>
                );
              })}
            </ol>
          </>}
          {krit.length > 0 && <>
            <div style={{ fontSize:11, fontWeight:600, letterSpacing:"0.08em", textTransform:"uppercase", color:"#6B6459", margin:"20px 0 10px", paddingBottom:3, borderBottom:"1px solid #eee" }}>Vurderingskriterier</div>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
              <thead>
                <tr style={{ background:P }}>
                  {["Kriterium","Ikke ennå","Grunnleggende (2–3)","Solid (4–5)","Utmerket (6)"].map(h => (
                    <th key={h} style={{ padding:"8px 10px", textAlign:"left", fontWeight:500, fontSize:11, color:"#fff" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {[...ke.filter(k=>!k.erTillegg),...ke.filter(k=>k.erTillegg)].map((k,ki,arr) => {
                  const keKrit = krit.filter(r => r.kjerneelementId===k.id);
                  if (!keKrit.length) return null;
                  const isFirstTillegg = k.erTillegg && (ki===0||!arr[ki-1]?.erTillegg);
                  return [
                    isFirstTillegg && <tr key={`sep-${k.id}`}><td colSpan={5} style={{ padding:"4px 10px", borderTop:"1px dashed #ccc", fontSize:10, color:"#888", fontStyle:"italic" }}>* Lærerens tillegg</td></tr>,
                    <tr key={`ke-${k.id}`}>
                      <td colSpan={5} style={{ padding:"8px 10px 2px", fontFamily:"'Libre Baskerville',serif", fontSize:11, fontWeight:700, color:k.erTillegg?"#6B5030":P, background:k.erTillegg?"#FDF6EC":"#F4F2EC" }}>
                        {k.erTillegg?"* ":""}{k.navn}
                        {(()=>{ const v=(oppgave.keVektOverride||{})[k.id]||fag.keVekt?.[k.id]||"normal"; return v!=="normal"&&<span style={{ fontSize:10, fontWeight:400, fontFamily:"'IBM Plex Sans',sans-serif", color:v==="høy"?"#1A5C2A":"#7A5E00", background:v==="høy"?"#D4EDDA":"#FFF3CC", padding:"1px 6px", borderRadius:3, marginLeft:6 }}>{v==="høy"?"↑ Høy vekt":"↓ Lav vekt"}</span>; })()}
                      </td>
                    </tr>,
                    ...keKrit.map((r,i) => (
                      <tr key={r.id} style={{ borderBottom:"0.5px solid #e0dcd8", background:i%2===0?"transparent":"#F9F7F5" }}>
                        <td style={{ padding:"8px 10px", fontWeight:600, color:P, width:"18%" }}>
                          {r.kriterium}
                          {r.descriptor && <div style={{ fontSize:11, fontWeight:400, color:"#888", fontStyle:"italic" }}>{r.descriptor}</div>}
                        </td>
                        <td style={{ padding:"8px 10px", color:"#555555", background:"#F0F0EE" }}>{getPåveiText(r)}</td>
                        <td style={{ padding:"8px 10px", color:"#5B7A9A", background:"#F0F4F8" }}>{r.lav}</td>
                        <td style={{ padding:"8px 10px", color:"#7A5E00", background:"#FFFBF0" }}>{r.middels}</td>
                        <td style={{ padding:"8px 10px", color:"#1A5C2A", background:"#F0FAF4" }}>{r.høy}</td>
                      </tr>
                    ))
                  ];
                })}
              </tbody>
            </table>
          </>}
          {oppgave.brukBloom && (
            <div style={{ marginTop:16, border:"1px solid #D4C9B8", borderRadius:6, overflow:"hidden" }}>
              <div style={{ background:"#F4F2EC", padding:"8px 14px", borderBottom:"1px solid #D4C9B8", display:"flex", alignItems:"baseline", gap:10 }}>
                <span style={{ fontFamily:"'Libre Baskerville',serif", fontSize:13, fontWeight:700, color:P }}>Refleksjon og analyse</span>
                <span style={{ fontSize:11, color:"var(--color-text-secondary)" }}>Kognitiv nivå</span>
              </div>
              <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                <thead>
                  <tr style={{ background:P }}>
                    {["","Ikke ennå","Grunnleggende (2–3)","Solid (4–5)","Utmerket (6)"].map(h=>(
                      <th key={h} style={{ padding:"8px 10px", textAlign:"left", fontWeight:500, fontSize:11, color:"#fff" }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td style={{ padding:"8px 10px", fontWeight:600, color:P, width:"15%", background:"#F4F2EC", fontSize:11 }}>Nivå</td>
                    <td style={{ padding:"8px 10px", color:"#555555", background:"#F0F0EE" }}>Gjengir/presenterer fragmentert eller uten sammenheng</td>
                    <td style={{ padding:"8px 10px", color:"#5B7A9A", background:"#F0F4F8" }}>Gjengi og forstå</td>
                    <td style={{ padding:"8px 10px", color:"#7A5E00", background:"#FFFBF0" }}>Forklare og sammenligne</td>
                    <td style={{ padding:"8px 10px", color:"#1A5C2A", background:"#F0FAF4" }}>Analysere, drøfte og skape</td>
                  </tr>
                </tbody>
              </table>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function OppgaveRad({ o, arkiv, fag, data, go, onArkiver, onGjenopprett, onDupliser, onCopy, onPreview }) {
  const nVurd = data.vurderinger.filter(v => v.fagId===fag.id && v.oppgaveId===o.id).length;
  return (
    <div style={{ ...card, display:"flex", alignItems:"center", gap:12, opacity:arkiv?0.75:1 }}>
      <div style={{ flex:1, cursor:arkiv?"default":"pointer" }} onClick={()=>!arkiv&&go("redigerOppgave",fag.id,o.id)}>
        <div style={{ fontWeight:500, fontSize:14, marginBottom:3 }}>{o.tittel}</div>
        <div style={{ fontSize:12, color:"var(--color-text-secondary)" }}>
          {o.dato && <span style={{ marginRight:12 }}>{o.dato}</span>}
          {o.vurderingsform === "bestått"
            ? <span style={{ marginRight:12, fontSize:11, fontWeight:600, padding:"1px 7px", borderRadius:3, background:"#EBF5FB", color:"#1A4A6B", border:"1px solid #5B9ABF" }}>B/IB</span>
            : o.vurderingstype && <span style={{ marginRight:12 }}>{o.vurderingstype}</span>}
          {(o.ferdighetIds?.length>0) && <span style={{ marginRight:12 }}>{o.ferdighetIds.length} kriterier</span>}
          {o.obligatorisk && <span style={{ fontSize:11, fontWeight:600, padding:"1px 7px", borderRadius:3, background:"#FDF0EE", color:"#B53A2F", border:"1px solid #E8C4BE" }}>🔴 Obligatorisk</span>}
        </div>
      </div>
      <div style={{ display:"flex", gap:8, alignItems:"center", flexShrink:0 }}>
        {!arkiv && <Btn secondary sm onClick={e=>{e.stopPropagation();onCopy&&onCopy(buildOppgaveTekst(o,fag));}}>Kopier</Btn>}
        {!arkiv && <Btn secondary sm onClick={e=>{e.stopPropagation();onPreview&&onPreview(o);}}>Forhåndsvis</Btn>}
        {!arkiv && <Btn secondary sm onClick={e=>{e.stopPropagation();onArkiver(o);}}>Arkiver</Btn>}
        {arkiv && <Btn secondary sm onClick={e=>{e.stopPropagation();onDupliser(o);}}>Dupliser</Btn>}
        {arkiv && <Btn secondary sm onClick={e=>{e.stopPropagation();onGjenopprett(o);}}>Gjenopprett</Btn>}
        {!arkiv && (
          <div style={{ textAlign:"right" }}>
            <div style={{ fontSize:13, fontWeight:500 }}>{nVurd}/{fag.antallElever}</div>
            <div style={{ fontSize:11, color:"var(--color-text-secondary)" }}>vurdert</div>
          </div>
        )}
      </div>
    </div>
  );
}

function OppgaveList({ fag, data, save, go, nav }) {
  const [copyText, setCopyText] = React.useState(null);
  const [previewOppgave, setPreviewOppgave] = React.useState(null);
  const alle = data.oppgaver.filter(o => o.fagId===fag.id).sort((a,b)=>(b.dato||"").localeCompare(a.dato||""));
  const aktive = alle.filter(o => !o.arkivert);
  const arkiverte = alle.filter(o => o.arkivert);
  const arkiver = o => save({...data, oppgaver:data.oppgaver.map(x=>x.id===o.id?{...x,arkivert:true}:x)});
  const gjenopprett = o => save({...data, oppgaver:data.oppgaver.map(x=>x.id===o.id?{...x,arkivert:false}:x)});
  const dupliser = o => {
    const kopi = {...JSON.parse(JSON.stringify(o)), id:uid(), dato:new Date().toISOString().slice(0,10), arkivert:false};
    save({...data, oppgaver:[...data.oppgaver,kopi]});
  };
  return (
    <div>
      {copyText && <CopyModal text={copyText} onClose={()=>setCopyText(null)} />}
      {previewOppgave && <OppgavePreview oppgave={previewOppgave} fag={fag} onClose={()=>setPreviewOppgave(null)} />}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
        <p style={{ ...hint, marginBottom:0 }}>Oppgaver for {fag.navn}</p>
        <Btn sm onClick={()=>go("nyttOppgave",fag.id)}>+ Ny oppgave</Btn>
      </div>
      {aktive.length===0 ? <PH msg="Ingen aktive oppgaver." />
        : <div style={{ display:"grid", gap:10, marginBottom:arkiverte.length?28:0 }}>
            {aktive.map(o=><OppgaveRad key={o.id} o={o} arkiv={false} fag={fag} data={data} go={go} onArkiver={arkiver} onGjenopprett={gjenopprett} onDupliser={dupliser} onCopy={t=>setCopyText(t)} onPreview={o=>setPreviewOppgave(o)} />)}
          </div>}
      {arkiverte.length > 0 && (
        <div>
          <div style={{ fontSize:11, fontWeight:600, letterSpacing:"0.08em", textTransform:"uppercase", color:"var(--color-text-secondary)", marginBottom:10 }}>Arkiv ({arkiverte.length})</div>
          <div style={{ display:"grid", gap:10 }}>
            {arkiverte.map(o=><OppgaveRad key={o.id} o={o} arkiv={true} fag={fag} data={data} go={go} onArkiver={arkiver} onGjenopprett={gjenopprett} onDupliser={dupliser} />)}
          </div>
        </div>
      )}
    </div>
  );
}

function OppgaveForm({ data, save, go, nav, fag, oppgaveEdit, flash }) {
  const isEdit = !!oppgaveEdit;
  const [previewOpen, setPreviewOpen] = React.useState(false);
  const [editingFerdighet, setEditingFerdighet] = React.useState(null);
  const [f, setF] = useState(() => oppgaveEdit ? JSON.parse(JSON.stringify(oppgaveEdit)) : {
    id:uid(), fagId:fag.id, tittel:"", dato:new Date().toISOString().slice(0,10),
    frist:"", kortBeskrivelse:"", ramme:"", framgangsmåte:"", ressurser:"",
    vurderingstype:"muntlig", innleveringsmetode:"", brukBloom:false, obligatorisk:false, vurderingsform:"rubrikk",
    kompetansemålIds:[], kompetansemålType:{}, keVektOverride:{},
    ferdighetIds:(fag.ferdighetskriterier||[]).map(r=>r.id), ferdighetOverrides:{}
  });
  const upd = (k,v) => setF(p=>({...p,[k]:v}));
  const toggleId = (field,id) => setF(p=>({...p,[field]:p[field].includes(id)?p[field].filter(x=>x!==id):[...p[field],id]}));
  const doSave = () => {
    if (!f.tittel.trim()) return alert("Tittel er påkrevd");
    const nd = {...data, oppgaver:isEdit?data.oppgaver.map(o=>o.id===f.id?f:o):[...data.oppgaver,f]};
    save(nd); if (flash) flash("Lagret ✓"); if (!isEdit) go("fag",fag.id,null,null,"oppgaver");
  };
  const doDelete = () => {
    if (!window.confirm(`Slette "${f.tittel}"?`)) return;
    save({...data, oppgaver:data.oppgaver.filter(o=>o.id!==f.id), vurderinger:data.vurderinger.filter(v=>v.oppgaveId!==f.id)});
    go("fag",fag.id);
  };
  const fd = fag.ferdighetskriterier||[];
  const ke = fag.kjerneelementer||[];
  const regularKE = ke.filter(k => !k.erTillegg);

  return (
    <div>
      {previewOpen && <OppgavePreview oppgave={f} fag={fag} onClose={()=>setPreviewOpen(false)} />}
      <h1 style={h1}>{isEdit?`Rediger: ${oppgaveEdit.tittel}`:"Ny oppgave"}</h1>
      <Section title="Grunninfo">
        <div style={{ display:"grid", gridTemplateColumns:"1fr 140px 140px", gap:14, marginBottom:12 }}>
          <Fld label="Tittel"><input style={inp} value={f.tittel} onChange={e=>upd("tittel",e.target.value)} placeholder="f.eks. Scenisk analyse — Brecht" /></Fld>
          <Fld label="Dato gitt"><input style={inp} type="date" value={f.dato} onChange={e=>upd("dato",e.target.value)} /></Fld>
          <Fld label="Frist"><input style={inp} type="date" value={f.frist} onChange={e=>upd("frist",e.target.value)} /></Fld>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"160px 1fr", gap:14 }}>
          <Fld label="Vurderingsform">
            <div style={{ display:"flex", gap:0, borderRadius:6, overflow:"hidden", border:"1px solid var(--color-border-secondary)" }}>
              {[["rubrikk","Rubrikk"],["bestått","Bestått / IB"]].map(([val,label])=>(
                <button key={val} onClick={()=>upd("vurderingsform",val)} style={{
                  flex:1, padding:"6px 10px", fontSize:12, cursor:"pointer", fontFamily:"inherit", fontWeight:600,
                  background:f.vurderingsform===val?P:"transparent",
                  color:f.vurderingsform===val?"#fff":"var(--color-text-secondary)",
                  border:"none", borderRight:val==="rubrikk"?"1px solid var(--color-border-secondary)":"none",
                }}>{label}</button>
              ))}
            </div>
          </Fld>
          {f.vurderingsform !== "bestått" && (
            <Fld label="Vurderingstype">
              <select style={inp} value={f.vurderingstype||"muntlig"} onChange={e=>upd("vurderingstype",e.target.value)}>
                <option value="muntlig">Muntlig</option>
                <option value="praktisk_muntlig">Praktisk/muntlig</option>
                <option value="skriftlig">Skriftlig</option>
              </select>
            </Fld>
          )}
        </div>
        <label style={{ display:"inline-flex", alignItems:"center", gap:8, marginTop:12, fontSize:13, cursor:"pointer", userSelect:"none" }}>
          <input type="checkbox" checked={!!f.obligatorisk} onChange={e=>upd("obligatorisk",e.target.checked)} />
          <span>Obligatorisk for termin- eller standpunktkarakter</span>
        </label>
        <div style={{ marginTop:12 }}>
          <Fld label="Innleveringsmetode">
            <input style={inp} value={f.innleveringsmetode||""} onChange={e=>upd("innleveringsmetode",e.target.value)}
              placeholder="f.eks. Digital innlevering i Teams, muntlig presentasjon i klassen…" />
          </Fld>
        </div>
      </Section>

      <Section title="Kort beskrivelse">
        <textarea style={{ ...inp, minHeight:60, resize:"vertical" }} value={f.kortBeskrivelse} onChange={e=>upd("kortBeskrivelse",e.target.value)} placeholder="1–2 setninger om oppgaven…" />
      </Section>
      <Section title="Rammen for oppgaven">
        <textarea style={{ ...inp, minHeight:80, resize:"vertical" }} value={f.ramme} onChange={e=>upd("ramme",e.target.value)} placeholder="Kontekst og mandat…" />
      </Section>
      <Section title="Framgangsmåte">
        <textarea style={{ ...inp, minHeight:72, resize:"vertical" }} value={f.framgangsmåte} onChange={e=>upd("framgangsmåte",e.target.value)} placeholder="Steg, metoder, presentasjonsform…" />
      </Section>
      <Section title="Ressurser">
        <textarea style={{ ...inp, minHeight:60, resize:"vertical" }} value={f.ressurser} onChange={e=>upd("ressurser",e.target.value)} placeholder="Tekster, lenker, materiell…" />
      </Section>

      {(fag.kompetansemål||[]).some(m=>m.tekst) && (
        <Section title="Kompetansemål">
          <p style={hint}>Klikk på taggen for å markere avvik — vises bare dersom dette oppgaven kun dekker én dimensjon.</p>
          <div style={{ display:"grid", gap:8, marginTop:8 }}>
            {(fag.kompetansemål||[]).filter(m=>m.tekst).map(m=>{
              const checked = f.kompetansemålIds.includes(m.id);
              const type = (f.kompetansemålType||{})[m.id];
              const cycleType = (e) => {
                e.preventDefault(); e.stopPropagation();
                const next = type==="utøvende" ? "analytisk" : type==="analytisk" ? null : "utøvende";
                const t = {...(f.kompetansemålType||{})};
                if (next===null) delete t[m.id]; else t[m.id]=next;
                upd("kompetansemålType", t);
              };
              const removeKm = () => {
                const ids = f.kompetansemålIds.filter(x=>x!==m.id);
                const t = {...(f.kompetansemålType||{})}; delete t[m.id];
                setF(p=>({...p, kompetansemålIds:ids, kompetansemålType:t}));
              };
              const addKm = () => {
                setF(p=>({...p, kompetansemålIds:[...p.kompetansemålIds, m.id]}));
              };
              const tagStyle = type==="utøvende"
                ? {background:"#FFF8E1",color:"#7A5E00",border:"1px solid #F0A500"}
                : type==="analytisk"
                ? {background:"#EBF5FB",color:"#1A4A6B",border:"1px solid #5B9ABF"}
                : {background:"transparent",color:"var(--color-text-secondary)",border:"1px dashed var(--color-border-secondary)"};
              const tagLabel = type==="utøvende" ? "–A" : type==="analytisk" ? "–U" : "begge";
              return (
                <div key={m.id} style={{ display:"flex", alignItems:"flex-start", gap:10, opacity:checked?1:0.45 }}>
                  <input type="checkbox" checked={checked} onChange={checked?removeKm:addKm} style={{ marginTop:3, flexShrink:0, cursor:"pointer" }} />
                  <span style={{ flex:1, fontSize:13, lineHeight:1.5, cursor:"pointer" }} onClick={checked?removeKm:addKm}>{m.tekst}</span>
                  {checked && (
                    <button onClick={cycleType} title="Klikk for å sette dimensjon: begge / –A / –U" style={{
                      fontSize:11, fontWeight:600, padding:"2px 8px", borderRadius:4, cursor:"pointer",
                      fontFamily:"inherit", whiteSpace:"nowrap", flexShrink:0, ...tagStyle
                    }}>{tagLabel}</button>
                  )}
                </div>
              );
            })}
          </div>
        </Section>
      )}

      <Section title="Vurderingskriterier">
        <p style={hint}>Velg kjerneelement for å velge alle kriterier i én klikk.</p>
        <div style={{ display:"flex", gap:8, marginBottom:14, flexWrap:"wrap" }}>
          {regularKE.map(k => {
            const ids = fd.filter(r => r.kjerneelementId===k.id).map(r=>r.id);
            if (!ids.length) return null;
            const alle = ids.every(id=>f.ferdighetIds.includes(id));
            return (
              <button key={k.id} onClick={()=>{
                if (alle) upd("ferdighetIds",f.ferdighetIds.filter(id=>!ids.includes(id)));
                else upd("ferdighetIds",[...new Set([...f.ferdighetIds,...ids])]);
              }} style={{ padding:"6px 14px", borderRadius:20, fontSize:13, cursor:"pointer", fontFamily:"inherit",
                border:`1.5px solid ${alle?P:"var(--color-border-tertiary)"}`,
                background:alle?"#E8EDF0":"transparent",
                color:alle?P:"var(--color-text-secondary)", fontWeight:alle?600:400 }}>
                {alle?"✓ ":""}{k.navn}
              </button>
            );
          })}
        </div>
        {regularKE.map(k => {
          const krit = fd.filter(r => r.kjerneelementId===k.id);
          if (!krit.length) return null;
          return (
            <div key={k.id} style={{ marginBottom:16 }}>
              <div style={{ fontSize:11, fontWeight:600, letterSpacing:"0.08em", textTransform:"uppercase", color:"var(--color-text-secondary)", marginBottom:8 }}>{k.navn}</div>
              {krit.map(r => renderKritRow(r, f, upd, editingFerdighet, setEditingFerdighet, f.vurderingsform==="bestått"))}
            </div>
          );
        })}
        {ke.filter(k=>k.erTillegg).some(k=>fd.some(r=>r.kjerneelementId===k.id)) && (
          <div style={{ borderTop:"1px dashed var(--color-border-secondary)", paddingTop:14, marginTop:4 }}>
            <div style={{ fontSize:11, color:"var(--color-text-secondary)", marginBottom:10, fontStyle:"italic" }}>* Lærerens tillegg</div>
            {ke.filter(k=>k.erTillegg).map(k => {
              const krit = fd.filter(r => r.kjerneelementId===k.id);
              if (!krit.length) return null;
              return (
                <div key={k.id} style={{ marginBottom:14 }}>
                  <div style={{ fontSize:11, fontWeight:600, letterSpacing:"0.08em", textTransform:"uppercase", color:"var(--color-text-secondary)", marginBottom:8 }}>* {k.navn}</div>
                  {krit.map(r => renderKritRow(r, f, upd, editingFerdighet, setEditingFerdighet, f.vurderingsform==="bestått"))}
                </div>
              );
            })}
          </div>
        )}
        {f.vurderingsform !== "bestått" && (
        <div style={{ marginTop:14 }}>
          <div style={{ fontSize:11, fontWeight:600, letterSpacing:"0.08em", textTransform:"uppercase", color:"var(--color-text-secondary)", marginBottom:10 }}>Juster vekting for denne oppgaven</div>
          <div style={{ display:"grid", gap:8 }}>
            {[...ke.filter(k=>!k.erTillegg),...ke.filter(k=>k.erTillegg)].map(k => {
              const hasKrit = fd.filter(r=>r.kjerneelementId===k.id && f.ferdighetIds.includes(r.id)).length > 0;
              if (!hasKrit) return null;
              const fagDefault = fag.keVekt?.[k.id] || "normal";
              const current = (f.keVektOverride||{})[k.id] || fagDefault;
              return (
                <div key={k.id} style={{ display:"flex", alignItems:"center", gap:10, justifyContent:"space-between" }}>
                  <span style={{ fontSize:12, color:"var(--color-text-primary)", flex:1 }}>{k.erTillegg?"* ":""}{k.navn}</span>
                  <div style={{ display:"flex", gap:3, alignItems:"center" }}>
                    {["lav","normal","høy"].map(v => (
                      <button key={v} onClick={()=>{ const t={...(f.keVektOverride||{})}; if(v===fagDefault) delete t[k.id]; else t[k.id]=v; upd("keVektOverride",t); }} style={{
                        padding:"2px 8px", borderRadius:4, fontSize:11, cursor:"pointer", fontFamily:"inherit",
                        fontWeight: current===v ? 600 : 400,
                        background: current===v ? (v==="høy"?P:v==="lav"?"#eee":"var(--color-background-secondary)") : "transparent",
                        color: current===v ? (v==="høy"?"#fff":"var(--color-text-primary)") : "var(--color-text-secondary)",
                        border: `1px solid ${current===v?(v==="høy"?P:"var(--color-border-secondary)"):"var(--color-border-tertiary)"}`,
                      }}>{v.charAt(0).toUpperCase()+v.slice(1)}</button>
                    ))}
                    {(f.keVektOverride||{})[k.id] && <span style={{fontSize:10,color:"var(--color-text-secondary)",marginLeft:4}}>(fag: {fagDefault})</span>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
        )}
        {f.vurderingsform !== "bestått" && (
        <label style={{ display:"flex", alignItems:"center", gap:9, fontSize:13, cursor:"pointer", marginTop:14, padding:"10px 14px", background:"var(--color-background-secondary)", borderRadius:6, border:"0.5px solid var(--color-border-tertiary)" }}>
          <input type="checkbox" checked={f.brukBloom} onChange={e=>upd("brukBloom",e.target.checked)} />
          <span><strong>Inkluder Refleksjon og analyse</strong> — legger til Bloom's kognitivt nivå som eget vurderingsområde</span>
        </label>
        )}
      </Section>

      <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
        <Btn onClick={doSave}>{isEdit?"Lagre endringer":"Lagre oppgave"}</Btn>
        <Btn secondary onClick={()=>setPreviewOpen(true)}>Forhåndsvis / Skriv ut</Btn>
        <Btn secondary onClick={()=>{
          const valgteMål = (fag.kompetansemål||[]).filter(m=>f.kompetansemålIds?.includes(m.id)&&m.tekst).map(m=>`- ${m.tekst}`).join("\n");
          const valgteKrit = (fag.ferdighetskriterier||[]).filter(r=>f.ferdighetIds?.includes(r.id)&&r.kriterium).map(r=>`- ${r.kriterium}`).join("\n");
          const prompt = [`Du er en hjelper for en teaterlærer ved Vågen vgs. Hjelp med å skrive eller forbedre en oppgavetekst på norsk tilpasset ${fag.trinn}.`,
            `\nFag: ${fag.navn}\nTrinn: ${fag.trinn}`,
            f.tittel?`Tittel: ${f.tittel}`:"",
            valgteMål?`\nKompetansemål:\n${valgteMål}`:"",
            valgteKrit?`\nVurderingskriterier:\n${valgteKrit}`:"",
            f.kortBeskrivelse?`\nKort beskrivelse:\n${f.kortBeskrivelse}`:"",
            f.ramme?`\nEksisterende ramme:\n${f.ramme}`:"",
          ].filter(Boolean).join("\n");
          navigator.clipboard.writeText(prompt).then(()=>alert("Prompt kopiert! Lim inn i Claude."));
        }}>Kopier prompt til Claude →</Btn>
        <Btn secondary onClick={()=>go("fag",fag.id)}>Avbryt</Btn>
        {isEdit && <Btn danger onClick={doDelete} style={{ marginLeft:"auto" }}>Slett oppgave</Btn>}
      </div>
    </div>
  );
}

// ── Vurdering views ───────────────────────────────────────────────────
function VurderingOversikt({ fag, data, go, nav }) {
  const oppgaver = data.oppgaver.filter(o => o.fagId===fag.id && !o.arkivert);
  const aktiveIds = new Set(oppgaver.map(o => o.id));
  const vurd = data.vurderinger.filter(v => v.fagId===fag.id && aktiveIds.has(v.oppgaveId));
  const prosjekter = (data.prosjekter||[]).filter(p => p.fagId===fag.id);
  const totalt = oppgaver.length * fag.antallElever;
  return (
    <div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12, marginBottom:20 }}>
        {[["Oppgaver",oppgaver.length],["Vurdert",vurd.length],["Gjenstår",Math.max(0,totalt-vurd.length)]].map(([l,v])=>(
          <div key={l} style={{ background:"var(--color-background-secondary)", borderRadius:"var(--border-radius-md)", padding:"12px 16px" }}>
            <div style={{ fontSize:20, fontWeight:600 }}>{v}</div>
            <div style={{ fontSize:11, color:"var(--color-text-secondary)" }}>{l}</div>
          </div>
        ))}
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:20 }}>
        <div style={{ ...card, cursor:"pointer" }} onClick={()=>nav("vurderingOppgave",fag.id)}>
          <div style={{ fontWeight:600, fontSize:14, marginBottom:4 }}>Per oppgave</div>
          <div style={{ fontSize:12, color:"var(--color-text-secondary)" }}>Velg oppgave → gå gjennom alle elever</div>
        </div>
        <div style={{ ...card, cursor:"pointer" }} onClick={()=>nav("vurderingElev",fag.id)}>
          <div style={{ fontWeight:600, fontSize:14, marginBottom:4 }}>Per elev</div>
          <div style={{ fontSize:12, color:"var(--color-text-secondary)" }}>Velg elev → se alle oppgavene deres</div>
        </div>
      </div>
      {prosjekter.length > 0 && (
        <div style={{ marginBottom:24 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
            <div style={{ fontSize:11, fontWeight:600, letterSpacing:"0.08em", textTransform:"uppercase", color:"var(--color-text-secondary)" }}>Prosjekter</div>
            <Btn sm onClick={()=>go("prosjektForm",fag.id)}>+ Nytt prosjekt</Btn>
          </div>
          {prosjekter.map(p => {
            const pvs = (data.prosjektVurderinger||[]).filter(v=>v.prosjektId===p.id);
            const ferdige = pvs.filter(v=>v.finalKarakter).length;
            const pct = fag.antallElever > 0 ? Math.round((ferdige/fag.antallElever)*100) : 0;
            return (
              <div key={p.id} style={{ ...card, cursor:"pointer", marginBottom:10 }} onClick={()=>go("prosjektElever",fag.id,p.id)}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                  <span style={{ fontWeight:500, fontSize:14 }}>{p.tittel}</span>
                  <span style={{ fontSize:13, color:"var(--color-text-secondary)" }}>{ferdige}/{fag.antallElever}</span>
                </div>
                <div style={{ height:4, background:"var(--color-background-secondary)", borderRadius:2 }}>
                  <div style={{ height:4, background:pct===100?"#27AE60":A, borderRadius:2, width:pct+"%", transition:"width 0.3s" }} />
                </div>
              </div>
            );
          })}
        </div>
      )}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
        <div style={{ fontSize:11, fontWeight:600, letterSpacing:"0.08em", textTransform:"uppercase", color:"var(--color-text-secondary)" }}>Individuelle oppgaver</div>
        {prosjekter.length===0 && <Btn sm onClick={()=>go("prosjektForm",fag.id)}>+ Nytt prosjekt</Btn>}
      </div>
      {oppgaver.length===0 ? <PH msg="Opprett oppgaver i Oppgaver-fanen først." />
        : oppgaver.map(o => {
          const n = vurd.filter(v=>v.oppgaveId===o.id).length;
          const pct = fag.antallElever > 0 ? Math.round((n/fag.antallElever)*100) : 0;
          return (
            <div key={o.id} style={{ ...card, cursor:"pointer", marginBottom:10 }} onClick={()=>go("vurderingOppgave",fag.id,o.id)}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                <span style={{ fontWeight:500, fontSize:14 }}>{o.tittel}</span>
                <span style={{ fontSize:13, color:"var(--color-text-secondary)" }}>{n}/{fag.antallElever}</span>
              </div>
              <div style={{ height:4, background:"var(--color-background-secondary)", borderRadius:2 }}>
                <div style={{ height:4, background:pct===100?"#27AE60":A, borderRadius:2, width:pct+"%", transition:"width 0.3s" }} />
              </div>
            </div>
          );
        })
      }
    </div>
  );
}

function VurderingOppgaveElever({ fag, oppgave, data, go, nav, navneliste, onOpenNavn }) {
  const vurd = data.vurderinger.filter(v => v.fagId===fag.id && v.oppgaveId===oppgave.id);
  const harNavn = Object.keys(navneliste||{}).length > 0;
  const alleNr = elevNrs(fag);
  const [valgte, setValgte] = React.useState(new Set());

  const toggleValgt = (nr, e) => {
    e.stopPropagation();
    setValgte(prev => { const s = new Set(prev); s.has(nr) ? s.delete(nr) : s.add(nr); return s; });
  };
  const velgAlle = () => setValgte(new Set(alleNr.filter(nr => vurd.find(v=>v.elevNr===nr))));
  const velgIngen = () => setValgte(new Set());

  const printValgte = () => {
    const utvalg = alleNr.filter(nr => valgte.has(nr));
    if (!utvalg.length) return alert("Ingen valgt.");
    const sider = utvalg.map((nr, i) => {
      const v = vurd.find(v=>v.elevNr===nr);
      if (!v) return "";
      const navn = navneliste?.[nr] || null;
      const vMed = {...v, beregnetKarakter: v.beregnetKarakter || calcGrade(v.rubrikknivå||{}, fag.ferdighetskriterier||[], fag, oppgave, v.criterionGrade), bandPick: v.bandPick||null};
      // Build the inner body content (reuse printElevFeedback but extract body content)
      return buildElevHtmlBody(vMed, oppgave, fag, navn, i > 0);
    }).join("\n");

    const html = `<!DOCTYPE html><html lang="no"><head><meta charset="utf-8">
<title>Tilbakemeldinger — ${oppgave.tittel}</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>

@media print{
  *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;box-sizing:border-box}

  body{background:#fff !important;max-width:none !important;margin:0 !important;padding:15mm 20mm !important}

  h2{page-break-after:avoid;break-after:avoid}

}

    w.document.write(html); w.document.close(); w.focus();
    setTimeout(()=>w.print(), 500);

  const ferdigeNr = alleNr.filter(nr => vurd.find(v=>v.elevNr===nr));

  return (

        <div style={{ display:"flex", gap:8, flexWrap:"wrap", justifyContent:"flex-end" }}>
          <button onClick={onOpenNavn} style={{

          }}>
            🔑 {harNavn ? `${Object.keys(navneliste).length} navn lastet` : "Navneliste"}

      </div>
      <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:12, flexWrap:"wrap" }}>
        <p style={{ ...hint, margin:0 }}>Grønn = ferdig · Gul = startet · Grå = ikke startet</p>
        <div style={{ display:"flex", gap:8, marginLeft:"auto", alignItems:"center" }}>
          {valgte.size > 0
            ? <span style={{ fontSize:12, color:"var(--color-text-secondary)" }}>{valgte.size} valgt</span>
            : null}
          <button onClick={valgte.size===ferdigeNr.length?velgIngen:velgAlle} style={{

          }}>
            {valgte.size===ferdigeNr.length?"Velg ingen":"Velg alle ferdige"}
          </button>
          {valgte.size > 0 && (
            <Btn sm onClick={printValgte}>🖨 Skriv ut {valgte.size} elev{valgte.size>1?"er":""}</Btn>

      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))", gap:8 }}>
        {alleNr.map(nr=>{
          const v = vurd.find(v=>v.elevNr===nr);
          const k = getEffectiveGrade(v);
          const ferdig = v && (v.stjerne1||v.framovermelding||k);
          const navn = navneliste?.[nr];
          const erValgt = valgte.has(nr);
          return (
            <div key={nr} style={{ position:"relative" }}>
              {v && (
                <div onClick={e=>toggleValgt(nr,e)} style={{

                  background:erValgt?A:"#fff",
                  display:"flex", alignItems:"center", justifyContent:"center"
                }}>
                  {erValgt && <span style={{ color:"#fff", fontSize:11, lineHeight:1, fontWeight:700 }}>✓</span>}
                </div>
              )}
              <div onClick={()=>nav("vurderingForm",fag.id,oppgave.id,nr)}
                style={{ ...card, cursor:"pointer", textAlign:"center", padding:"12px 8px",
                  borderColor:erValgt?A:ferdig?"#27AE60":v?A:"var(--color-border-tertiary)",
                  boxShadow:erValgt?`0 0 0 2px ${A}`:"none" }}>
                {navn
                  ? <div style={{ fontSize:13, fontWeight:600, color:P, marginBottom:1 }}>{navn}</div>
                  : <div style={{ fontSize:13, fontWeight:500 }}>#{nr}</div>
                }
                {navn && <div style={{ fontSize:10, color:"var(--color-text-secondary)", marginBottom:2 }}>#{nr}</div>}
                <div style={{ fontSize:24, fontWeight:700, color:ferdig?P:v?A:"var(--color-text-secondary)", margin:"4px 0" }}>
                  {k==="💬 Samtale"?"💬":k||"—"}
                </div>
                <div style={{ fontSize:10, color:"var(--color-text-secondary)" }}>
                  {ferdig?"ferdig":v?"startet":"ikke startet"}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function VurderingElevOppgaver({ fag, elevNr, data, go, nav, navneliste }) {

  const navn = navneliste?.[elevNr];
  return (
    <div>
      <h1 style={{ ...h1, marginTop:8 }}>

      </h1>
      <div style={{ display:"flex", gap:8, marginBottom:20, flexWrap:"wrap" }}>
        {elevNrs(fag).map(nr=>(

            style={{ padding:"4px 10px", border:`0.5px solid ${nr===elevNr?A:"var(--color-border-secondary)"}`,
              borderRadius:5, cursor:"pointer", fontFamily:"inherit", fontSize:13,
              background:nr===elevNr?AB:"transparent", color:nr===elevNr?"#7A5618":"var(--color-text-primary)",
              fontWeight:nr===elevNr?600:400 }}>
            {nr}
          </button>
        ))}
      </div>
      {oppgaver.length===0 ? <PH msg="Ingen oppgaver ennå." />
        : <div style={{ display:"grid", gap:10 }}>
            {oppgaver.map(o=>{
              const v = vurd.find(v=>v.oppgaveId===o.id);
              const k = getEffectiveGrade(v);
              return (
                <div key={o.id} onClick={()=>nav("vurderingForm",fag.id,o.id,elevNr)}
                  style={{ ...card, cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <div>
                    <div style={{ fontWeight:500, fontSize:14 }}>{o.tittel}</div>
                    <div style={{ fontSize:12, color:"var(--color-text-secondary)", marginTop:3 }}>{o.dato}</div>
                  </div>
                  <div style={{ fontSize:24, fontWeight:700, color:k?P:"var(--color-text-secondary)", minWidth:32, textAlign:"right" }}>
                    {k==="💬 Samtale"?"💬":k||"—"}
                  </div>
                </div>
              );
            })}
          </div>
      }
    </div>
  );
}


// ── VurderingForm ─────────────────────────────────────────────────────
function VurderingForm({ fag, oppgave, elevNr, data, save, go, nav, navneliste }) {
  const [previewData, setPreviewData] = React.useState(null);
  const [isDirty, setIsDirty] = React.useState(false);
  const existing = data.vurderinger.find(v => v.fagId===fag.id && v.oppgaveId===oppgave.id && v.elevNr===elevNr);
  const [f, setF] = useState(() => existing ? JSON.parse(JSON.stringify(existing)) : {
    id:uid(), fagId:fag.id, oppgaveId:oppgave.id, elevNr,
    stjerne1:"", stjerne2:"", rubrikknivå:{}, kompetansemålNivå:{},
    kommentarer:{}, ekskluderteFerdigheter:[],
    justerKarakter:null, justerBegrunnelse:"", framovermelding:"", oppgaveKrav:null, criterionGrade:{}, bandPick:null, oppgaveKravMerknad:""
  });

  const fd = fag.ferdighetskriterier||[];
  const ke = fag.kjerneelementer||[];
  const isBeståttForm = oppgave.vurderingsform === "bestått";
  const relevantFd = fd.filter(r => oppgave.ferdighetIds?.includes(r.id)).map(r => applyOverride(r, oppgave.ferdighetOverrides));
  const beregnet = isBeståttForm ? null : calcGrade(f.rubrikknivå, relevantFd.filter(r=>!f.ekskluderteFerdigheter?.includes(r.id)), fag, oppgave, f.criterionGrade);
  const beregnetRaw = isBeståttForm ? null : calcRawGrade(f.rubrikknivå, relevantFd.filter(r=>!f.ekskluderteFerdigheter?.includes(r.id)), fag, oppgave, f.criterionGrade);
  const band = isBeståttForm ? null : calcBand(f.rubrikknivå, relevantFd.filter(r=>!f.ekskluderteFerdigheter?.includes(r.id)), fag, oppgave, f.criterionGrade);
  const bandBase = isBeståttForm ? null : (f.bandPick || (beregnet ? String(beregnet) : null));
  const modifiedBase = isBeståttForm ? null : applyOppgaveKrav(bandBase, f.oppgaveKrav);
  const finalK = isBeståttForm ? f.justerKarakter : (f.justerKarakter || modifiedBase);
  const kravJustert = !isBeståttForm && f.oppgaveKrav && f.oppgaveKrav !== "alt" && bandBase && modifiedBase !== bandBase;
  const rawFinalK = bandBase;

  const upd = (k,v) => { setF(p=>({...p,[k]:v})); setIsDirty(true); };
  const setNivå = (id,nivå) => { setF(p=>({...p, rubrikknivå:{...p.rubrikknivå,[id]:p.rubrikknivå[id]===nivå?null:nivå}})); setIsDirty(true); };
  const setKommentar = (id,txt) => { setF(p=>({...p, kommentarer:{...p.kommentarer,[id]:txt}})); setIsDirty(true); };
  const toggleEkskluder = (id) => { setF(p=>({
    ...p, ekskluderteFerdigheter: p.ekskluderteFerdigheter?.includes(id)
      ? p.ekskluderteFerdigheter.filter(x=>x!==id)
      : [...(p.ekskluderteFerdigheter||[]),id]
  })); setIsDirty(true); };
  const setCriterionGrade = (id, grade) => {
    setF(p => { const cg = {...(p.criterionGrade||{})}; if (cg[id]===grade) delete cg[id]; else cg[id]=grade; return {...p, criterionGrade:cg}; });
    setIsDirty(true);
  };
  const setBandPick = (val) => { setF(p=>({...p, bandPick: p.bandPick===val ? null : val})); setIsDirty(true); };

  useEffect(() => {
    if (!isDirty) return;
    const handler = e => { e.preventDefault(); e.returnValue = ""; };
    window.addEventListener("beforeunload", handler);
    return () => window.removeEventListener("beforeunload", handler);
  }, [isDirty]);

  const nrs = elevNrs(fag);
  const currentIdx = nrs.indexOf(elevNr);
  const prevNr = currentIdx > 0 ? nrs[currentIdx - 1] : null;
  const nextNr = currentIdx < nrs.length - 1 ? nrs[currentIdx + 1] : null;

  const doSave = (next=false) => {
    const vrd = {...f, beregnetKarakter:beregnet, bandPick:f.bandPick||null};
    save({...data, vurderinger:existing
      ? data.vurderinger.map(v=>v.id===f.id?vrd:v)
      : [...data.vurderinger, vrd]
    });
    setIsDirty(false);
    if (next && nextNr != null) nav("vurderingForm",fag.id,oppgave.id,nextNr);
    else if (next) go("vurderingOppgave",fag.id,oppgave.id);
  };

  const nivColors = {
    påvei:{bg:"#F0F0EE",border:"#BDBDBD",text:"#555555"},
    lav:{bg:"#E8F4FD",border:"#5B9FD4",text:"#1A4A6B"},
    middels:{bg:"#FFF8E1",border:"#F0A500",text:"#7A5E00"},
    høy:{bg:"#D4EDDA",border:"#27AE60",text:"#1A5C2A"},
  };

  const regularKE = ke.filter(k=>!k.erTillegg);
  const tilleggKE = ke.filter(k=>k.erTillegg);

  const renderKESection = (k) => {
    const krit = relevantFd.filter(r=>r.kjerneelementId===k.id);
    if (!krit.length) return null;
    return (
      <div key={k.id} style={{ ...card, marginBottom:18 }}>
        <h3 style={{ ...sh3, borderBottom:"0.5px solid var(--color-border-tertiary)", paddingBottom:8, marginBottom:14, display:"flex", alignItems:"baseline", gap:8 }}>
          <span>{k.erTillegg?`* ${k.navn}`:k.navn}</span>
          {(()=>{ const v=oppgave?.keVektOverride?.[k.id]||fag.keVekt?.[k.id]||"normal"; const col=v==="høy"?P:v==="lav"?"#7A5E00":"var(--color-text-secondary)"; const label=v==="høy"?"↑ Høy":v==="lav"?"↓ Lav":"Normal"; return <span style={{fontSize:10,fontWeight:v==="normal"?400:600,color:col,marginLeft:6}}>{label} vekt</span>; })()}
        </h3>
        <div style={{ display:"grid", gap:20 }}>
          {krit.map(r=>{
            const valgt = f.rubrikknivå?.[r.id];
            const ekskl = f.ekskluderteFerdigheter?.includes(r.id);
            return (
              <div key={r.id} style={{ opacity:ekskl?0.4:1, transition:"opacity 0.15s" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:6 }}>
                  <div>
                    <div style={{ fontWeight:500, fontSize:14 }}>{r.kriterium}</div>
                    {r.descriptor && <div style={{ fontSize:12, color:"var(--color-text-secondary)", fontStyle:"italic" }}>{r.descriptor}</div>}
                  </div>
                  <label style={{ display:"flex", alignItems:"center", gap:5, fontSize:11, color:"var(--color-text-secondary)", cursor:"pointer", flexShrink:0, marginLeft:12 }}>
                    <input type="checkbox" checked={ekskl} onChange={()=>toggleEkskluder(r.id)} />
                    Ekskluder
                  </label>
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:8, marginBottom:8 }}>
                  {[["påvei","Ikke ennå"],["lav","Grunnleggende (2–3)"],["middels","Solid (4–5)"],["høy","Utmerket (6)"]].map(([niv,label])=>{
                    const sel = valgt===niv;
                    const col = nivColors[niv];
                    return (
                      <button key={niv} onClick={()=>!ekskl&&setNivå(r.id,niv)} style={{
                        padding:"8px 10px", borderRadius:6, cursor:ekskl?"default":"pointer", fontFamily:"inherit",
                        fontSize:12, textAlign:"left", transition:"all 0.1s",
                        border:`1.5px solid ${sel?col.border:"var(--color-border-tertiary)"}`,
                        background:sel?col.bg:"var(--color-background-secondary)",
                        color:sel?col.text:"var(--color-text-secondary)" }}>
                        <div style={{ fontWeight:600, marginBottom:4 }}>{label}</div>
                        <div style={{ fontSize:11, lineHeight:1.5 }}>{niv==="påvei"?getPåveiText(r):r[niv]}</div>
                        {sel && niv !== "påvei" && (
                          <div style={{ display:"flex", gap:4, marginTop:8 }} onClick={e=>e.stopPropagation()}>
                            {(niv==="lav"?[2,3]:niv==="middels"?[4,5]:[6]).map(g => {
                              const gSel = (f.criterionGrade||{})[r.id] === g;
                              return (
                                <button key={g} onClick={e=>{ e.stopPropagation(); !ekskl && setCriterionGrade(r.id,g); }} style={{
                                  padding:"2px 10px", borderRadius:4, fontSize:13, fontWeight:700,
                                  cursor:ekskl?"default":"pointer", fontFamily:"inherit",
                                  background: gSel ? col.text : "transparent",
                                  color: gSel ? col.bg : col.text,
                                  border: `1.5px solid ${col.text}`,
                                }}>{g}</button>
                              );
                            })}
                          </div>
                        )}
                      </button>
                    );
                  })}
                </div>
                {valgt && !ekskl && (
                  <input style={{ ...inp, fontSize:12, padding:"5px 9px" }}
                    value={f.kommentarer?.[r.id]||""}
                    onChange={e=>setKommentar(r.id,e.target.value)}
                    placeholder="Kommentar til dette kriteriet (valgfritt)…" />
                )}
              </div>
            );
          })}
        </div>
      </div>
    );
  };

  const kmType = oppgave.vurderingstype||"muntlig";
  const kmRb = KM_RUBRIKK[kmType]||KM_RUBRIKK.muntlig;
  const relevantKM = (fag.kompetansemål||[]).filter(m => oppgave.kompetansemålIds?.includes(m.id) && m.tekst);

  return (
    <div>
      {previewData && <PrintPreview v={previewData} oppgave={oppgave} fag={fag} navneliste={navneliste} onClose={()=>setPreviewData(null)} />}

      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <h1 style={{ ...h1, marginBottom:0 }}>
          {navneliste?.[elevNr]
            ? <>{navneliste[elevNr]} <span style={{ fontSize:16, fontWeight:400, color:"var(--color-text-secondary)" }}>· #{elevNr}</span></>
            : `Elev ${elevNr}`}
        </h1>
        <div style={{ display:"flex", gap:8, alignItems:"center" }}>
          {prevNr != null && (
            <Btn secondary sm onClick={()=>{doSave(false); nav("vurderingForm",fag.id,oppgave.id,prevNr);}}>← Forrige</Btn>
          )}
          {nextNr != null && (
            <Btn secondary sm onClick={()=>doSave(true)}>Neste →</Btn>
          )}
        </div>
      </div>

      {isDirty && (
        <div style={{ background:"#FFF8E1", border:"1px solid #F0A500", borderRadius:6, padding:"8px 14px", marginBottom:14, fontSize:13, color:"#7A5E00", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <span>Ulagrede endringer</span>
          <button onClick={()=>doSave(false)} style={{ padding:"3px 12px", borderRadius:4, fontSize:12, fontWeight:600, cursor:"pointer", fontFamily:"inherit", background:"#F0A500", color:"#fff", border:"none" }}>Lagre nå</button>
        </div>
      )}

      {oppgave.obligatorisk && finalK === null && (
        <div style={{ background:"#FDF0EE", border:"1px solid #E8C4BE", borderRadius:6, padding:"10px 14px", marginBottom:14, fontSize:13, color:"#B53A2F" }}>
          ⚠ Obligatorisk oppgave — eleven må ha en vurdering for termin-/standpunktkarakter.
        </div>
      )}
      {oppgave.obligatorisk && f.justerKarakter === "IV" && (
        <div style={{ background:"#FDF0EE", border:"1px solid #E8C4BE", borderRadius:6, padding:"10px 14px", marginBottom:14, fontSize:13, color:"#B53A2F" }}>
          ⚠ Obligatorisk oppgave — eleven har IV. Vurder om dette påvirker terminkarakteren.
        </div>
      )}

      <Section title="⭐ To stjerner">
        <div style={{ display:"grid", gap:12 }}>
          <Fld label="Stjerne 1">
            <textarea style={{ ...inp, minHeight:56, resize:"vertical" }} value={f.stjerne1}
              onChange={e=>upd("stjerne1",e.target.value)} placeholder="Noe eleven mestret godt…" />
          </Fld>
          <Fld label="Stjerne 2">
            <textarea style={{ ...inp, minHeight:56, resize:"vertical" }} value={f.stjerne2}
              onChange={e=>upd("stjerne2",e.target.value)} placeholder="En annen styrke…" />
          </Fld>
        </div>
      </Section>

      {!isBeståttForm && (
        <Section title="Oppfylte oppgavens krav">
          <div style={{ display:"flex", gap:8, marginBottom:10 }}>
            {[
              ["nei",  "Nei",   "−1",  "#1A4A6B","#EBF5FB","#5B9ABF"],
              ["delvis","Delvis","−¼", "#7A5E00","#FFF8E1","#F0A500"],
              ["alt",  "Alt",    "0",  "#1A5C2A","#D4EDDA","#27AE60"],
            ].map(([val,label,delta,textCol,bgCol,borderCol]) => {
              const sel = (f.oppgaveKrav||"alt") === val;
              return (
                <button key={val} onClick={()=>upd("oppgaveKrav", val==="alt"?null:val)} style={{
                  flex:1, padding:"10px 8px", borderRadius:6, fontFamily:"inherit", cursor:"pointer", textAlign:"center",
                  border:`1.5px solid ${sel?borderCol:"var(--color-border-tertiary)"}`,
                  background:sel?bgCol:"var(--color-background-secondary)",
                  color:sel?textCol:"var(--color-text-secondary)",
                }}>
                  <div style={{ fontWeight:600, fontSize:13 }}>{label}</div>
                  <div style={{ fontSize:11, marginTop:2 }}>{delta}</div>
                </button>
              );
            })}
          </div>
          {f.oppgaveKrav === "nei"    && <p style={{ fontSize:12, color:"#B53A2F" }}>Karakteren justeres ned 1 karakter.</p>}
          {f.oppgaveKrav === "delvis" && <p style={{ fontSize:12, color:"#7A5E00" }}>Karakteren justeres ned ¼ karakter (avrundes ned til nærmeste heltall).</p>}
          {(f.oppgaveKrav === "nei" || f.oppgaveKrav === "delvis") && (
            <textarea style={{ ...inp, fontSize:12, minHeight:52, resize:"vertical", marginTop:8 }}
              value={f.oppgaveKravMerknad||""}

              placeholder="Hva mangler? (vises til eleven)" />

      {relevantKM.length > 0 && (
        <Section title="📋 Kompetansemål">
          <div style={{ display:"grid", gap:10 }}>

              const tagStyle = type==="utøvende"
                ? {background:"#FFF8E1",color:"#7A5E00",border:"1px solid #F0A500"}
                : type==="analytisk"
                ? {background:"#EBF5FB",color:"#1A4A6B",border:"1px solid #5B9ABF"}
                : null;
              const tagLabel = type==="utøvende" ? "–A" : type==="analytisk" ? "–U" : null;
              return (
                <div key={m.id} style={{ display:"flex", alignItems:"flex-start", gap:10 }}>
                  {tagLabel && (
                    <span style={{ fontSize:11, fontWeight:600, padding:"2px 7px", borderRadius:4,
                      flexShrink:0, marginTop:2, ...tagStyle }}>{tagLabel}</span>

                  <span style={{ fontSize:13, lineHeight:1.6, color:"var(--color-text-primary)" }}>{m.tekst}</span>
                </div>
              );
            })}
          </div>
        </Section>

      {isBeståttForm ? (
        relevantFd.length > 0 && (
          <Section title="📋 Vurderingskriterier">
            <p style={{ ...hint, marginBottom:10 }}>Kriteriene er informative — vurderingen er Bestått / Ikke bestått.</p>

              {tilleggKE.map(renderKESection)}

        <Section title="Vurdering">
          <div style={{ display:"flex", gap:10, marginBottom:12 }}>

                <button key={val} onClick={()=>upd("justerKarakter",sel?null:val)} style={{
                  flex:1, padding:"12px 10px", borderRadius:8, fontFamily:"inherit", fontSize:14, fontWeight:700, cursor:"pointer",

            <input style={{ ...inp, fontSize:12, marginBottom:10 }} value={f.justerBegrunnelse}

          {f.justerKarakter !== "Fritatt" && (
            <input style={{ ...inp, fontSize:12 }} value={f.justerBegrunnelse}

        <>
          <Section title="Karakter">
            {band && (
              <div style={{ marginBottom:14 }}>
                <div style={{ fontSize:12, color:"var(--color-text-secondary)", marginBottom:10 }}>

                  <div style={{ display:"flex", gap:8, marginBottom:10 }}>

                          border:`1.5px solid ${sel?nivColors.middels.border:"var(--color-border-secondary)"}`,
                          background:sel?nivColors.middels.bg:"var(--color-background-secondary)",
                          color:sel?nivColors.middels.text:"var(--color-text-secondary)" }}>
                          {val}
                        </button>
                      );
                    })}
                  </div>
                )}
                {band === "høy" && (
                  <div style={{ display:"flex", gap:8, marginBottom:10 }}>
                    <button onClick={()=>setBandPick("6")} style={{
                      padding:"8px 24px", borderRadius:6, fontFamily:"inherit", fontSize:18, fontWeight:700, cursor:"pointer",
                      border:`1.5px solid ${nivColors.høy.border}`, background:nivColors.høy.bg, color:nivColors.høy.text }}>
                      6
                    </button>
                  </div>
                )}
              </div>
            )}
            {relevantFd.length===0 && (
              <p style={{ fontSize:13, color:"var(--color-text-secondary)", margin:"0 0 12px" }}>Ingen kriterier valgt. Sett unntak manuelt.</p>
            )}
            <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:10 }}>
              <select style={{ ...inp, width:"auto", fontSize:12 }}
                value={["1","2","3","4","5","6","IV","Bestått","Ikke bestått"].includes(f.justerKarakter)?f.justerKarakter:""}
                onChange={e=>upd("justerKarakter",e.target.value||null)}>
                <option value="">— Unntak / overstyr</option>
                <option value="6">6</option>
                <option value="5">5</option>
                <option value="4">4</option>
                <option value="3">3</option>
                <option value="2">2</option>
                <option value="1">1</option>
                <option value="IV">IV</option>
                <option value="Bestått">✅ Bestått</option>
                <option value="Ikke bestått">❌ Ikke bestått</option>
              </select>
              {["1","2","3","4","5","6","IV","Bestått","Ikke bestått"].includes(f.justerKarakter) && (
                <button onClick={()=>upd("justerKarakter",null)} style={{ fontSize:11, color:"var(--color-text-secondary)",
                  background:"transparent", border:"none", cursor:"pointer", fontFamily:"inherit" }}>✕ Fjern unntak</button>
              )}
            </div>
            <input style={{ ...inp, fontSize:12 }} value={f.justerBegrunnelse}
              onChange={e=>upd("justerBegrunnelse",e.target.value)}
              placeholder="Lærerens justering basert på helhetsinntrykk…" />
            {finalK && finalK!=="💬 Samtale" && (
              <div style={{ marginTop:14, background:"var(--color-background-secondary)", borderRadius:6, padding:"10px 14px" }}>
                <div style={{ display:"flex", alignItems:"baseline", gap:10, marginBottom:4 }}>
                  <div style={{ fontSize:15, fontWeight:500, color:"#444", lineHeight:1, padding:"3px 10px", border:"1px solid #bbb", borderRadius:5, display:"inline-block" }}>{finalK}</div>
                </div>
                {["1","2","3","4","5","6"].includes(f.justerKarakter) && (!f.oppgaveKrav || f.oppgaveKrav==="alt") && (
                  <div style={{ fontSize:11, color:"#888", marginBottom:4 }}>
                    Justert til {f.justerKarakter} av lærer basert på helhetsinntrykk
                  </div>
                )}
                {kravJustert && (
                  <div style={{ fontSize:11, color:"#7A5E00", marginBottom:4 }}>
                    {f.justerKarakter
                      ? `Justert fra ${rawFinalK} til ${modifiedBase} for ${f.oppgaveKrav==="nei"?"ikke-":"delvis "}oppgavekrav (${f.oppgaveKrav==="nei"?"−1":"−¼"}) — deretter satt til ${f.justerKarakter} av lærer`
                      : `Justert fra ${rawFinalK} — oppfylte ${f.oppgaveKrav==="nei"?"ikke":"delvis"} oppgavens krav (${f.oppgaveKrav==="nei"?"−1":"−¼"})`}
                  </div>
                )}
                <p style={{ fontSize:11, color:"var(--color-text-secondary)", margin:0, lineHeight:1.5 }}>
                  Karakteren viser hva du har demonstrert av kompetanse opp mot kompetansemålene — ikke hva som er trukket fra en toppkarakter.
                </p>
              </div>
            )}
          </Section>
        </>
      )}

      <Section title="Framovermelding">
        <textarea style={{ ...inp, minHeight:80, resize:"vertical", marginBottom:8 }}
          value={f.framovermelding} onChange={e=>upd("framovermelding",e.target.value)}
          placeholder="Hva skal eleven jobbe videre med…" />
        <Btn secondary sm onClick={()=>{
          const graderte = relevantFd.filter(r=>f.rubrikknivå?.[r.id]&&!f.ekskluderteFerdigheter?.includes(r.id));
          const påvei_ = graderte.filter(r=>f.rubrikknivå[r.id]==="påvei");
          const svake = graderte.filter(r=>f.rubrikknivå[r.id]==="lav");
          const middels_ = graderte.filter(r=>f.rubrikknivå[r.id]==="middels");
          const sterke = graderte.filter(r=>f.rubrikknivå[r.id]==="høy");
          const rubrikklinje = r => { const niv=f.rubrikknivå[r.id]; const tekst=niv==="påvei"?getPåveiText(r):r[niv]; return `- ${r.kriterium} (${NIV_LABEL[niv]}): ${tekst}`; };
          const stjerner = [f.stjerne1&&`⭐ ${f.stjerne1}`,f.stjerne2&&`⭐ ${f.stjerne2}`].filter(Boolean).join("\n");
          const prompt = [
            `Du er en hjelper for en teaterlærer ved Vågen vgs. Skriv en framovermelding på norsk (2–4 setninger) som er varm, konkret og fremoverrettet. Fokuser på hva eleven bør jobbe videre med. Ikke gjenta stjernene. Skriv kun selve framovermeldingsteksten.`,
            `\nFag: ${fag.navn}\nOppgave: ${oppgave.tittel}${finalK?`\nKarakter: ${finalK}`:""}`,
            stjerner?`\nDet eleven gjorde godt:\n${stjerner}`:"",
            påvei_.length?`\nKriterier ikke ennå nådd:\n${påvei_.map(rubrikklinje).join("\n")}`:"",
            svake.length?`\nOmråder som trenger utvikling:\n${svake.map(rubrikklinje).join("\n")}`:"",
            middels_.length?`\nOmråder på god vei:\n${middels_.map(rubrikklinje).join("\n")}`:"",
            sterke.length?`\nStyrker:\n${sterke.map(rubrikklinje).join("\n")}`:"",
            !graderte.length?"\n(Ingen kriterier er vurdert ennå)":"",
            f.framovermelding?`\nUtkast (forbedre gjerne):\n${f.framovermelding}`:"",
          ].filter(Boolean).join("\n");
          navigator.clipboard.writeText(prompt).then(()=>alert("Prompt kopiert! Lim inn i Claude."));
        }}>Kopier prompt til Claude →</Btn>
      </Section>

      <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
        <Btn onClick={()=>doSave(false)}>Lagre</Btn>
        <Btn onClick={()=>doSave(true)}>
          {nextNr != null ? "Lagre og neste elev →" : "Lagre og avslutt"}
        </Btn>
        <Btn secondary onClick={()=>setPreviewData({...f,beregnetKarakter:beregnet})}>Skriv ut tilbakemelding</Btn>
        <Btn secondary onClick={()=>{
          navigator.clipboard.writeText(buildFeedbackTekst({...f,beregnetKarakter:beregnet},oppgave,fag));
          alert("Kopiert!");
        }}>Kopier tekst</Btn>
        <Btn secondary onClick={()=>go("vurderingOppgave",fag.id,oppgave.id)}>Tilbake</Btn>
      </div>
    </div>
  );
}


// ── Print preview ─────────────────────────────────────────────────────

function PrintPreview({ v, oppgave, fag, navneliste, onClose }) {
  const [navn, setNavn] = useState(navneliste?.[v.elevNr] || "");
  const finalK = getEffectiveGrade(v);
  const inputRef = React.useRef(null);
  React.useEffect(() => { inputRef.current?.focus(); }, []);

  const doPrint = () => {
    const html = buildTilbakemeldingHtml(v, oppgave, fag, navn.trim() || null);
    const w = window.open("","_blank");
    w.document.write(html); w.document.close(); w.focus();
    setTimeout(()=>{ w.print(); }, 400);
    onClose();
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.55)", zIndex:2000,
      display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
      <div style={{ background:"#fff", borderRadius:12, padding:28, width:440, display:"flex", flexDirection:"column", gap:18 }}>
        <div>
          <h2 style={{ fontFamily:"'Libre Baskerville',serif", fontSize:17, color:P, margin:"0 0 4px" }}>
            Skriv ut tilbakemelding
          </h2>
          <p style={{ fontSize:13, color:"var(--color-text-secondary)", margin:0 }}>
            {oppgave.tittel} · #{v.elevNr}{finalK ? ` · Karakter ${finalK}` : ""}
          </p>
        </div>

        <div>
          <label style={{ display:"block", fontSize:10, fontWeight:600, letterSpacing:"0.07em",
            color:"var(--color-text-secondary)", marginBottom:6, textTransform:"uppercase" }}>
            Elevnavn for denne utskriften
          </label>
          <input
            ref={inputRef}
            value={navn}
            onChange={e=>setNavn(e.target.value)}
            onKeyDown={e=>e.key==="Enter" && doPrint()}
            placeholder={navneliste?.[v.elevNr] ? navneliste[v.elevNr] : `La stå tomt for å bruke Elev ${v.elevNr}`}
            style={{ ...inp }}
          />
          <p style={{ fontSize:11, color:"var(--color-text-secondary)", margin:"5px 0 0" }}>
            Vises kun i utskriften — lagres ikke i appen.
          </p>
        </div>

        <div style={{ display:"flex", gap:10 }}>
          <button onClick={doPrint} style={{ padding:"9px 22px", background:P, color:"#fff",
            border:"none", borderRadius:6, fontSize:14, cursor:"pointer", fontFamily:"inherit", fontWeight:500 }}>
            🖨 Lagre som PDF
          </button>
          <button onClick={onClose} style={{ padding:"9px 16px", background:"transparent",
            border:"0.5px solid var(--color-border-secondary)", borderRadius:6, fontSize:14,
            cursor:"pointer", fontFamily:"inherit" }}>
            Avbryt
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
