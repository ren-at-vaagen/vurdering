const DEFAULT_JSONBIN_KEY = "$2a$10$VnawzeIfGKVKee8XZR.Fx.M8rX6YM2gp/EXls8sbk01MwsoIOLb3.";
const JSONBIN_BASE = "https://api.jsonbin.io/v3/b";

async function jsonbinSave(data) {
  const key = localStorage.getItem("jsonbin-key") || DEFAULT_JSONBIN_KEY;
  const binId = localStorage.getItem("jsonbin-id") || "";
  if (!key) throw new Error("Ingen API-nøkkel");
  if (binId) {
    const res = await fetch(JSONBIN_BASE + "/" + binId, {
      method: "PUT",
      headers: { "Content-Type": "application/json", "X-Master-Key": key },
      body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error("Lagring feilet: " + res.status);
  } else {
    const res = await fetch(JSONBIN_BASE, {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-Master-Key": key, "X-Bin-Name": "vurdering-v1", "X-Bin-Private": "true" },
      body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error("Oppretting feilet: " + res.status);
    const d = await res.json();
    const newId = d.metadata?.id;
    if (newId) localStorage.setItem("jsonbin-id", newId);
  }
}

async function jsonbinLoad() {
  const key = localStorage.getItem("jsonbin-key") || DEFAULT_JSONBIN_KEY;
  const binId = localStorage.getItem("jsonbin-id") || "";
  if (!key || !binId) throw new Error("Mangler nøkkel eller Bin ID");
  const res = await fetch(JSONBIN_BASE + "/" + binId + "/latest", {
    headers: { "X-Master-Key": key }
  });
  if (!res.ok) throw new Error("Henting feilet: " + res.status);
  const d = await res.json();
  return d.record;
}

function calcGrade(nMap, rubrikk) {
  const V = { lav: 2.5, middels: 4.5, høy: 6 };
  let s = 0, w = 0;
  rubrikk?.forEach(k => {
    const v = V[nMap?.[k.id]];
    if (v != null) { s += v * (k.vekt || 1); w += k.vekt || 1; }
  });
  return w ? Math.min(6, Math.max(2, Math.round(s / w))) : null;
}

              <div key={f.id} style={{ ...card, cursor:"pointer", background: empty ? "var(--color-background-secondary)" : "var(--color-background-primary)", opacity: empty ? 0.7 : 1 }} onClick={() => go("fag", f.id)}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:14 }}>
                  <span style={{ fontFamily:"'Libre Baskerville',serif", fontSize:14, fontWeight:700, color: empty ? "var(--color-text-secondary)" : P, lineHeight:1.3, flex:1, marginRight:8 }}>{f.navn}</span>
                  <span style={{ fontSize:10, background:"var(--color-background-secondary)", padding:"2px 6px", borderRadius:3, color:"var(--color-text-secondary)", flexShrink:0 }}>{f.trinn}</span>
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10 }}>
                  <Stat label="Elever" val={f.antallElever} />
                  <Stat label="Oppgaver" val={nOpp} />
                  <Stat label="Rubrikk" val={f.rubrikk?.length || 0} />
                </div>
              </div>
            );
          })}
          {data.fag.length < 8 && (
            <div style={{ ...card, cursor:"pointer", border:"0.5px dashed var(--color-border-secondary)", display:"flex", alignItems:"center", justifyContent:"center", minHeight:90 }} onClick={() => nav("nyttFag")}>
              <span style={{ color:A, fontSize:14 }}>+ Nytt fag</span>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function Stat({ label, val }) {
  return (
    <div>
      <div style={{ fontSize:18, fontWeight:600 }}>{val}</div>
      <div style={{ fontSize:11, color:"var(--color-text-secondary)" }}>{label}</div>
    </div>
  );
}

function FagForm({ data, save, go, nav, fagEdit }) {
  const isEdit = !!fagEdit;
  const [f, setF] = useState(() => fagEdit
    ? JSON.parse(JSON.stringify(fagEdit))
    : { id:uid(), navn:"", trinn:"Vg2", antallElever:30, kjerneelementer:"",
        kompetansemål:[{ id:uid(), tekst:"" }], brukBloom:false,
        rubrikk:[{ id:uid(), kriterium:"", lav:"", middels:"", høy:"", vekt:1, kategori:"generell" }] }
  );

  const upd = (k, v) => setF(p => ({ ...p, [k]:v }));
  const addM = () => upd("kompetansemål", [...f.kompetansemål, { id:uid(), tekst:"" }]);
  const delM = id => upd("kompetansemål", f.kompetansemål.filter(m => m.id!==id));
  const setM = (id, t) => upd("kompetansemål", f.kompetansemål.map(m => m.id===id ? { ...m, tekst:t } : m));
  const addR = () => upd("rubrikk", [...f.rubrikk, { id:uid(), kriterium:"", lav:"", middels:"", høy:"", vekt:1, kategori:"generell" }]);
  const delR = id => upd("rubrikk", f.rubrikk.filter(r => r.id!==id));
  const setR = (id, k, v) => upd("rubrikk", f.rubrikk.map(r => r.id===id ? { ...r, [k]:v } : r));

  const doSave = () => {
    if (!f.navn.trim()) return alert("Fagnavn er påkrevd");
    save({ ...data, fag: isEdit ? data.fag.map(x => x.id===f.id ? f : x) : [...data.fag, f] });
    go("fag", f.id);
  };

  const doDelete = () => {
    if (!window.confirm(`Slette "${f.navn}" og all tilhørende data?`)) return;
    save({ ...data, fag:data.fag.filter(x => x.id!==f.id), oppgaver:data.oppgaver.filter(o => o.fagId!==f.id), vurderinger:data.vurderinger.filter(v => v.fagId!==f.id) });
    nav("oversikt");
  };

  return (
    <div>
      <h1 style={h1}>{isEdit ? `Rediger: ${fagEdit.navn}` : "Nytt fag"}</h1>

      <Section title="Grunninfo">
        <div style={{ display:"grid", gridTemplateColumns:"1fr 110px 120px", gap:14 }}>
          <Fld label="Fagnavn"><input style={inp} value={f.navn} onChange={e => upd("navn", e.target.value)} placeholder="f.eks. Teaterproduksjon 1" /></Fld>
          <Fld label="Trinn"><select style={inp} value={f.trinn} onChange={e => upd("trinn", e.target.value)}>{TRINN.map(t => <option key={t}>{t}</option>)}</select></Fld>
          <Fld label="Antall elever"><input style={inp} type="number" min={1} max={60} value={f.antallElever} onChange={e => upd("antallElever", +e.target.value||1)} /></Fld>
        </div>
      </Section>

      <Section title="Kjerneelementer og vurderingsrubrikk">
        <p style={hint}>Lim inn fra Udir.</p>
        <textarea style={{ ...inp, minHeight:100, resize:"vertical" }} value={f.kjerneelementer} onChange={e => upd("kjerneelementer", e.target.value)} placeholder="Lim inn kjerneelementer her…" />
      </Section>

      <Section title="Kompetansemål og vurderingsrubrikk">
        <p style={hint}>Lim inn eller skriv kompetansemål – ett per felt.</p>
        {f.kompetansemål.map((m, i) => (
          <div key={m.id} style={{ display:"flex", gap:8, marginBottom:8, alignItems:"flex-start" }}>
            <span style={{ paddingTop:9, color:"var(--color-text-secondary)", fontSize:12, minWidth:20 }}>{i+1}.</span>
            <textarea style={{ ...inp, minHeight:52, resize:"vertical", flex:1 }} value={m.tekst} onChange={e => setM(m.id, e.target.value)} placeholder="Kompetansemål…" />
            {f.kompetansemål.length > 1 && <button style={xbtn} onClick={() => delM(m.id)}>×</button>}
          </div>
        ))}
        <Btn secondary sm onClick={addM}>+ Legg til mål</Btn>
      </Section>

      <Section title="Rubrikk">
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14, gap:16 }}>
          <p style={{ ...hint, marginBottom:0, flex:1 }}>Definer kriterier med nivåbeskrivelser. Vekt (1–3) styrer vektlegging i karakterberegningen.</p>
          <label style={{ display:"flex", alignItems:"center", gap:7, fontSize:13, cursor:"pointer", flexShrink:0 }}>
            <input type="checkbox" checked={f.brukBloom} onChange={e => upd("brukBloom", e.target.checked)} />
            Bloom's-rad
          </label>
        </div>
        <div style={{ overflowX:"auto", borderRadius:8, border:"0.5px solid var(--color-border-tertiary)" }}>
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
            <thead>
              <tr style={{ background:P }}>
                {[["Kriterium","160px"],["På vei (2–3)",""],["Solid (4–5)",""],["Utmerket (6)",""],["Kategori","110px"],["Vekt","50px"],["","32px"]].map(([h,w], i) => (
                  <th key={i} style={{ padding:"9px 10px", textAlign:"left", fontWeight:500, fontSize:12, color:"#fff", ...(w?{width:w}:{}) }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {f.brukBloom && (
                <tr style={{ background:AB, borderBottom:"0.5px solid var(--color-border-tertiary)" }}>
                  <td style={{ ...tdc, fontWeight:600, fontSize:12, color:P }}>Bloom's taksonomi</td>
                  {["Gjengi","Forklar · sammenligne","Analyser · drøfte · skap"].map(t => (
                    <td key={t} style={{ ...tdc, color:"#6B5618", fontSize:12 }}>{t}</td>
                  ))}
                  <td style={tdc} colSpan={2}></td>
                </tr>
              )}
              {f.rubrikk.map(r => (
                <tr key={r.id} style={{ borderBottom:"0.5px solid var(--color-border-tertiary)" }}>
                  <td style={tdc}><input style={tinp} value={r.kriterium} onChange={e => setR(r.id,"kriterium",e.target.value)} placeholder="Kriterienavn…" /></td>
                  {["lav","middels","høy"].map(n => (
                    <td key={n} style={tdc}><textarea style={{ ...tinp, minHeight:62, resize:"vertical" }} value={r[n]} onChange={e => setR(r.id,n,e.target.value)} placeholder={n.charAt(0).toUpperCase()+n.slice(1)+" nivå…"} /></td>
                  ))}
                  <td style={tdc}>
                    <select style={{ ...tinp, fontSize:11 }} value={r.kategori||"generell"} onChange={e => setR(r.id,"kategori",e.target.value)}>
                      <option value="framføring">Framføring</option>
                      <option value="analyse">Analyse</option>
                      <option value="ledelse">Ledelse</option>
                      <option value="generell">Generell</option>
                    </select>
                  </td>
                  <td style={{ ...tdc, textAlign:"center" }}>
                    <select style={{ ...tinp, width:44, padding:"5px 3px", textAlign:"center" }} value={r.vekt} onChange={e => setR(r.id,"vekt",+e.target.value)}>
                      {[1,2,3].map(v => <option key={v}>{v}</option>)}
                    </select>
                  </td>
                  <td style={{ ...tdc, textAlign:"center" }}>
                    {f.rubrikk.length > 1 && <button style={xbtn} onClick={() => delR(r.id)}>×</button>}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div style={{ marginTop:10 }}><Btn secondary sm onClick={addR}>+ Legg til kriterium</Btn></div>
      </Section>

      <div style={{ display:"flex", gap:10, flexWrap:"wrap", marginTop:4 }}>
        <Btn onClick={doSave}>{isEdit ? "Lagre endringer" : "Opprett fag"}</Btn>
        <Btn secondary onClick={() => isEdit ? go("fag", fagEdit.id) : nav("oversikt")}>Avbryt</Btn>
        {isEdit && <Btn danger onClick={doDelete} style={{ marginLeft:"auto" }}>Slett fag</Btn>}
      </div>
    </div>
  );
}

function FagView({ fag, data, save, go, nav, tab, setTab }) {
  const tabs = [
    { id:"info", label:"Info" },
    { id:"oppgaver", label:"Oppgaver" },
    { id:"rubrikk", label:"Rubrikk" },
    { id:"vurdering", label:"Vurdering" },
    { id:"elever", label:`Elever (${fag.antallElever})` },
  ];

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:18 }}>

          <h1 style={{ ...h1, marginBottom:6 }}>{fag.navn}</h1>
          <span style={{ fontSize:12, background:"var(--color-background-secondary)", padding:"2px 8px", borderRadius:3, color:"var(--color-text-secondary)" }}>
            {fag.trinn} · {fag.antallElever} elever · {fag.rubrikk?.length||0} kriterier{fag.brukBloom ? " · Bloom's ✓" : ""}

        </div>
        <div style={{ display:"flex", gap:8 }}>
          <Btn secondary sm onClick={() => go("redigerFag", fag.id)}>Rediger</Btn>

            const idx = data.fag.findIndex(f => f.id === fag.id);

          }}>↑</Btn>
          <Btn secondary sm onClick={() => {
            const idx = data.fag.findIndex(f => f.id === fag.id);
            if (idx < data.fag.length-1) { const arr=[...data.fag]; [arr[idx],arr[idx+1]]=[arr[idx+1],arr[idx]]; save({...data,fag:arr}); }
          }}>↓</Btn>
        </div>
      </div>

      <div style={{ display:"flex", borderBottom:"0.5px solid var(--color-border-tertiary)", marginBottom:22 }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            padding:"7px 16px", border:"none", cursor:"pointer", background:"transparent", fontFamily:"inherit",
            fontSize:13, color:tab===t.id ? A : "var(--color-text-secondary)", fontWeight:tab===t.id ? 600 : 400,
            borderBottom:`2px solid ${tab===t.id ? A : "transparent"}`, marginBottom:-1,
          }}>{t.label}</button>
        ))}

      {tab==="info" && <FagInfo fag={fag} data={data} />}
      {tab==="rubrikk" && <FagRubrikk fag={fag} />}
      {tab==="elever" && <FagElever fag={fag} data={data} />}
      {tab==="oppgaver" && <OppgaveList fag={fag} data={data} save={save} go={go} nav={nav} />}
      {tab==="vurdering" && <VurderingOversikt fag={fag} data={data} go={go} nav={nav} />}
    </div>
  );
}

function FagInfo({ fag, data }) {
  const oppgaver = data.oppgaver.filter(o => o.fagId === fag.id);
  const vurderinger = data.vurderinger.filter(v => v.fagId === fag.id);

  return (
    <div style={{ display:"grid", gap:16 }}>
      <div style={card}>
        <h3 style={sh3}>Kompetansemål — dekningsgrad</h3>
        {fag.kompetansemål?.some(m => m.tekst) ? (
          <div style={{ display:"grid", gap:10 }}>
            {fag.kompetansemål.filter(m => m.tekst).map(m => {
              const oppgaverMedMål = oppgaver.filter(o => o.kompetansemålIds?.includes(m.id));
              const harVurdering = oppgaverMedMål.some(o =>
                vurderinger.some(v => v.oppgaveId === o.id)
              );
              const status = harVurdering ? "vurdert" : oppgaverMedMål.length > 0 ? "oppgave" : "ingen";
              const farger = {
                vurdert: { bg:"#D4EDDA", border:"#27AE60", text:"#1A5C2A", ikon:"✅", label:"Vurdert" },
                oppgave: { bg:"#FFF8E1", border:"#F0A500", text:"#7A5E00", ikon:"🟡", label:"Oppgave finnes" },
                ingen:   { bg:"var(--color-background-secondary)", border:"var(--color-border-tertiary)", text:"var(--color-text-secondary)", ikon:"⬜", label:"Ikke dekket" },
              };
              const f_ = farger[status];
              return (
                <div key={m.id} style={{ display:"flex", gap:12, alignItems:"flex-start",
                  background:f_.bg, border:`1px solid ${f_.border}`, borderRadius:8, padding:"10px 14px" }}>
                  <span style={{ fontSize:16, flexShrink:0, marginTop:1 }}>{f_.ikon}</span>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:13, lineHeight:1.6, color:"var(--color-text-primary)" }}>{m.tekst}</div>
                    <div style={{ fontSize:11, color:f_.text, marginTop:3, fontWeight:500 }}>
                      {f_.label}
                      {oppgaverMedMål.length > 0 && ` · ${oppgaverMedMål.length} oppgave${oppgaverMedMål.length > 1 ? "r" : ""}: ${oppgaverMedMål.map(o => o.tittel).join(", ")}`}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        ) : <em style={{ color:"var(--color-text-secondary)", fontSize:14 }}>Ikke lagt inn.</em>}
      </div>
      <div style={card}>
        <h3 style={sh3}>Kjerneelementer og vurderingsrubrikk</h3>
        {fag.kjerneelementer
          ? <p style={{ fontSize:14, lineHeight:1.75, margin:0, whiteSpace:"pre-wrap" }}>{fag.kjerneelementer}</p>
          : <em style={{ color:"var(--color-text-secondary)", fontSize:14 }}>Ikke lagt inn.</em>}
      </div>
    </div>
  );
}

          <tr style={{ background:P }}>

function FagRubrikk({ fag }) {
  const [kmType, setKmType] = useState("muntlig");
  const harKm = fag.kompetansemål?.some(m => m.tekst);
  const harRubrikk = fag.rubrikk?.some(r => r.kriterium);
  if (!harKm && !harRubrikk) return <PH msg="Rubrikk ikke utfylt ennå. Rediger faget for å legge til kriterier." />;

  const katLabels = { framføring:"Framføring", analyse:"Analyse", ledelse:"Ledelse & prosess", generell:"Generell" };
  const katOrder = ["framføring","analyse","ledelse","generell"];
  const grouped = katOrder.reduce((acc, k) => {
    const items = fag.rubrikk?.filter(r => (r.kategori||"generell")===k && r.kriterium) || [];
    if (items.length) acc[k] = items;
    return acc;
  }, {});

  return (
    <div style={{ display:"grid", gap:20 }}>
      {harKm && (
        <div>
          <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:8 }}>
            <div style={{ fontSize:11, fontWeight:600, letterSpacing:"0.08em", textTransform:"uppercase", color:"var(--color-text-secondary)" }}>
              Kompetansemål
            </div>
            <div style={{ display:"flex", gap:4 }}>
              {["muntlig","praktisk_muntlig","skriftlig"].map(t => (
                <button key={t} onClick={() => setKmType(t)} style={{
                  padding:"3px 10px", borderRadius:4, fontSize:12, cursor:"pointer", fontFamily:"inherit",
                  border:`1px solid ${kmType===t ? A : "var(--color-border-secondary)"}`,
                  background: kmType===t ? AB : "transparent",
                  color: kmType===t ? "#7A5618" : "var(--color-text-secondary)", fontWeight: kmType===t ? 600 : 400
                }}>{t.charAt(0).toUpperCase()+t.slice(1)}</button>
              ))}
            </div>
          </div>
          <KmRubrikkTable kompetansemål={fag.kompetansemål} type={kmType} />
        </div>
      )}
      {Object.entries(grouped).map(([kat, krit]) => (
        <div key={kat}>
          <div style={{ fontSize:11, fontWeight:600, letterSpacing:"0.08em", textTransform:"uppercase",
            color:"var(--color-text-secondary)", marginBottom:8, paddingLeft:2 }}>
            {katLabels[kat]}
          </div>
          <div style={{ overflowX:"auto", borderRadius:8, border:"0.5px solid var(--color-border-tertiary)" }}>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
              <thead>
                <tr style={{ background:P }}>
                  {[["Kriterium","180px"],["På vei (2–3)",""],["Solid (4–5)",""],["Utmerket (6)",""],["Vekt","52px"]].map(([h,w], i) => (
                    <th key={i} style={{ padding:"9px 12px", textAlign:"left", fontWeight:500, fontSize:12, color:"#fff", ...(w?{width:w}:{}) }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {krit.map(r => (
                  <tr key={r.id} style={{ borderBottom:"0.5px solid var(--color-border-tertiary)" }}>
                    <td style={{ ...tdc, fontWeight:600 }}>{r.kriterium}</td>
                    <td style={{ ...tdc, lineHeight:1.65 }}>{r.lav}</td>
                    <td style={{ ...tdc, lineHeight:1.65 }}>{r.middels}</td>
                    <td style={{ ...tdc, lineHeight:1.65 }}>{r.høy}</td>
                    <td style={{ ...tdc, textAlign:"center" }}>{r.vekt}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      ))}
    </div>
  );
}

function FagElever({ fag, data }) {
  const vurd = data.vurderinger.filter(v => v.fagId===fag.id);
  const oppgaver = data.oppgaver.filter(o => o.fagId===fag.id && !o.arkivert).sort((a,b)=>(a.dato||"").localeCompare(b.dato||""));

  if (oppgaver.length === 0) return (
    <div>
      <p style={{ ...hint, marginBottom:16 }}>Elevnummer brukes i stedet for navn (personvern).</p>
      <PH msg="Ingen oppgaver ennå — opprett oppgaver for å se karakteroversikten." />
    </div>
  );

  const FLAG_GRADES = ["Ikke bestått", "💬 Samtale"];
  const colW = `${Math.floor(80 / Math.min(oppgaver.length, 6))}%`;

  const gradeColor = k => {
    if (!k) return "var(--color-text-secondary)";
    if (FLAG_GRADES.includes(k) || k === "IV") return "var(--color-text-secondary)";
    const n = parseInt(k);
    if (n >= 5) return "#27AE60";
    if (n >= 4) return "#9E7022";
    return "#5B9FD4";
  };

  return (
    <div>
      <p style={{ ...hint, marginBottom:16 }}>Elevnummer brukes i stedet for navn (personvern).</p>
      <div style={{ overflowX:"auto" }}>
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13, tableLayout:"fixed" }}>
          <thead>
            <tr style={{ background:P }}>
              <th style={{ padding:"9px 12px", textAlign:"left", fontWeight:500, fontSize:12, color:"#fff", width:70 }}>Elev</th>
              {oppgaver.map(o => (
                <th key={o.id} style={{ padding:"9px 10px", textAlign:"center", fontWeight:500, fontSize:11, color:"#fff", width:colW }}>
                  <div style={{ overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }} title={o.tittel}>{o.tittel}</div>
                </th>
              ))}
              <th style={{ padding:"9px 10px", textAlign:"center", fontWeight:500, fontSize:11, color:"rgba(255,255,255,0.7)", width:64 }}>Snitt</th>
            </tr>
          </thead>
          <tbody>
            {Array.from({ length:fag.antallElever }, (_, i) => {
              const nr = i+1;
              const grades = oppgaver.map(o => {
                const v = vurd.find(v => v.oppgaveId===o.id && v.elevNr===nr);
                return v ? (v.justerKarakter || (v.beregnetKarakter ? String(v.beregnetKarakter) : null)) : null;
              });
              const numericGrades = grades.map(g => parseInt(g)).filter(n => !isNaN(n));
              const snitt = numericGrades.length ? (numericGrades.reduce((a,b)=>a+b,0)/numericGrades.length).toFixed(1) : null;
              const flagged = grades.some(g => g && FLAG_GRADES.includes(g));
              return (
                <tr key={nr} style={{ borderBottom:"0.5px solid var(--color-border-tertiary)" }}>
                  <td style={{ padding:"8px 12px", fontWeight:500, fontSize:13 }}>Elev {nr}</td>
                  {grades.map((g, gi) => (
                    <td key={gi} style={{ padding:"8px 10px", textAlign:"center" }}>
                      <span style={{ fontWeight:600, fontSize:14, color:gradeColor(g) }}>
                        {g === "💬 Samtale" ? "💬" : g === "Ikke bestått" ? "IB" : g || "—"}
                      </span>
                    </td>
                  ))}
                  <td style={{ padding:"8px 10px", textAlign:"center" }}>
                    <span style={{ fontSize:13, color:"var(--color-text-secondary)", fontWeight:500 }}>
                      {snitt || "—"}{flagged ? " 🏳️" : ""}
                    </span>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function PrintPreview({ v, oppgave, fag, onClose }) {
  const doPrint = () => {
    const html = buildTilbakemeldingHtml(v, oppgave, fag);
    const w = window.open("", "_blank");
    w.document.write(html);
    w.document.close();
    w.focus();
    setTimeout(() => w.print(), 400);
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", zIndex:2000, display:"flex", flexDirection:"column" }}>
      <div style={{ background:P, padding:"10px 20px", display:"flex", alignItems:"center", gap:12, flexShrink:0 }}>

        <button onClick={onClose} style={{ background:"transparent", border:"1px solid rgba(255,255,255,0.4)", color:"#fff", borderRadius:6, padding:"7px 14px", fontSize:13, cursor:"pointer", fontFamily:"inherit" }}>Lukk</button>

          <TilbakemeldingContent v={v} oppgave={oppgave} fag={fag} />

  );
}

function buildTilbakemeldingHtml(v, oppgave, fag) {
  return printElevFeedback(v, oppgave, fag);
}

function buildOppgaveTekst(oppgave, fag) {
  const mål = fag.kompetansemål.filter(m => oppgave.kompetansemålIds?.includes(m.id));
  const krit = fag.rubrikk.filter(r => oppgave.rubrikIds?.includes(r.id));
  const fmt = d => d ? d.split("-").reverse().join(".") : "";
  const vtype = oppgave.vurderingstype ? ({muntlig:"Muntlig",skriftlig:"Skriftlig",praktisk_muntlig:"Praktisk/muntlig"}[oppgave.vurderingstype]||oppgave.vurderingstype) : "";
  let t = "Ren Powell  ·  Vågen vgs  ·  " + fag.navn + "  ·  " + fag.trinn + "\n";
  t += oppgave.tittel + "\n";
  const meta = [oppgave.dato && "Gitt: "+fmt(oppgave.dato), oppgave.frist && "Frist: "+fmt(oppgave.frist), vtype].filter(Boolean).join("  |  ");
  if (meta) t += meta + "\n";
  t += "\n";
  if (oppgave.kortBeskrivelse) t += oppgave.kortBeskrivelse + "\n\n";
  if (oppgave.ramme) t += "OPPGAVEN\n" + oppgave.ramme + "\n\n";
  if (oppgave.framgangsmåte) t += "FRAMGANGSMÅTE\n" + oppgave.framgangsmåte + "\n\n";
  if (oppgave.ressurser) t += "RESSURSER\n" + oppgave.ressurser + "\n\n";
  if (mål.length > 0) {
    t += "KOMPETANSEMÅL\n";
    mål.forEach((m, i) => { t += (i+1) + ". " + m.tekst + "\n"; });
    t += "\n";
  }
  if (krit.length > 0) {
    t += "VURDERINGSKRITERIER\n\n";
    krit.forEach(r => {
      t += r.kriterium + "\n";
      t += "  På vei (2–3):  " + r.lav + "\n";
      t += "  Solid (4–5):   " + r.middels + "\n";
      t += "  Utmerket (6):  " + r.høy + "\n\n";
    });
  }
  return t;
}

function buildFeedbackTekst(v, oppgave, fag) {
  const krit = fag.rubrikk.filter(r => oppgave.rubrikIds?.includes(r.id));
  const graderte = krit.filter(r => v.rubrikknivå?.[r.id]);
  const finalK = v.justerKarakter || (v.beregnetKarakter ? String(v.beregnetKarakter) : null);
  const nivåLabel = { lav:"På vei (2–3)", middels:"Solid (4–5)", høy:"Utmerket (6)" };
  let t = "";
  t += `${fag.navn} — ${oppgave.tittel}\n`;
  t += `Ren Powell · Vågen vgs.\n\n`;
  t += `Karakter ${finalK || "—"} er satt på bakgrunn av kompetansemålene i ${fag.navn}.\n\n`;
  if (v.stjerne1 || v.stjerne2) {
    t += `Det du gjorde godt:\n`;
    if (v.stjerne1) t += `⭐ ${v.stjerne1}\n`;
    if (v.stjerne2) t += `⭐ ${v.stjerne2}\n`;
    t += "\n";
  }
  if (graderte.length > 0) {
    graderte.forEach(r => {
      const niv = v.rubrikknivå[r.id];
      t += `${r.kriterium} — ${nivåLabel[niv]}\n${r[niv]}\n\n`;
    });
  }
  if (v.justerKarakter && v.beregnetKarakter && v.justerBegrunnelse) {
    t += `Karakteren er justert fra ${v.beregnetKarakter} til ${v.justerKarakter}: ${v.justerBegrunnelse}\n\n`;
  }
  if (v.framovermelding) t += `Framover:\n${v.framovermelding}\n\n`;
  t += `---\nKarakteren viser hva du har demonstrert av kompetanse opp mot kompetansemålene — ikke hva som er trukket fra en toppkarakter.\n\n`;
  t += `Med vennlig hilsen\nRen Powell, Vågen vgs.`;
  return t;
}

function exportKarakterliste(fag, data) {
  const oppgaver = data.oppgaver.filter(o => o.fagId===fag.id && !o.arkivert).sort((a,b)=>(a.dato||"").localeCompare(b.dato||""));
  const vurd = data.vurderinger.filter(v => v.fagId===fag.id);
  const header = ["Elev", ...oppgaver.map(o => o.tittel)];
  const rows = [header];
  for (let nr = 1; nr <= fag.antallElever; nr++) {
    const row = [nr];
    oppgaver.forEach(o => {
      const v = vurd.find(v => v.oppgaveId===o.id && v.elevNr===nr);
      row.push(v?.justerKarakter || v?.beregnetKarakter || "");
    });
    rows.push(row);
  }
  const csv = rows.map(r => r.join(";")).join("\n");
  const _b3=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"}); const _a3=document.createElement("a"); _a3.href=URL.createObjectURL(_b3); _a3.download=`karakterer-${fag.navn}.csv`; _a3.click();
}

        <Btn onClick={doSave}>{isEdit ? "Lagre endringer" : "Lagre oppgave"}</Btn>
        <Btn secondary onClick={() => {
          const mål = fag.kompetansemål?.filter(m => oppgave.kompetansemålIds?.includes ? oppgave.kompetansemålIds?.includes(m.id) : m.tekst).map(m => `- ${m.tekst}`).join("\n")
            || fag.kompetansemål?.filter(m => m.tekst).map(m => `- ${m.tekst}`).join("\n");
          const valgteMål = fag.kompetansemål?.filter(m => f.kompetansemålIds?.includes(m.id) && m.tekst).map(m => `- ${m.tekst}`).join("\n");
          const valgteKrit = fag.rubrikk?.filter(r => f.rubrikIds?.includes(r.id) && r.kriterium).map(r => `- ${r.kriterium}`).join("\n");
          const prompt = [
            `Du er en hjelper for en teaterlærer ved Vågen vgs. Hjelp med å skrive eller forbedre en oppgavetekst på norsk tilpasset ${fag.trinn}.`,
            `\nSkriv to seksjoner:\n1. RAMME: En kort innledning som setter kontekst og beskriver hva oppgaven går ut på (2–4 setninger).\n2. FREMGANGSMÅTE: Konkrete steg eller instruksjoner som forklarer hvordan eleven skal gjennomføre oppgaven.`,
            `\nFag: ${fag.navn}\nTrinn: ${fag.trinn}`,
            f.tittel ? `Tittel: ${f.tittel}` : "",
            valgteMål ? `\nValgte kompetansemål:\n${valgteMål}` : (mål ? `\nKompetansemål:\n${mål}` : ""),
            valgteKrit ? `\nVurderingskriterier som gjelder:\n${valgteKrit}` : "",
            f.kortBeskrivelse ? `\nKort beskrivelse (utgangspunkt):\n${f.kortBeskrivelse}` : "",
            f.ramme ? `\nEksisterende ramme (forbedre gjerne):\n${f.ramme}` : "",
            f.framgangsmåte ? `\nEksisterende fremgangsmåte (forbedre gjerne):\n${f.framgangsmåte}` : "",
          ].filter(Boolean).join("\n");
          navigator.clipboard.writeText(prompt).then(() => alert("Prompt kopiert! Lim inn i Claude."));
        }}>Kopier prompt til Claude →</Btn>
        <Btn secondary onClick={() => go("fag", fag.id)}>Avbryt</Btn>
        {isEdit && <Btn danger onClick={doDelete} style={{ marginLeft:"auto" }}>Slett oppgave</Btn>}
      </div>
    </div>
  );
}

function VurderingOversikt({ fag, data, go, nav }) {
  const oppgaver = data.oppgaver.filter(o => o.fagId===fag.id);
  const vurd = data.vurderinger.filter(v => v.fagId===fag.id);
  const totalt = oppgaver.length * fag.antallElever;

  return (
    <div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12, marginBottom:20 }}>
        <div style={{ background:"var(--color-background-secondary)", borderRadius:"var(--border-radius-md)", padding:"12px 16px" }}>
          <div style={{ fontSize:20, fontWeight:600 }}>{oppgaver.length}</div>
          <div style={{ fontSize:11, color:"var(--color-text-secondary)" }}>Oppgaver</div>
        </div>
        <div style={{ background:"var(--color-background-secondary)", borderRadius:"var(--border-radius-md)", padding:"12px 16px" }}>
          <div style={{ fontSize:20, fontWeight:600 }}>{vurd.length}</div>
          <div style={{ fontSize:11, color:"var(--color-text-secondary)" }}>Vurdert</div>
        </div>
        <div style={{ background:"var(--color-background-secondary)", borderRadius:"var(--border-radius-md)", padding:"12px 16px" }}>
          <div style={{ fontSize:20, fontWeight:600 }}>{Math.max(0, totalt - vurd.length)}</div>
          <div style={{ fontSize:11, color:"var(--color-text-secondary)" }}>Gjenstår</div>
        </div>
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:20 }}>
        <div style={{ ...card, cursor:"pointer" }} onClick={() => {}}>
          <div style={{ fontWeight:600, fontSize:14, marginBottom:4 }}>Per oppgave</div>
          <div style={{ fontSize:12, color:"var(--color-text-secondary)" }}>Velg oppgave → gå gjennom alle elever</div>
        </div>
        <div style={{ ...card, cursor:"pointer" }} onClick={() => nav("vurderingElev", fag.id)}>
          <div style={{ fontWeight:600, fontSize:14, marginBottom:4 }}>Per elev</div>
          <div style={{ fontSize:12, color:"var(--color-text-secondary)" }}>Velg elev → se alle oppgavene deres</div>
        </div>
      </div>

      {oppgaver.length === 0
        ? <PH msg="Opprett oppgaver i Oppgaver-fanen først." />
        : oppgaver.map(o => {
            const n = vurd.filter(v => v.oppgaveId===o.id).length;
            const pct = fag.antallElever > 0 ? Math.round((n/fag.antallElever)*100) : 0;
            return (
              <div key={o.id} style={{ ...card, cursor:"pointer", marginBottom:10 }} onClick={() => go("vurderingOppgave", fag.id, o.id)}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                  <span style={{ fontWeight:500, fontSize:14 }}>{o.tittel}</span>
                  <span style={{ fontSize:13, color:"var(--color-text-secondary)" }}>{n}/{fag.antallElever}</span>
                </div>
                <div style={{ height:4, background:"var(--color-background-secondary)", borderRadius:2 }}>
                  <div style={{ height:4, background:pct===100?"#27AE60":A, borderRadius:2, width:pct+"%", transition:"width 0.3s" }} />
                </div>
              </div>
            );
          })
      }
    </div>
  );
}


function VurderingOppgaveElever({ fag, oppgave, data, go, nav }) {

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginTop:8, marginBottom:6 }}>
        <h1 style={{ ...h1, marginBottom:0 }}>{oppgave.tittel}</h1>
        <div style={{ display:"flex", gap:8, flexShrink:0, marginLeft:16 }}>
          <Btn secondary sm onClick={() => exportKarakterliste(fag, data)}>↓ Karakterliste</Btn>

        </div>
      </div>
      <p style={{ ...hint, marginBottom:16 }}>Grønn = ferdig · Gul = startet · Grå = ikke startet</p>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))", gap:8 }}>
        {Array.from({ length:fag.antallElever }, (_, i) => {
          const nr = i+1;
          const v = vurd.find(v => v.elevNr===nr);
          const k = v?.justerKarakter || (v?.beregnetKarakter ? String(v.beregnetKarakter) : null);

            <div key={nr} onClick={() => nav("vurderingForm", fag.id, oppgave.id, nr)}

              <div style={{ fontSize:13, fontWeight:500 }}>Elev {nr}</div>
              <div style={{ fontSize:24, fontWeight:700, color:ferdig?P:v?A:"var(--color-text-secondary)", margin:"4px 0" }}>
                {k || "—"}
              </div>
              <div style={{ fontSize:10, color:"var(--color-text-secondary)" }}>
                {ferdig ? "ferdig" : v ? "startet" : "ikke startet"}
              </div>
            </div>

        })}
      </div>
    </div>
  );
}

function VurderingElevOppgaver({ fag, elevNr, data, go, nav }) {

  const vurd = data.vurderinger.filter(v => v.fagId===fag.id && v.elevNr===elevNr);
  return (

          <button key={nr} onClick={() => nav("vurderingElev", fag.id, null, nr)}

              borderRadius:5, cursor:"pointer", fontFamily:"inherit", fontSize:13,

            {nr}

                    {k || "—"}

              );
            })}

function VurderingForm({ fag, oppgave, elevNr, data, save, go, nav }) {
  const [previewData, setPreviewData] = React.useState(null);
  const existing = data.vurderinger.find(v =>
    v.fagId===fag.id && v.oppgaveId===oppgave.id && v.elevNr===elevNr
  );
  const [f, setF] = useState(() => existing ? JSON.parse(JSON.stringify(existing)) : {
    id:uid(), fagId:fag.id, oppgaveId:oppgave.id, elevNr,
    stjerne1:"", stjerne2:"", rubrikknivå:{}, kompetansemålNivå:{},
    justerKarakter:null, justerBegrunnelse:"", framovermelding:""
  });

  const relevantRubrikk = fag.rubrikk.filter(r => oppgave.rubrikIds?.includes(r.id));
  const beregnet = calcGrade(f.rubrikknivå, relevantRubrikk);
  const finalK = f.justerKarakter || (beregnet ? String(beregnet) : null);

  const upd = (k, v) => setF(p => ({ ...p, [k]:v }));
  const setNivå = (id, nivå) => setF(p => ({
    ...p, rubrikknivå: { ...p.rubrikknivå, [id]: p.rubrikknivå[id]===nivå ? null : nivå }
  }));

  const doSave = (next = false) => {
    const vrd = { ...f, beregnetKarakter: beregnet };
    save({ ...data, vurderinger: existing
      ? data.vurderinger.map(v => v.id===f.id ? vrd : v)
      : [...data.vurderinger, vrd]
    });
    if (next && elevNr < fag.antallElever) nav("vurderingForm", fag.id, oppgave.id, elevNr+1);
    else if (next) go("vurderingOppgave", fag.id, oppgave.id);
  };

  const nivåColors = {
    lav:   { bg:"#E8F4FD", border:"#5B9FD4", text:"#1A4A6B" },
    middels:{ bg:"#FFF8E1", border:"#F0A500", text:"#7A5E00" },
    høy:   { bg:"#D4EDDA", border:"#27AE60", text:"#1A5C2A" },
  };

  return (
    <div>
      {previewData && <PrintPreview v={previewData} oppgave={oppgave} fag={fag} onClose={() => setPreviewData(null)} />}

      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <h1 style={{ ...h1, marginBottom:0 }}>Elev {elevNr}</h1>

      </div>

      <Section title="⭐ To stjerner">
        <div style={{ display:"grid", gap:12 }}>
          <Fld label="Stjerne 1">
            <textarea style={{ ...inp, minHeight:56, resize:"vertical" }} value={f.stjerne1}
              onChange={e => upd("stjerne1", e.target.value)} placeholder="Noe eleven mestret godt…" />
          </Fld>
          <Fld label="Stjerne 2">
            <textarea style={{ ...inp, minHeight:56, resize:"vertical" }} value={f.stjerne2}
              onChange={e => upd("stjerne2", e.target.value)} placeholder="En annen styrke…" />
          </Fld>
        </div>
      </Section>

      {oppgave.kompetansemålIds?.length > 0 && (() => {
        const kmType = oppgave.vurderingstype || "muntlig";
        const rb = KM_RUBRIKK[kmType] || KM_RUBRIKK.muntlig;
        const relevantKm = fag.kompetansemål.filter(m => oppgave.kompetansemålIds.some(id => id === m.id));
        return (
          <Section title={`📋 Kompetansemål — ${kmType}`}>
            <div style={{ display:"grid", gap:18 }}>
              {relevantKm.map(m => {
                const valgt = f.kompetansemålNivå?.[m.id];
                return (
                  <div key={m.id}>
                    <div style={{ fontSize:13, lineHeight:1.6, marginBottom:8, fontWeight:500 }}>{m.tekst}</div>
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
                      {[["lav","På vei (2–3)"],["middels","Solid (4–5)"],["høy","Utmerket (6)"]].map(([niv, label]) => {
                        const sel = valgt===niv;
                        const col = nivåColors[niv];
                        return (
                          <button key={niv}
                            onClick={() => setF(p => ({...p, kompetansemålNivå:{...p.kompetansemålNivå, [m.id]: p.kompetansemålNivå?.[m.id]===niv ? null : niv}}))}
                            style={{ padding:"8px 10px", borderRadius:6, cursor:"pointer", fontFamily:"inherit", fontSize:12, textAlign:"left",
                              border:`1.5px solid ${sel ? col.border : "var(--color-border-tertiary)"}`,
                              background: sel ? col.bg : "var(--color-background-secondary)",
                              color: sel ? col.text : "var(--color-text-secondary)" }}>
                            <div style={{ fontWeight:600, marginBottom:4 }}>{label}</div>
                            <div style={{ fontSize:11, lineHeight:1.5 }}>{rb[niv]}</div>
                          </button>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          </Section>
        );
      })()}

      {relevantRubrikk.length > 0 && (() => {
        const katLabels = { framføring:"🎭 Framføring", analyse:"📚 Analyse", ledelse:"🎬 Ledelse & prosess", generell:"Generell" };
        const katOrder = ["framføring","analyse","ledelse","generell"];
        const grouped = katOrder.reduce((acc, k) => {
          const items = relevantRubrikk.filter(r => (r.kategori||"generell")===k);
          if (items.length) acc[k] = items;
          return acc;
        }, {});
        return Object.entries(grouped).map(([kat, krit]) => (
          <Section key={kat} title={katLabels[kat]}>
            <div style={{ display:"grid", gap:18 }}>
              {krit.map(r => {
                const valgt = f.rubrikknivå[r.id];
                return (
                  <div key={r.id}>
                    <div style={{ fontWeight:500, fontSize:14, marginBottom:8 }}>{r.kriterium}</div>
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
                      {[["lav","På vei (2–3)"],["middels","Solid (4–5)"],["høy","Utmerket (6)"]].map(([niv, label]) => {
                        const sel = valgt===niv;
                        const col = nivåColors[niv];
                        return (
                          <button key={niv} onClick={() => setNivå(r.id, niv)} style={{
                            padding:"8px 10px", borderRadius:6, cursor:"pointer", fontFamily:"inherit",
                            fontSize:12, textAlign:"left", transition:"all 0.1s",
                            border:`1.5px solid ${sel ? col.border : "var(--color-border-tertiary)"}`,
                            background: sel ? col.bg : "var(--color-background-secondary)",
                            color: sel ? col.text : "var(--color-text-secondary)" }}>
                            <div style={{ fontWeight:600, marginBottom:4 }}>{label}</div>
                            <div style={{ fontSize:11, lineHeight:1.5 }}>{r[niv]}</div>
                          </button>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          </Section>
        ));
      })()}

      <Section title="Karakter">
        <div style={{ display:"flex", alignItems:"center", gap:16, marginBottom:14 }}>
          <div style={{ background:"var(--color-background-secondary)", borderRadius:6, padding:"6px 14px" }}>
            <div style={{ fontSize:10, color:"var(--color-text-secondary)", marginBottom:1 }}>Beregnet</div>
            <div style={{ fontSize:14, fontWeight:600, color:P, lineHeight:1 }}>{beregnet ?? "—"}</div>
          </div>
          {finalK && finalK !== "💬 Samtale" && f.justerKarakter && (
            <div style={{ background:"var(--color-background-secondary)", borderRadius:6, padding:"6px 14px" }}>
              <div style={{ fontSize:10, color:"var(--color-text-secondary)", marginBottom:1 }}>Justert</div>
              <div style={{ fontSize:14, fontWeight:600, color:A, lineHeight:1 }}>{finalK}</div>
            </div>
          )}
          {relevantRubrikk.length === 0 && (
            <p style={{ fontSize:13, color:"var(--color-text-secondary)", margin:0 }}>
              Ingen rubrikk-kriterier valgt. Sett karakter manuelt.
            </p>
          )}
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"180px 1fr", gap:12 }}>
          <Fld label="Justert karakter">
            <select style={inp} value={f.justerKarakter||""} onChange={e => upd("justerKarakter", e.target.value||null)}>
              <option value="">— Ingen justering</option>
              <option value="💬 Samtale">💬 Samtale</option>
              <option value="Bestått">✅ Bestått</option>
              <option value="Ikke bestått">❌ Ikke bestått</option>
              {["IV","2","3","4","5","6"].map(k => <option key={k}>{k}</option>)}
            </select>
          </Fld>
          {f.justerKarakter && !["Bestått","Ikke bestått","💬 Samtale"].includes(f.justerKarakter) && (
            <Fld label="Begrunnelse for justering">
              <input style={inp} value={f.justerBegrunnelse}
                onChange={e => upd("justerBegrunnelse", e.target.value)}
                placeholder="Begrunn avviket fra beregnet karakter…" />
            </Fld>
          )}
        </div>
      </Section>

      <Section title="Framovermelding">
        <textarea style={{ ...inp, minHeight:80, resize:"vertical", marginBottom:8 }} value={f.framovermelding}
            onChange={e => upd("framovermelding", e.target.value)}
            placeholder="Hva skal eleven jobbe videre med…" />
        <Btn secondary sm onClick={() => {
          const nivåLabel = { lav:"På vei (2–3)", middels:"Solid (4–5)", høy:"Utmerket (6)" };
          const krit = fag.rubrikk.filter(r => oppgave.rubrikIds?.includes(r.id));
          const graderte = krit.filter(r => f.rubrikknivå?.[r.id]);
          const sterke = graderte.filter(r => f.rubrikknivå[r.id] === "høy");
          const middels = graderte.filter(r => f.rubrikknivå[r.id] === "middels");
          const svake = graderte.filter(r => f.rubrikknivå[r.id] === "lav");
          const rubrikklinje = r => `- ${r.kriterium} (${nivåLabel[f.rubrikknivå[r.id]]}): ${r[f.rubrikknivå[r.id]]}`;
          const stjerner = [f.stjerne1 && `⭐ ${f.stjerne1}`, f.stjerne2 && `⭐ ${f.stjerne2}`].filter(Boolean).join("\n");
          const relevanteKM = fag.kompetansemål?.filter(m => oppgave.kompetansemålIds?.includes(m.id) && f.kmNivå?.[m.id]);
          const kmtekst = relevanteKM?.map(m => `- ${m.tekst} → ${nivåLabel[f.kmNivå[m.id]]}`).join("\n");
          const finalK = f.justerKarakter || (beregnet ? String(beregnet) : null);
          const prompt = [
            `Du er en hjelper for en teaterlærer ved Vågen vgs. Skriv en framovermelding på norsk (2–4 setninger) som er varm, konkret og fremoverrettet. Fokuser særlig på hva eleven bør jobbe videre med basert på de svakeste områdene. Ikke gjenta stjernene. Skriv kun selve framovermeldingsteksten, ingen introduksjon.`,
            `\nFag: ${fag.navn}\nOppgave: ${oppgave.tittel}${finalK ? `\nKarakter: ${finalK}` : ""}`,
            stjerner ? `\nDet eleven gjorde godt:\n${stjerner}` : "",
            svake.length ? `\nOmråder som trenger utvikling (På vei):\n${svake.map(rubrikklinje).join("\n")}` : "",
            middels.length ? `\nOmråder på god vei (Solid):\n${middels.map(rubrikklinje).join("\n")}` : "",
            sterke.length ? `\nStyrker (Utmerket):\n${sterke.map(rubrikklinje).join("\n")}` : "",
            kmtekst ? `\nKompetansemål:\n${kmtekst}` : "",
            !graderte.length ? "\n(Ingen rubrikk er vurdert ennå)" : "",
            f.framovermelding ? `\nUtkast til framovermelding (forbedre gjerne):\n${f.framovermelding}` : "",
          ].filter(Boolean).join("\n");
          navigator.clipboard.writeText(prompt).then(() => alert("Prompt kopiert! Lim inn i Claude."));
        }}>Kopier prompt til Claude →</Btn>
      </Section>

      <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
        <Btn onClick={() => doSave(false)}>Lagre</Btn>
        <Btn onClick={() => doSave(true)}>
          {elevNr < fag.antallElever ? "Lagre og neste elev →" : "Lagre og avslutt"}
        </Btn>
        <Btn secondary onClick={() => setPreviewData({...f, beregnetKarakter: beregnet})}>Skriv ut tilbakemelding</Btn>
        <Btn secondary onClick={() => {
          navigator.clipboard.writeText(buildFeedbackTekst({...f, beregnetKarakter: beregnet}, oppgave, fag));
          alert("Kopiert!");
        }}>Kopier tekst</Btn>
        <Btn secondary onClick={() => go("vurderingOppgave", fag.id, oppgave.id)}>Tilbake</Btn>
      </div>
    </div>
  );
}


    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
